<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Crimson+Pro:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

:root {
    --gold:         #ffd700;
    --gold-glow:    rgba(255,215,0,0.6);
    --silver-dim:   rgba(200,200,220,0.5);
}

#intro-overlay {
    position: fixed;
    inset: 0;
    background: #08090d;
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: introFade 3.5s ease forwards;
    pointer-events: none;
}

@keyframes introFade {
    0%   { opacity: 1; }
    60%  { opacity: 1; }
    100% { opacity: 0; }
}

#intro-content {
    text-align: center;
    animation: introContent 3.5s ease forwards;
}

@keyframes introContent {
    0%   { opacity: 0; transform: scale(0.95); }
    20%  { opacity: 1; transform: scale(1); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.03); }
}

#intro-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 700;
    letter-spacing: 14px;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow:
        0 0 30px var(--gold-glow),
        0 0 80px rgba(255,215,0,0.3),
        0 0 150px rgba(255,215,0,0.1);
    line-height: 1;
}

#intro-tagline {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    letter-spacing: 4px;
    color: var(--silver-dim);
    margin-top: 16px;
    animation: taglineAppear 3.5s ease forwards;
}

@keyframes taglineAppear {
    0%   { opacity: 0; transform: translateY(8px); }
    35%  { opacity: 0; transform: translateY(8px); }
    55%  { opacity: 1; transform: translateY(0); }
    70%  { opacity: 1; }
    100% { opacity: 0; }
}

#intro-runa {
    position: absolute;
    width: min(70vw, 70vh);
    height: min(70vw, 70vh);
    opacity: 0;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.9))
            drop-shadow(0 0 60px rgba(255,215,0,0.6))
            drop-shadow(0 0 100px rgba(255,215,0,0.3));
    animation: runaIntro 3.5s ease forwards;
}

@keyframes runaIntro {
    0%   { opacity: 0; transform: rotate(0deg)  scale(0.9); }
    20%  { opacity: 1; transform: rotate(15deg) scale(1);   }
    70%  { opacity: 1; transform: rotate(55deg) scale(1);   }
    100% { opacity: 0; transform: rotate(70deg) scale(1.05);}
}
</style>
</head>
<body>

<div id="intro-overlay">
    <svg id="intro-runa" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="200" r="185" fill="none" stroke="#ffd700" stroke-width="1"   opacity="0.9"/>
        <circle cx="200" cy="200" r="145" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.7"/>
        <circle cx="200" cy="200" r="80"  fill="none" stroke="#ffd700" stroke-width="1"   opacity="0.8"/>
        <g stroke="#ffd700" stroke-width="1.5" opacity="1" stroke-linecap="round">
            <line x1="200" y1="125" x2="200" y2="95"/><line x1="193" y1="110" x2="200" y2="95"/><line x1="207" y1="110" x2="200" y2="95"/>
            <line x1="200" y1="275" x2="200" y2="305"/><line x1="193" y1="290" x2="207" y2="290"/>
            <line x1="275" y1="200" x2="305" y2="200"/><line x1="290" y1="193" x2="305" y2="200"/><line x1="290" y1="207" x2="305" y2="200"/>
            <line x1="125" y1="200" x2="95"  y2="200"/><line x1="110" y1="193" x2="95"  y2="200"/><line x1="110" y1="207" x2="95"  y2="200"/>
            <line x1="254" y1="146" x2="275" y2="125"/><line x1="258" y1="133" x2="275" y2="125"/><line x1="262" y1="146" x2="275" y2="125"/>
            <line x1="146" y1="146" x2="125" y2="125"/><line x1="138" y1="133" x2="125" y2="125"/><line x1="138" y1="146" x2="125" y2="125"/>
            <line x1="254" y1="254" x2="275" y2="275"/><line x1="262" y1="254" x2="275" y2="275"/><line x1="254" y1="262" x2="275" y2="275"/>
            <line x1="146" y1="254" x2="125" y2="275"/><line x1="138" y1="254" x2="125" y2="275"/><line x1="146" y1="262" x2="125" y2="275"/>
        </g>
        <g font-size="14" fill="#ffd700" opacity="0.9" font-family="serif" text-anchor="middle">
            <text transform="rotate(0,200,200)   translate(200,22)">ᚠ</text>
            <text transform="rotate(22,200,200)  translate(200,22)">ᚢ</text>
            <text transform="rotate(44,200,200)  translate(200,22)">ᚦ</text>
            <text transform="rotate(66,200,200)  translate(200,22)">ᚨ</text>
            <text transform="rotate(88,200,200)  translate(200,22)">ᚱ</text>
            <text transform="rotate(110,200,200) translate(200,22)">ᚲ</text>
            <text transform="rotate(132,200,200) translate(200,22)">ᚷ</text>
            <text transform="rotate(154,200,200) translate(200,22)">ᚹ</text>
            <text transform="rotate(176,200,200) translate(200,22)">ᚺ</text>
            <text transform="rotate(198,200,200) translate(200,22)">ᚾ</text>
            <text transform="rotate(220,200,200) translate(200,22)">ᛁ</text>
            <text transform="rotate(242,200,200) translate(200,22)">ᛃ</text>
            <text transform="rotate(264,200,200) translate(200,22)">ᛇ</text>
            <text transform="rotate(286,200,200) translate(200,22)">ᛈ</text>
            <text transform="rotate(308,200,200) translate(200,22)">ᛉ</text>
            <text transform="rotate(330,200,200) translate(200,22)">ᛊ</text>
        </g>
        <g stroke="#ffd700" stroke-width="1" opacity="0.9">
            <line x1="200" y1="140" x2="200" y2="260"/>
            <line x1="140" y1="200" x2="260" y2="200"/>
            <circle cx="200" cy="200" r="25" fill="none"/>
            <circle cx="200" cy="200" r="5" fill="#ffd700"/>
        </g>
    </svg>
    <div id="intro-content">
        <div id="intro-title">RunaWorld</div>
        <div id="intro-tagline">Forge your destiny, one rune at a time</div>
    </div>
</div>

<script>
// Auto-remove after animation completes
setTimeout(() => {
    const overlay = document.getElementById('intro-overlay');
    if (overlay) overlay.remove();
}, 3500);
</script>
</body>
</html>
