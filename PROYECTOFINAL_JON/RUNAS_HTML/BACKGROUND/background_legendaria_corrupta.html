<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030205}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d', { alpha: false });
const TAU = Math.PI * 2;
const DPR_LIMIT = matchMedia('(max-width: 768px)').matches ? 1 : 1.25;
let dpr = 1;
let w = 0;
let h = 0;
let t = 0;

function resize() {
    dpr = Math.min(devicePixelRatio || 1, DPR_LIMIT);
    w = innerWidth;
    h = innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawGrid() {
    const gap = 54;
    ctx.save();
    ctx.globalAlpha = 0.07 + 0.025 * Math.sin(t * 1.8);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    const ox = (t * 7) % gap;
    const oy = (t * 4) % gap;
    for (let x = -gap + ox; x < w + gap; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    for (let y = -gap + oy; y < h + gap; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
    ctx.restore();
}

function drawVoid() {
    const cx = w / 2;
    const cy = h / 2;
    const r = Math.min(w, h) * (0.36 + 0.03 * Math.sin(t));
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.3);
    g.addColorStop(0, 'rgba(80,0,120,0.26)');
    g.addColorStop(0.28, 'rgba(44,0,70,0.18)');
    g.addColorStop(0.62, 'rgba(20,10,0,0.20)');
    g.addColorStop(1, '#030205');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
}

function drawScanlines() {
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#000';
    for (let y = ((t * 38) | 0) % 8; y < h; y += 8) {
        ctx.fillRect(0, y, w, 1);
    }
    ctx.restore();
}

function frame() {
    t += 0.012;
    drawVoid();
    drawGrid();
    drawScanlines();
    requestAnimationFrame(frame);
}

resize();
addEventListener('resize', resize, { passive: true });
requestAnimationFrame(frame);
</script>
</body>
</html>
