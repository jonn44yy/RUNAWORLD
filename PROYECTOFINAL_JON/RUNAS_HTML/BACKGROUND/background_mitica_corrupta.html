<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Background Mítica Corrupta</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #030005; overflow: hidden; }

    /* Pulso Abismal Central */
    #void-core {
        position: fixed; inset: 0; z-index: 1;
        background: radial-gradient(circle at center, #3a0018 0%, #0a000a 50%, #000000 100%);
        animation: voidPulse 4s ease-in-out infinite alternate;
    }

    @keyframes voidPulse {
        0% { transform: scale(1); filter: brightness(0.8); }
        100% { transform: scale(1.1); filter: brightness(1.2); }
    }

    /* Red de Contención Glitcheada */
    #glitch-grid {
        position: fixed; inset: 0; z-index: 2; opacity: 0.15;
        background: 
            repeating-linear-gradient(0deg, transparent, transparent 19px, #ff0044 20px),
            repeating-linear-gradient(90deg, transparent, transparent 19px, #ff0044 20px);
        mix-blend-mode: screen;
        animation: gridJitter 0.3s steps(2) infinite;
    }

    @keyframes gridJitter {
        0% { transform: translate(0, 0) scale(1.02); opacity: 0.15; }
        50% { transform: translate(-2px, 2px) scale(1.02); opacity: 0.05; }
        100% { transform: translate(2px, -2px) scale(1.02); opacity: 0.2; }
    }

    /* Fragmentos oscuros rotos */
    #shards-container { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
    .shard {
        position: absolute;
        background: #000;
        box-shadow: 0 0 10px #ff0044;
        border: 1px solid #ff0044;
        clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 20% 100%, 0% 30%);
        opacity: 0;
        animation: floatShard var(--dur) linear infinite;
    }

    @keyframes floatShard {
        0% { transform: translateY(110vh) rotate(0deg) scale(var(--s)); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-20vh) rotate(var(--rot)) scale(var(--s)); opacity: 0; }
    }
</style>
</head>
<body>
    <div id="void-core"></div>
    <div id="glitch-grid"></div>
    <div id="shards-container"></div>

<script>
    const container = document.getElementById('shards-container');
    for (let i = 0; i < 40; i++) {
        let shard = document.createElement('div');
        shard.className = 'shard';
        let size = 10 + Math.random() * 30;
        shard.style.width = `${size}px`; shard.style.height = `${size}px`;
        shard.style.left = `${Math.random() * 100}vw`;
        
        shard.style.setProperty('--dur', `${8 + Math.random() * 15}s`);
        shard.style.setProperty('--s', `${0.5 + Math.random()}`);
        shard.style.setProperty('--rot', `${(Math.random() - 0.5) * 720}deg`);
        shard.style.animationDelay = `${Math.random() * -20}s`;
        
        // Algunas piezas están corrompidas en magenta
        if(Math.random() > 0.8) shard.style.borderColor = "#aa00ff";

        container.appendChild(shard);
    }
</script>
</body>
</html>
