<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:monospace}
.frame{position:fixed;inset:18px;border:1px solid rgba(255,215,0,.24);box-shadow:inset 0 0 28px rgba(255,215,0,.07),inset 0 0 70px rgba(130,0,255,.04);pointer-events:none}
.frame:before,.frame:after{content:"";position:absolute;height:2px;width:28%;background:linear-gradient(90deg,transparent,#ffd700,#b000ff,transparent);opacity:.75;animation:flicker 2.8s steps(2,end) infinite}
.frame:before{top:-1px;left:12%}.frame:after{bottom:-1px;right:12%;animation-delay:.7s}
.corner{position:absolute;width:34px;height:34px;border-color:rgba(255,215,0,.75);opacity:.75}.tl{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid}.tr{top:-1px;right:-1px;border-top:2px solid;border-right:2px solid}.bl{bottom:-1px;left:-1px;border-bottom:2px solid;border-left:2px solid}.br{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid}
.tag{position:fixed;left:50%;transform:translateX(-50%);padding:4px 18px;background:rgba(3,2,5,.82);border:1px solid rgba(255,215,0,.35);color:#ffd700;font-size:11px;letter-spacing:5px;text-shadow:2px 0 #6d00ff;white-space:nowrap}.top{top:18px}.bottom{bottom:18px;color:#b000ff;text-shadow:2px 0 #ffd700}
@keyframes flicker{0%,86%,100%{opacity:.72;transform:translateX(0)}88%{opacity:.18;transform:translateX(8px)}90%{opacity:1;transform:translateX(-4px)}}
@media(max-width:768px){.frame{inset:10px}.tag{font-size:9px;letter-spacing:3px;padding:3px 10px}.top{top:10px}.bottom{bottom:10px}}
</style>
</head>
<body>
<div class="frame"><i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i></div>
<div class="tag top">LEGENDARIA.CORRUPTA</div>
<div class="tag bottom">GOLD_SIGNAL_BROKEN</div>
</body>
</html>
