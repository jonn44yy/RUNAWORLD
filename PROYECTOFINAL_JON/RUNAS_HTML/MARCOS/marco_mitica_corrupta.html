<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Courier Prime', monospace; }

    /* EL CONTENEDOR ROTO */
    #marco-ui {
        position: absolute; inset: 20px;
        border: 2px solid rgba(255, 34, 68, 0.3);
        /* Esquinas cortadas estilo Sci-Fi/Dark Magic */
        clip-path: polygon(
            40px 0, calc(100% - 40px) 0, 100% 40px, 100% calc(100% - 40px), 
            calc(100% - 40px) 100%, 40px 100%, 0 calc(100% - 40px), 0 40px
        );
        box-shadow: inset 0 0 50px rgba(255, 0, 68, 0.2);
    }

    /* Brillos de corrupción perimetral */
    .corruption-edge {
        position: absolute; background: #ff2244;
        box-shadow: 0 0 20px #ff2244, 0 0 40px #aa00ff;
        animation: glitchFlicker 0.4s infinite;
    }
    .edge-t { top: 0; left: 20%; right: 20%; height: 3px; }
    .edge-b { bottom: 0; left: 30%; right: 30%; height: 3px; animation-delay: 0.1s; }
    .edge-l { left: 0; top: 30%; bottom: 30%; width: 3px; background: #aa00ff; animation-delay: 0.2s; }
    .edge-r { right: 0; top: 10%; bottom: 60%; width: 4px; animation-delay: 0.3s; }

    @keyframes glitchFlicker {
        0%, 100% { opacity: 1; }
        33% { opacity: 0.3; transform: scaleX(0.9); }
        66% { opacity: 0.8; transform: scaleX(1.05); }
        70% { opacity: 0; }
    }

    /* TEXTO CON ABERRACIÓN CROMÁTICA */
    .title-box {
        position: absolute; left: 50%; transform: translateX(-50%);
        background: #050005; padding: 5px 30px;
        border: 1px solid #ff2244; border-top: none;
        z-index: 30;
    }
    .top-box { top: 0; }
    .bottom-box { bottom: 0; border-top: 1px solid #ff2244; border-bottom: none; }

    .glitch-text {
        color: #fff; font-size: 20px; letter-spacing: 8px; font-weight: bold;
        position: relative;
        text-shadow: 2px 0 #ff2244, -2px 0 #00ffff;
        animation: textJitter 2s infinite;
    }

    @keyframes textJitter {
        0%, 90%, 100% { transform: translate(0, 0) skew(0deg); text-shadow: 2px 0 #ff2244, -2px 0 #00ffff; }
        92% { transform: translate(-2px, 1px) skew(-10deg); text-shadow: -3px 0 #ff2244, 3px 0 #aa00ff; }
        94% { transform: translate(2px, -1px) skew(10deg); text-shadow: 3px 0 #ff2244, -3px 0 #00ffff; }
        96% { transform: translate(0, 0) skew(0deg); opacity: 0.5; }
    }

</style>
</head>
<body>
    <div id="marco-ui">
        <div class="corruption-edge edge-t"></div>
        <div class="corruption-edge edge-b"></div>
        <div class="corruption-edge edge-l"></div>
        <div class="corruption-edge edge-r"></div>
    </div>
    
    <div class="title-box top-box"><div class="glitch-text">MÍTICA.CORRUPTA</div></div>
    <div class="title-box bottom-box"><div class="glitch-text">ERROR_404_VOID</div></div>
</body>
</html>
