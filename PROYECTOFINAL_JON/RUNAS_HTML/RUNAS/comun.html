<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; display:flex; justify-content:center; align-items:center; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let t = 0, raf;

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); });

function frame() {
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    ctx.clearRect(0,0,W,H);
    t += 0.012;

    const size = Math.min(W,H) * 0.25;
    const alpha = 0.08 + 0.04 * Math.sin(t*2);

    ctx.fillStyle   = `rgba(160,160,160,${alpha})`;
    ctx.strokeStyle = `rgba(160,160,160,${alpha * 4})`;
    ctx.lineWidth   = 1;
    ctx.fillRect(cx - size/2, cy - size/2, size, size);
    ctx.strokeRect(cx - size/2, cy - size/2, size, size);

    ctx.fillStyle = `rgba(140,140,140,0.25)`;
    ctx.font = `${Math.min(W,H)*0.045}px Oswald, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("COMÚN", cx, cy);

    raf = requestAnimationFrame(frame);
}
raf = requestAnimationFrame(frame);
</script>
</body>
</html>
