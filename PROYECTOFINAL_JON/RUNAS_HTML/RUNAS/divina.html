<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
:root { --divine-white:#FFFFF0; --divine-gold:#FFFACD; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }

.rotate-slow         { animation:giro 50s linear infinite; transform-origin:center; }
.rotate-slow-reverse { animation:giro 70s linear infinite reverse; transform-origin:center; }
.rotate-outer        { animation:giro 90s linear infinite; transform-origin:center; }
.rotate-fast         { animation:giro 28s linear infinite; transform-origin:center; }
.rotate-rev          { animation:giro 70s linear infinite reverse; transform-origin:center; }
.pulse-soft          { animation:pulso 6s ease-in-out infinite; }
@keyframes giro  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }

#divine-runa-svg {
    width:min(680px, 88vw); height:min(680px, 88vw);
    filter:drop-shadow(0 0 80px rgba(255,215,0,0.5));
    position:relative; z-index:10;
}
#rays-canvas {
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:5;
}
</style>
</head>
<body>

<!-- Rayos de luz de fondo (detalle v4) -->
<canvas id="rays-canvas"></canvas>

</div>

<script>
// Rayos de luz suaves en el preview (versión idle, menos intensos)
const c = document.getElementById('rays-canvas');
const W = c.width  = window.innerWidth;
const H = c.height = window.innerHeight;
const ctx = c.getContext('2d');
const CX = W/2, CY = H/2;
const NUM_RAYS = 12;
let t = 0;

function drawRays() {
    ctx.clearRect(0,0,W,H);
    t += 0.004; // más lento que en la animación
    const maxLen = Math.sqrt(CX*CX+CY*CY)*1.4;
    for(let i=0;i<NUM_RAYS;i++){
        const baseAngle = (i/NUM_RAYS)*Math.PI*2;
        const angle = baseAngle + Math.sin(t+i*0.5)*0.06;
        const width = 3 + Math.sin(t*1.5+i)*1.5;
        const alpha = 0.22 + Math.sin(t*0.8+i*0.7)*0.08;
        const grad = ctx.createLinearGradient(CX,CY,CX+Math.cos(angle)*maxLen,CY+Math.sin(angle)*maxLen);
        grad.addColorStop(0,   `rgba(255,255,200,${alpha})`);
        grad.addColorStop(0.35,`rgba(255,245,180,${alpha*0.5})`);
        grad.addColorStop(1,   'rgba(255,240,150,0)');
        ctx.save();
        ctx.translate(CX,CY); ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(-width,0); ctx.lineTo(0,0);
        ctx.lineTo(-width*0.4,maxLen); ctx.lineTo(width*0.4,maxLen); ctx.lineTo(width,0);
        ctx.fillStyle=grad; ctx.fill();
        ctx.restore();
    }
    requestAnimationFrame(drawRays);
}
drawRays();
</script>
</body>
