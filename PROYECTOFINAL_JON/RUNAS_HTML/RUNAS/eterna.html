<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* FIX DEFINITIVO ANTI-SCROLL Y CENTRADO ABSOLUTO */
html {
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
body { 
    width: 100vw; 
    height: 100vh; 
    background: #000810; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    overflow: hidden; /* Capa 2 de seguridad */
    overscroll-behavior: none; /* Evita el efecto rebote en Chrome/Safari */
}
canvas { display: block; } 

#bg { position:fixed; inset:0; z-index:1; }

#vig {
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:radial-gradient(ellipse at center,
        rgba(0,0,0,0) 28%, rgba(0,0,0,0.5) 62%, rgba(0,0,0,0.94) 100%);
}

#vig::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.06) 0px,
        rgba(0,0,0,0.06) 1px,
        transparent 1px,
        transparent 2px
    );
    opacity: 0.5;
}

#wrap { 
    position:relative; z-index:10; display:flex; justify-content:center; align-items:center; 
    animation:efloat 8s ease-in-out infinite; 
    perspective: 1200px; 

}
@keyframes efloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }

#eterna-svg {
    width:min(680px,88vw); height:min(680px,88vw);
    filter:drop-shadow(0 0 32px rgba(145,85,255,0.85))
           drop-shadow(0 0 70px  rgba(65,155,255,0.35));
    transform-style: preserve-3d;
    will-change: transform;
}
.rs  { animation:erot 52s linear infinite; transform-origin:center; }
.rm  { animation:erot 26s linear infinite; transform-origin:center; }
.rf  { animation:erot 11s linear infinite; transform-origin:center; }
.rv  { animation:erot 36s linear infinite reverse; transform-origin:center; }
.rvs { animation:erot 65s linear infinite reverse; transform-origin:center; }
.rp  { animation:epulse 3.5s ease-in-out infinite; }
@keyframes erot   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes epulse { 0%,100%{opacity:.5;transform:scale(.97)} 50%{opacity:1;transform:scale(1.04)} }

.singularity {
    transform-origin: 500px 500px;
    transform-box: fill-box;
    animation: singPulse 4.2s cubic-bezier(.55,0,.28,1) infinite;
    mix-blend-mode: screen;
    will-change: transform, opacity;
}
@keyframes singPulse {
    0%,100% { transform: scale(.26); opacity: .72; }
    16%     { transform: scale(.04); opacity: 1;   }  
    44%     { transform: scale(1.22); opacity: .92; } 
    66%     { transform: scale(.55); opacity: .82; }
    84%     { transform: scale(.82); opacity: .56; }
}

.lens-core {
    transform-origin: 500px 500px;
    transform-box: fill-box;
    animation: lensBreath 5.5s ease-in-out infinite;
    will-change: transform;
}
@keyframes lensBreath {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.45); }
}

.shard { 
    transform-origin: 500px 500px; 
    transform-box: fill-box; 
    will-change: transform, opacity; 
}
.shard-0{animation:fragOut 5.1s ease-in-out infinite .0s}
.shard-1{animation:fragOut 4.7s ease-in-out infinite .5s}
.shard-2{animation:fragOut 5.4s ease-in-out infinite .9s}
.shard-3{animation:fragOut 6.0s ease-in-out infinite 1.4s}
.shard-4{animation:fragOut 4.9s ease-in-out infinite 2.1s}
.shard-5{animation:fragOut 5.6s ease-in-out infinite 2.9s}
.shard-6{animation:fragOut 5.2s ease-in-out infinite 3.4s}
.shard-7{animation:fragOut 4.4s ease-in-out infinite 3.8s}
@keyframes fragOut {
    0%,100% { transform: translate(0,0) rotate(0deg) scale(1); opacity:0; }
    18%     { opacity: 1; }
    48%     { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(.60); opacity:.75; }
    82%     { opacity: .5; }
}

.crystal-branch {
    stroke-dasharray: 28;
    stroke-dashoffset: 28;
    opacity: 0;
    will-change: stroke-dashoffset, opacity;
}
.crystal-branch:nth-of-type(1) {animation:crystalGrow 1.9s ease-out infinite}
.crystal-branch:nth-of-type(2) {animation:crystalGrow 2.1s ease-out infinite .23s}
.crystal-branch:nth-of-type(3) {animation:crystalGrow 2.3s ease-out infinite .47s}
.crystal-branch:nth-of-type(4) {animation:crystalGrow 1.7s ease-out infinite .68s}
.crystal-branch:nth-of-type(5) {animation:crystalGrow 2.4s ease-out infinite .91s}
.crystal-branch:nth-of-type(6) {animation:crystalGrow 1.8s ease-out infinite 1.12s}
.crystal-branch:nth-of-type(7) {animation:crystalGrow 2.0s ease-out infinite 1.34s}
.crystal-branch:nth-of-type(8) {animation:crystalGrow 2.2s ease-out infinite 1.56s}
.crystal-branch:nth-of-type(9) {animation:crystalGrow 1.9s ease-out infinite 1.78s}
.crystal-branch:nth-of-type(10){animation:crystalGrow 2.5s ease-out infinite 2.00s}
.crystal-branch:nth-of-type(11){animation:crystalGrow 1.6s ease-out infinite 2.25s}
.crystal-branch:nth-of-type(12){animation:crystalGrow 2.3s ease-out infinite 2.48s}
@keyframes crystalGrow {
    0%   { stroke-dashoffset: 28; opacity: 0;   }
    22%  { opacity: .95; }
    55%  { stroke-dashoffset: 0;  opacity: 1;   }
    75%  { stroke-dashoffset: 0;  opacity: .85; }
    100% { stroke-dashoffset: 0;  opacity: 0;   }
}

.peri-text {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    fill: #c8b0f8;
    letter-spacing: 2.4px;
    opacity: .55;
}
</style>

<script>
const c=document.getElementById('bg');
const W=c.width=window.innerWidth,H=c.height=window.innerHeight;
const ctx=c.getContext('2d');
const CX=W/2,CY=H/2,escalaMinima=Math.min(W,H);
const R=(a,b)=>a+Math.random()*(b-a);

const STARS=Array.from({length:180},()=>({
    a:R(0,Math.PI*2),d:R(20,escalaMinima*.68),
    r:R(.22,2.4),br:R(.2,.95),spd:R(.00012,.00072),tono:R(198,285)
}));

const NEBULOSAS=[
    {desfaseX:R(-escalaMinima*.35,escalaMinima*.35),desfaseY:R(-escalaMinima*.35,escalaMinima*.35),r:escalaMinima*R(.28,.52),tono:R(238,292),a:R(.06,.12)},
    {desfaseX:R(-escalaMinima*.28,escalaMinima*.28),desfaseY:R(-escalaMinima*.28,escalaMinima*.28),r:escalaMinima*R(.2,.38),tono:R(198,248),a:R(.05,.1)},
    {desfaseX:R(-escalaMinima*.22,escalaMinima*.22),desfaseY:R(-escalaMinima*.22,escalaMinima*.22),r:escalaMinima*R(.15,.3),tono:R(232,280),a:R(.04,.09)},
];

const ORBS=Array.from({length:40},()=>({
    angle:R(0,Math.PI*2),
    orbitR:R(escalaMinima*.08,escalaMinima*.42),
    tilt:R(0,Math.PI),
    spd:R(.006,.03)*(Math.random()>.5?1:-1),
    r:R(.8,3.5),a:R(.18,.65),
    tono:R(208,285),phase:R(0,Math.PI*2),
}));

const FLOATERS=Array.from({length:30},()=>({
    x:R(0,W),y:R(0,H),
    vx:R(-.18,.18),vy:R(-.14,.14),
    r:R(.4,2.2),a:R(.06,.42),tono:R(198,285),ph:R(0,Math.PI*2),
}));

const CLUSTERS=Array.from({length:5},()=>({
    cx:CX+R(-W*.42,W*.42), cy:CY+R(-H*.42,H*.42),
    stars:Array.from({length:~~R(5,12)},()=>({
        dx:R(-50,50),dy:R(-50,50),
        r:R(.2,1.4),br:R(.3,.9),tono:R(200,285),ph:R(0,Math.PI*2)
    }))
}));

const COMETS = [];
const svgElement = document.getElementById('eterna-svg');

let lastAsteroidTime = Date.now();
let targetTiltX = 0, targetTiltY = 0;
let currentTiltX = 0, currentTiltY = 0;

let tiempoSegundos=0;

const hexSpinBoost = document.getElementById('hexSpinBoost');
const pupil        = document.getElementById('pupil');

let runeRadius = 340;
let runeRadiusSq = runeRadius * runeRadius;
function recomputeRuneRadius() {
    const r = svgElement.getBoundingClientRect();
    runeRadius = r.width * 0.5;
    runeRadiusSq = runeRadius * runeRadius;
}
recomputeRuneRadius();

let currentProximity = 0;
let hexBoostAngle    = 0;
const PUPIL_REST_R   = 10;
const PUPIL_MAX_R    = 32;
const HEX_MAX_DEG_PER_FRAME = 8.5; 

const _L = { x:0, y:0, stretch:1, angle:0, active:false };

function applyLens(px, py) {
    _L.x = px; 
    _L.y = py; 
    _L.stretch = 1; 
    _L.active = false;
    return _L;
}

const SHADOW_RADIUS_CUTOFF = 0.85;
const SHADOW_ALPHA_CUTOFF  = 0.22;
function drawStar(px, py, r, stretchAngle, stretch, fillStyle, shadowColor, shadowBlur, alpha) {
    const useShadow = (r >= SHADOW_RADIUS_CUTOFF && alpha >= SHADOW_ALPHA_CUTOFF);
    const stretched = stretch > 1.02;
    if (!useShadow && !stretched) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = fillStyle;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        return;
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = fillStyle;
    if (useShadow) {
        ctx.shadowColor = shadowColor;
        ctx.shadowBlur  = shadowBlur;
    }
    if (stretched) {
        ctx.translate(px, py);
        ctx.rotate(stretchAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * stretch, r, 0, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

const morphPoly = document.getElementById('morphPoly');
const POLY_SAMPLES = 40;
const _polyBuf = new Array(POLY_SAMPLES);
const SVG_CX = 500, SVG_CY = 500;

function buildPolygonPointsString(n, radius, rotation) {
    const nLow  = n | 0;
    const nHigh = nLow + 1;
    const t     = n - nLow;

    const thetaL = (Math.PI * 2) / nLow,  halfL = thetaL * 0.5;
    const thetaH = (Math.PI * 2) / nHigh, halfH = thetaH * 0.5;
    const chL = Math.cos(halfL), chH = Math.cos(halfH);

    for (let i = 0; i < POLY_SAMPLES; i++) {
        const phi = (i / POLY_SAMPLES) * Math.PI * 2;
        const ph  = phi - rotation;

        let lL = ph % thetaL; if (lL < 0) lL += thetaL; lL -= halfL;
        let lH = ph % thetaH; if (lH < 0) lH += thetaH; lH -= halfH;

        const rL = radius * chL / Math.cos(lL);
        const rH = radius * chH / Math.cos(lH);
        const r  = rL * (1 - t) + rH * t;

        const px = SVG_CX + Math.cos(phi) * r;
        const py = SVG_CY + Math.sin(phi) * r;
        
        _polyBuf[i] = px.toFixed(3) + ',' + py.toFixed(3);
    }
    return _polyBuf.join(' ');
}

const periTextPath = document.getElementById('periTextPath');
const GLYPHS = '∴∵∷∼≈≉≋≎≏⊕⊖⊗⊘⊙⊚⊛⊜⊝⊞⌬⌭⌮⍉⍟⍣⍤⍥⍦⍧𐎀𐎁𐎂𐎃𐎄𐎅𐎆𐎇𐎈ᚠᚡᚢᚣᚤᚥᚦᚧᚨᛦ✦✧✴☸⟁⟐⟠';
const GLYPHS_LEN = GLYPHS.length;
const PERI_LEN = 90;
const _periBuf = new Array(PERI_LEN);
for (let i = 0; i < PERI_LEN; i++) _periBuf[i] = GLYPHS[(Math.random() * GLYPHS_LEN) | 0];
let _periCursor = 0;
function tickPeriWriter() {
    for (let k = 0; k < 10; k++) {
        _periBuf[_periCursor % PERI_LEN] = GLYPHS[(Math.random() * GLYPHS_LEN) | 0];
        _periCursor++;
    }
    periTextPath.textContent = _periBuf.join('');
}
periTextPath.textContent = _periBuf.join('');
setInterval(tickPeriWriter, 110);

function drawComets() {
    const now = Date.now();
    if (now - lastAsteroidTime > R(7000, 9000)) {
        const sideLeft = Math.random() < 0.5;
        const startX = sideLeft ? -80 : W + 80;
        const velX = sideLeft ? R(6, 10) : -R(6, 10); 
        
        COMETS.push({
            x: startX, 
            y: R(0, H),
            vx: velX, 
            vy: R(-4, 4)
        });
        lastAsteroidTime = now;
    }
    
    let activeAsteroid = null;
    let targetProximity = 0;

    for(let i = COMETS.length - 1; i >= 0; i--) {
        let ct = COMETS[i];
        ct.x += ct.vx; 
        ct.y += ct.vy; 
        
        if(ct.x < -100 || ct.x > W + 100 || ct.y < -100 || ct.y > H + 100) { 
            COMETS.splice(i, 1); 
            continue; 
        }

        const pdx = ct.x - CX, pdy = ct.y - CY;
        const pdsq = pdx*pdx + pdy*pdy;
        if (pdsq < runeRadiusSq) {
            const p = 1 - Math.sqrt(pdsq) / runeRadius;
            const eased = Math.sqrt(p);
            if (eased > targetProximity) targetProximity = eased;
        }
        
        ctx.save(); 
        ctx.beginPath(); 
        ctx.moveTo(ct.x, ct.y); 
        ctx.lineTo(ct.x - ct.vx * 15, ct.y - ct.vy * 15); 
        ctx.strokeStyle = `rgba(220, 235, 255, 0.85)`; 
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#fff'; 
        ctx.shadowBlur = 12; 
        ctx.stroke(); 
        
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ct.x, ct.y, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
    
    if (COMETS.length > 0) {
        activeAsteroid = COMETS[0];
        const dx = activeAsteroid.x - CX;
        const dy = activeAsteroid.y - CY;
        targetTiltY = (dx / (W / 2)) * 30;
        targetTiltX = -(dy / (H / 2)) * 30;
    } else {
        targetTiltX = 0;
        targetTiltY = 0;
    }

    currentTiltX += (targetTiltX - currentTiltX) * 0.04;
    currentTiltY += (targetTiltY - currentTiltY) * 0.04;

    if (Math.abs(targetTiltX - currentTiltX) < 0.05) currentTiltX = targetTiltX;
    if (Math.abs(targetTiltY - currentTiltY) < 0.05) currentTiltY = targetTiltY;

    svgElement.style.transform = `rotateX(${currentTiltX}deg) rotateY(${currentTiltY}deg)`;

    currentProximity += (targetProximity - currentProximity) * 0.09;

    if (currentProximity > 0.002 || hexBoostAngle !== 0) {
        hexBoostAngle = (hexBoostAngle + currentProximity * HEX_MAX_DEG_PER_FRAME) % 360;
        hexSpinBoost.style.transform = `rotate(${hexBoostAngle.toFixed(2)}deg)`;

        const r = PUPIL_REST_R + (PUPIL_MAX_R - PUPIL_REST_R) * currentProximity;
        pupil.setAttribute('r', r.toFixed(2));
    }
}

function drawUniverse(){
    tiempoSegundos+=.006;
    ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);

    NEBULOSAS.forEach((nb,i)=>{
        const pulse=.5+.5*Math.sin(tiempoSegundos*.35+i*2.1);
        if (!nb._g) {
            const g = ctx.createRadialGradient(CX+nb.desfaseX,CY+nb.desfaseY,0,CX+nb.desfaseX,CY+nb.desfaseY,nb.r);
            g.addColorStop(0,`hsla(${nb.tono},72%,60%,.9)`);
            g.addColorStop(1,'rgba(0,0,0,0)');
            nb._g = g;
        }
        ctx.globalAlpha=nb.a*pulse;
        ctx.fillStyle=nb._g;
        ctx.beginPath();ctx.arc(CX+nb.desfaseX,CY+nb.desfaseY,nb.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    ctx.save();ctx.globalAlpha=.09;
    for(let bi=0;bi<4;bi++){
        const bA=bi*Math.PI/4+tiempoSegundos*.014;
        const bG=ctx.createLinearGradient(CX+Math.cos(bA)*escalaMinima,CY+Math.sin(bA)*escalaMinima,CX-Math.cos(bA)*escalaMinima,CY-Math.sin(bA)*escalaMinima);
        bG.addColorStop(0,'rgba(0,0,0,0)');bG.addColorStop(.35,`hsla(${228+bi*14},62%,55%,.5)`);
        bG.addColorStop(.5,`hsla(${238+bi*14},68%,62%,.72)`);bG.addColorStop(.65,`hsla(${228+bi*14},62%,55%,.5)`);bG.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=bG;ctx.fillRect(0,0,W,H);
    }
    ctx.restore();

    STARS.forEach(s=>{
        s.a+=s.spd;
        const rawX = CX + Math.cos(s.a) * s.d;
        const rawY = CY + Math.sin(s.a) * s.d;
        const L = applyLens(rawX, rawY);
        const b = s.br * (.42 + .58 * Math.sin(tiempoSegundos*2.5 + s.a*4.5));
        drawStar(L.x, L.y, s.r, L.angle, L.stretch,
            `hsl(${s.tono},72%,78%)`,
            `hsl(${s.tono},92%,86%)`,
            s.r*1.8, b*.85);
    });

    CLUSTERS.forEach(cl=>{
        cl.stars.forEach(st=>{
            const b=st.br*(.4+.6*Math.sin(tiempoSegundos*1.8+st.ph));
            const rawX = cl.cx+st.dx, rawY = cl.cy+st.dy;
            const L = applyLens(rawX, rawY);
            drawStar(L.x, L.y, st.r, L.angle, L.stretch,
                `hsl(${st.tono},75%,82%)`,
                `hsl(${st.tono},90%,88%)`,
                st.r*2, b*.7);
        });
    });

    ctx.save();ctx.globalAlpha=.22;
    for(let i=0;i<18;i++){
        const ang=(i/18)*Math.PI*2+tiempoSegundos*.09;
        const rL=escalaMinima*(.28+.1*Math.sin(tiempoSegundos*.55+i));
        const rG=ctx.createLinearGradient(CX,CY,CX+Math.cos(ang)*rL,CY+Math.sin(ang)*rL);
        rG.addColorStop(0,`hsla(${228+i*3.4},82%,78%,.88)`);
        rG.addColorStop(.5,`hsla(${228+i*3.4},65%,60%,.22)`);rG.addColorStop(1,'rgba(0,0,0,0)');
        ctx.strokeStyle=rG;ctx.lineWidth=2+Math.sin(tiempoSegundos*1.6+i)*1;
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(ang)*rL,CY+Math.sin(ang)*rL);ctx.stroke();
    }
    ctx.restore();

    ORBS.forEach(orb=>{
        orb.angle+=orb.spd;
        const rawX = CX + Math.cos(orb.angle) * orb.orbitR;
        const rawY = CY + Math.sin(orb.angle) * orb.orbitR * Math.abs(Math.sin(orb.tilt));
        const z = Math.sin(orb.angle) * Math.cos(orb.tilt);
        const depth = .55 + .45 * ((z + 1) / 2);
        const L = applyLens(rawX, rawY);
        const oa = orb.a * depth * (.48 + .52 * Math.sin(tiempoSegundos*1.25 + orb.phase));
        drawStar(L.x, L.y, orb.r*depth, L.angle, L.stretch,
            `hsl(${orb.tono},82%,78%)`,
            `hsl(${orb.tono},92%,85%)`,
            orb.r*3*depth, Math.max(oa,0));
    });

    for(let di=0;di<5;di++){
        const dr=escalaMinima*(.06+di*.072)+Math.sin(tiempoSegundos*.72+di*1.45)*10;
        const da=(.07-di*.008)*(.52+.48*Math.sin(tiempoSegundos*.58+di*1.22));
        if (da <= 0) continue;
        ctx.globalAlpha=da;
        ctx.strokeStyle=`hsla(${246+di*8},78%,74%,.88)`;
        ctx.lineWidth=.9+di*.15;
        ctx.beginPath();ctx.arc(CX,CY,dr,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;

    FLOATERS.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;
        if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        const L = applyLens(p.x, p.y);
        const fa = p.a * (.42 + .58 * Math.sin(tiempoSegundos*1.25 + p.ph));
        drawStar(L.x, L.y, p.r, L.angle, L.stretch,
            `hsl(${p.tono},70%,78%)`,
            `hsl(${p.tono},88%,86%)`,
            p.r*2.2, Math.max(fa,0));
    });

    drawComets();

    const beat=0.5+0.5*Math.sin(tiempoSegundos*2.3)*Math.sin(tiempoSegundos*3.1);
    const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,55+beat*35);
    bg.addColorStop(0,`rgba(140,90,255,${beat*0.25})`);bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(CX,CY,100+beat*35,0,Math.PI*2);ctx.fill();

    const n   = 3 + (Math.sin(tiempoSegundos * 1.15) * 0.5 + 0.5) * 5.5;
    const rot = tiempoSegundos * 0.5;
    morphPoly.setAttribute('points', buildPolygonPointsString(n, 200, rot));

    requestAnimationFrame(drawUniverse);
}

drawUniverse();

window.addEventListener('resize', () => {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    recomputeRuneRadius();
}, { passive: true });
</script>
