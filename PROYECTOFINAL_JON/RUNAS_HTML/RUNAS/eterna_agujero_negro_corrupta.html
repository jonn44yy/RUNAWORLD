<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html {
    overflow:hidden;
    height:100vh;
    width:100vw;
}

body {
    width:100vw;
    height:100vh;
    background:#000000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    overscroll-behavior:none;
    --evo: 0;
}

/* ===============================
   CAPAS EXTERNAS: BACKGROUND / MARCO
   =============================== */

.runa-marco-frame {
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    border:0;
    margin:0;
    padding:0;
    pointer-events:none;
    background:transparent;
    z-index:50;
}

.runa-background-frame {
    z-index:0;
}

.runa-marco-frame {
    z-index:50;
}

/* ===============================
   TU CANVAS ACTUAL
   =============================== */

canvas {
    display:block;
}

#bg {
    position:fixed;
    inset:0;
    z-index:1;
}

/* Viñeta propia de la runa.
   Queda encima del canvas, debajo de la runa y debajo del marco. */
#vig {
    position:fixed;
    inset:0;
    z-index:5;
    pointer-events:none;
    background:radial-gradient(ellipse at center,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0.45) 60%,
        rgba(0,0,0,0.97) 100%);
}

/* ===============================
   RUNA
   =============================== */

#wrap {
    position:relative;
    z-index:10;
    display:flex;
    justify-content:center;
    align-items:center;
    animation: eclipse-drift 11s ease-in-out infinite;
    perspective:1200px;
    will-change: transform;
}

@keyframes eclipse-drift {
    0%   { transform: translateY(0px) translateX(0px); }
    14%  { transform: translateY(-8px) translateX(3px); }
    28%  { transform: translateY(-12px) translateX(-5px); }
    43%  { transform: translateY(-4px) translateX(8px); }
    57%  { transform: translateY(7px) translateX(-3px); }
    71%  { transform: translateY(12px) translateX(6px); }
    85%  { transform: translateY(3px) translateX(-8px); }
    100% { transform: translateY(0px) translateX(0px); }
}

#eterna-svg {
    width:min(680px,88vw);
    height:min(680px,88vw);
    filter:
        drop-shadow(0 0 calc(20px + var(--evo) * 30px) rgba(255,160,60,0.85))
        drop-shadow(0 0 calc(50px + var(--evo) * 60px) rgba(190,40,20,0.55))
        drop-shadow(0 0 calc(90px + var(--evo) * 80px) rgba(60,10,50,0.40));
    transform-style: preserve-3d;
    will-change: transform;
}

/* Rotaciones inestables — el eclipse no es estable, gira con jerks */
.rs  { animation: ec-rot-corrupt  49s cubic-bezier(.12,.8,.88,.2) infinite; transform-origin:center; }
.rm  { animation: ec-rot-corrupt  23s cubic-bezier(.25,.5,.75,.5) infinite; transform-origin:center; }
.rf  { animation: ec-rot-corrupt   9s cubic-bezier(.55,0,.45,1)   infinite; transform-origin:center; }
.rv  { animation: ec-rot-corrupt  31s cubic-bezier(.1,.9,.9,.1)   infinite reverse; transform-origin:center; }
.rvs { animation: ec-rot-corrupt  67s cubic-bezier(.3,.7,.7,.3)   infinite reverse; transform-origin:center; }

@keyframes ec-rot-corrupt {
    0%   { transform: rotate(0deg); }
    18%  { transform: rotate(68deg); }
    19%  { transform: rotate(65deg); }
    45%  { transform: rotate(162deg); }
    46%  { transform: rotate(168deg); }
    72%  { transform: rotate(271deg); }
    73%  { transform: rotate(268deg); }
    100% { transform: rotate(360deg); }
}

/* Punto de fuga — pequeña brecha en el eclipse, breve y brillante */
.singularity {
    transform-origin: 500px 500px;
    transform-box: fill-box;
    animation: ec-sing 3.4s cubic-bezier(.7,0,.1,1) infinite;
    mix-blend-mode: screen;
    will-change: transform, opacity;
}

@keyframes ec-sing {
    0%   { transform: scale(.3);  opacity: .55; }
    20%  { transform: scale(.95); opacity: .9; }
    50%  { transform: scale(.55); opacity: .4; }
    80%  { transform: scale(1.0); opacity: .8; }
    100% { transform: scale(.3);  opacity: .55; }
}

/* Grietas térmicas — el eclipse fractura el tejido alrededor */
.crystal-branch {
    stroke-dasharray: 28;
    stroke-dashoffset: 28;
    opacity: 0;
    will-change: stroke-dashoffset, opacity;
}

.crystal-branch:nth-of-type(1) {animation:ec-crack 2.1s ease-out infinite}
.crystal-branch:nth-of-type(2) {animation:ec-crack 1.9s ease-out infinite .21s}
.crystal-branch:nth-of-type(3) {animation:ec-crack 2.4s ease-out infinite .44s}
.crystal-branch:nth-of-type(4) {animation:ec-crack 1.7s ease-out infinite .65s}
.crystal-branch:nth-of-type(5) {animation:ec-crack 2.2s ease-out infinite .88s}
.crystal-branch:nth-of-type(6) {animation:ec-crack 1.8s ease-out infinite 1.10s}
.crystal-branch:nth-of-type(7) {animation:ec-crack 2.0s ease-out infinite 1.32s}
.crystal-branch:nth-of-type(8) {animation:ec-crack 2.3s ease-out infinite 1.55s}

@keyframes ec-crack {
    0%   { stroke-dashoffset: 28; opacity: 0; }
    18%  { opacity: .8; }
    55%  { stroke-dashoffset: 0; opacity: .9; }
    80%  { stroke-dashoffset: 0; opacity: .55; }
    100% { stroke-dashoffset: 0; opacity: 0; }
}

.peri-text {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    fill: #b04020;
    letter-spacing: 2.4px;
    opacity: .55;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="vig"></div>
<div id="wrap">
<svg id="eterna-svg" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente del borde brillante de la corona — ámbar caliente que rodea la luna negra -->
    <radialGradient id="gCoronaEdge" cx="50%" cy="50%" r="50%">

  <!-- Anillo medio — rojo sangre profundo -->

  <!-- ═══════════════════════════════════════════════════════
       NÚCLEO DEL ECLIPSE — luna negra absoluta + labio de corona
       (mantiene los IDs `pupil` y `hexSpinBoost` para el JS existente)
       ═══════════════════════════════════════════════════════ -->

  <!-- Borde difuso de corona (el resplandor que escapa por detrás de la luna) -->

  <!-- LUNA: vacío negro absoluto, perfecto, fill puro -->
  <circle id="moon" cx="500" cy="500" r="200" fill="#000000"/>

  <!-- Labio brillante exacto del eclipse (la línea fina entre luna y corona) -->
  <circle cx="500" cy="500" r="200" fill="none" stroke="#ffd080" stroke-width="1.4" opacity=".85" filter="url(#fg)"/>
  <circle cx="500" cy="500" r="203" fill="none" stroke="#ff7020" stroke-width="2.4" opacity=".55" filter="url(#fgSoft)"/>

  <!-- Pupila: brecha minúscula brillante en el centro (puntito de luz que pulsa con cometas cercanos) -->
  <circle id="pupil" cx="500" cy="500" r="6" fill="url(#gPupil)"/>

  <!-- Singularidad: destello cíclico encima de la pupila -->

  <!-- Partículas orbitales en la corona — naranjas cálidos (reducidas de 4 grupos a 2 para perf) -->
  <g style="animation:ec-rot-corrupt 12s linear infinite;transform-origin:500px 500px" opacity=".88">
    <circle cx="500" cy="265" r="3.6" fill="#ff8030"/>
    <circle cx="735" cy="500" r="3.0" fill="#ff5028"/>
    <circle cx="500" cy="735" r="3.6" fill="#ff8030"/>
    <circle cx="265" cy="500" r="3.0" fill="#cc3018"/>

  <g style="animation:ec-rot-corrupt 6.2s linear infinite reverse;transform-origin:500px 500px" opacity=".75">
    <circle cx="500" cy="370" r="2.6" fill="#ffa040"/>
    <circle cx="630" cy="500" r="2.2" fill="#ee5020"/>
    <circle cx="500" cy="630" r="2.6" fill="#ffa040"/>

<script>
'use strict';

const c   = document.getElementById('bg');
const ctx = c.getContext('2d', { alpha: false });

let W = c.width  = window.innerWidth;
let H = c.height = window.innerHeight;

let CX = W / 2;
let CY = H / 2;

/* Centro real de la runa/SVG.
   Se recalcula para corregir el desplazamiento en móvil. */
let RCX = CX;
let RCY = CY;

let escalaMinima = Math.min(W, H);
const R = (a, b) => a + Math.random() * (b - a);

const isMobile = escalaMinima < 768;

/* ═══════════════════════════════════════════════════════════
   PARTÍCULAS DE FONDO — números reducidos para móvil
   ═══════════════════════════════════════════════════════════ */
const STAR_COUNT    = isMobile ? 90  : 150;
const FLOATER_COUNT = isMobile ? 14  : 26;
const ORB_COUNT     = isMobile ? 20  : 34;

/* Estrellas — mayoría rojo/naranja, algunas moradas */
const STARS = Array.from({ length: STAR_COUNT }, () => ({
    a: R(0, Math.PI * 2),
    d: R(20, escalaMinima * .68),
    r: R(.18, 1.7),
    br: R(.2, .85),
    spd: R(.00010, .00060),
    tono: Math.random() < .65 ? R(8, 36) : (Math.random() < .5 ? R(280, 320) : R(0, 18))
}));

/* Nebulosas en sangre/morado/quemado */
const NEBULOSAS = [
    { desfaseX: R(-escalaMinima*.3, escalaMinima*.3),  desfaseY: R(-escalaMinima*.3, escalaMinima*.3),
      r: escalaMinima * R(.22, .42), tono: R(345, 365), a: R(.05, .10) },
    { desfaseX: R(-escalaMinima*.25, escalaMinima*.25), desfaseY: R(-escalaMinima*.25, escalaMinima*.25),
      r: escalaMinima * R(.16, .30), tono: R(280, 305), a: R(.04, .08) },
    { desfaseX: R(-escalaMinima*.2, escalaMinima*.2),  desfaseY: R(-escalaMinima*.2, escalaMinima*.2),
      r: escalaMinima * R(.12, .25), tono: R(15, 32),   a: R(.03, .07) },
];

const ORBS = Array.from({ length: ORB_COUNT }, () => ({
    angle:  R(0, Math.PI * 2),
    orbitR: R(escalaMinima * .06, escalaMinima * .42),
    tilt:   R(0, Math.PI),
    spd:    R(.005, .024) * (Math.random() > .5 ? 1 : -1),
    r:      R(.6, 2.8),
    a:      R(.15, .55),
    tono:   Math.random() < .65 ? R(10, 38) : R(280, 320),
    phase:  R(0, Math.PI * 2)
}));

const FLOATERS = Array.from({ length: FLOATER_COUNT }, () => ({
    x: R(0, W), y: R(0, H),
    vx: R(-.16, .16), vy: R(-.12, .12),
    r: R(.3, 1.7), a: R(.05, .35),
    tono: Math.random() < .72 ? R(8, 36) : R(280, 318),
    ph: R(0, Math.PI * 2)
}));

const CLUSTERS = Array.from({ length: isMobile ? 3 : 5 }, () => ({
    cx: CX + R(-W * .42, W * .42),
    cy: CY + R(-H * .42, H * .42),
    stars: Array.from({ length: ~~R(4, 9) }, () => ({
        dx: R(-50, 50), dy: R(-50, 50),
        r: R(.2, 1.1), br: R(.3, .82),
        tono: Math.random() < .65 ? R(8, 32) : R(280, 315),
        ph: R(0, Math.PI * 2)
    }))
}));

/* ═══════════════════════════════════════════════════════════
   COMETAS / METEORITOS + FLASHES
   ═══════════════════════════════════════════════════════════ */
const COMETS = [];
const FLASHES = [];
const svgElement = document.getElementById('eterna-svg');

let lastMeteorTime = Date.now();
let meteorInterval = R(3500, 5500);

let targetTiltX = 0, targetTiltY = 0;
let currentTiltX = 0, currentTiltY = 0;
let tiempoSegundos = 0;

const hexSpinBoost = document.getElementById('hexSpinBoost');
const pupil        = document.getElementById('pupil');
const coronaEdge   = document.getElementById('coronaEdge');

let runeRadius   = 340;
let runeRadiusSq = runeRadius * runeRadius;
let runeScreenW  = 680;

/* Centro y tamaño REAL de la runa.
   Esto corrige el bug móvil donde la corona/fondo quedaba unos px desplazada. */
function syncRuneMetrics() {
    const rect = svgElement.getBoundingClientRect();

    if (rect.width > 0 && rect.height > 0) {
        RCX = rect.left + rect.width / 2;
        RCY = rect.top  + rect.height / 2;

        runeScreenW  = rect.width;
        runeRadius   = rect.width * 0.34;
        runeRadiusSq = runeRadius * runeRadius;
    }
}

syncRuneMetrics();

let currentProximity   = 0;
let hexBoostAngle      = 0;
const PUPIL_REST_R     = 6;
const PUPIL_MAX_R      = 22;
const HEX_MAX_DEG_PER_FRAME = 9;

/* ═══════════════════════════════════════════════════════════
   SISTEMA DE EVOLUCIÓN
   ═══════════════════════════════════════════════════════════ */
let evolution = 0;
const EVOLUTION_PER_SEC   = 1 / 60;
const EVOLUTION_PER_COMET = 0.045;
let evoLastSync = 0;

/* Lente gravitacional desactivada */
const _L = { x:0, y:0, stretch:1, angle:0, active:false };
function applyLens(px, py) {
    _L.x = px;
    _L.y = py;
    _L.stretch = 1;
    _L.active = false;
    return _L;
}

/* ═══════════════════════════════════════════════════════════
   DIBUJADO DE ESTRELLA OPTIMIZADO
   ═══════════════════════════════════════════════════════════ */
const SHADOW_RADIUS_CUTOFF = 0.85;
const SHADOW_ALPHA_CUTOFF  = 0.22;

function drawStar(px, py, r, stretchAngle, stretch, fillStyle, shadowColor, shadowBlur, alpha) {
    const useShadow = (r >= SHADOW_RADIUS_CUTOFF && alpha >= SHADOW_ALPHA_CUTOFF);
    const stretched = stretch > 1.02;

    if (!useShadow && !stretched) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = fillStyle;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        return;
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = fillStyle;

    if (useShadow) {
        ctx.shadowColor = shadowColor;
        ctx.shadowBlur  = shadowBlur;
    }

    if (stretched) {
        ctx.translate(px, py);
        ctx.rotate(stretchAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * stretch, r, 0, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   POLÍGONO MORFO
   ═══════════════════════════════════════════════════════════ */
const morphPoly    = document.getElementById('morphPoly');
const POLY_SAMPLES = 36;
const _polyBuf     = new Array(POLY_SAMPLES);
const SVG_CX = 500, SVG_CY = 500;

function buildPolygonPointsString(n, radius, rotation) {
    const nLow = n | 0;
    const nHigh = nLow + 1;
    const t = n - nLow;

    const thetaL = (Math.PI * 2) / nLow;
    const halfL = thetaL * .5;

    const thetaH = (Math.PI * 2) / nHigh;
    const halfH = thetaH * .5;

    const chL = Math.cos(halfL);
    const chH = Math.cos(halfH);

    for (let i = 0; i < POLY_SAMPLES; i++) {
        const phi = (i / POLY_SAMPLES) * Math.PI * 2;
        const ph  = phi - rotation;

        let lL = ph % thetaL;
        if (lL < 0) lL += thetaL;
        lL -= halfL;

        let lH = ph % thetaH;
        if (lH < 0) lH += thetaH;
        lH -= halfH;

        const rL = radius * chL / Math.cos(lL);
        const rH = radius * chH / Math.cos(lH);
        const rr = rL * (1 - t) + rH * t;

        _polyBuf[i] =
            (SVG_CX + Math.cos(phi) * rr).toFixed(2) + ',' +
            (SVG_CY + Math.sin(phi) * rr).toFixed(2);
    }

    return _polyBuf.join(' ');
}

/* ═══════════════════════════════════════════════════════════
   TEXTO PERIFÉRICO CORRUPTO
   ═══════════════════════════════════════════════════════════ */
const periTextPath = document.getElementById('periTextPath');
const GLYPHS = '∴∵∷∼≈≉≋≎≏⊕⊖⊗⊘⊙⊚⊛⊜⊝⊞⌬⌭⌮⍉⍟⍣⍤⍥⍦⍧𐎀𐎁𐎂𐎃𐎄𐎅𐎆𐎇𐎈ᚠᚡᚢᚣᚤᚥᚦᚧᚨᛦ✦✧✴☸⟁⟐⟠';
const GLYPHS_LEN = GLYPHS.length;
const PERI_LEN   = 90;
const _periBuf   = new Array(PERI_LEN);

for (let i = 0; i < PERI_LEN; i++) {
    _periBuf[i] = GLYPHS[(Math.random() * GLYPHS_LEN) | 0];
}

let _periCursor = 0;

function tickPeriWriter() {
    for (let k = 0; k < 8; k++) {
        _periBuf[_periCursor % PERI_LEN] = GLYPHS[(Math.random() * GLYPHS_LEN) | 0];
        _periCursor++;
    }
    periTextPath.textContent = _periBuf.join('');
}

periTextPath.textContent = _periBuf.join('');
setInterval(tickPeriWriter, 130);

/* ═══════════════════════════════════════════════════════════
   METEORITOS
   ═══════════════════════════════════════════════════════════ */
const GRAVITY_STRENGTH = 0.0085;
const MAX_COMETS       = isMobile ? 5 : 8;

function spawnMeteor() {
    const edge = Math.floor(Math.random() * 4);
    let sx, sy;

    switch (edge) {
        case 0: sx = R(0, W); sy = -60; break;
        case 1: sx = W + 60;  sy = R(0, H); break;
        case 2: sx = R(0, W); sy = H + 60; break;
        default: sx = -60;    sy = R(0, H); break;
    }

    const dx = RCX - sx;
    const dy = RCY - sy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    const speed = R(1.8, 3.5);
    const tangX = -dy / dist;
    const tangY = dx / dist;
    const tangFactor = R(-0.45, 0.45);

    COMETS.push({
        x: sx,
        y: sy,
        vx: (dx / dist) * speed + tangX * tangFactor * speed,
        vy: (dy / dist) * speed + tangY * tangFactor * speed,
        life: 1.0,
        tail: [],
        color: Math.random() < .65
            ? `rgba(255,${~~R(120,180)},${~~R(40,80)},`
            : `rgba(${~~R(200,255)},${~~R(40,90)},${~~R(80,140)},`
    });
}

/* ═══════════════════════════════════════════════════════════
   FLASH DE ABSORCIÓN
   ═══════════════════════════════════════════════════════════ */
function spawnFlash() {
    const cap = isMobile ? 5 : 8;

    if (FLASHES.length >= cap) FLASHES.shift();

    FLASHES.push({
        age: 0,
        ttl: 42,
        size: escalaMinima * R(.04, .08),
        intensity: R(.85, 1.0)
    });

    evolution = Math.min(1, evolution + EVOLUTION_PER_COMET);
}

function drawFlashes() {
    if (FLASHES.length === 0) return;

    const baseR = escalaMinima * (0.35 + evolution * 0.15);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    for (let i = FLASHES.length - 1; i >= 0; i--) {
        const f = FLASHES[i];
        f.age++;

        if (f.age >= f.ttl) {
            FLASHES.splice(i, 1);
            continue;
        }

        const t      = f.age / f.ttl;
        const ease   = 1 - (1 - t) * (1 - t);
        const radius = f.size + baseR * ease;
        const alpha  = (1 - t) * f.intensity;

        ctx.strokeStyle = `rgba(255,${~~(140 + (1 - t) * 100)},${~~(40 + (1 - t) * 60)},${alpha.toFixed(3)})`;
        ctx.lineWidth   = 2 + (1 - t) * 5;
        ctx.shadowColor = `rgba(255,90,30,${(alpha * .9).toFixed(3)})`;
        ctx.shadowBlur  = 28;
        ctx.beginPath();
        ctx.arc(RCX, RCY, radius, 0, Math.PI * 2);
        ctx.stroke();

        if (t < 0.4) {
            const fillA = (1 - t / 0.4) * 0.45 * f.intensity;
            const g = ctx.createRadialGradient(RCX, RCY, 0, RCX, RCY, radius * 0.9);

            g.addColorStop(0,    `rgba(255,220,150,${fillA.toFixed(3)})`);
            g.addColorStop(0.45, `rgba(255,90,30,${(fillA * .6).toFixed(3)})`);
            g.addColorStop(1,    'rgba(0,0,0,0)');

            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(RCX, RCY, radius * 0.9, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.restore();
}

function drawComets() {
    const now = Date.now();
    const spawnAccel = 1 - evolution * 0.4;

    if (COMETS.length < MAX_COMETS && now - lastMeteorTime > meteorInterval * spawnAccel) {
        spawnMeteor();
        lastMeteorTime = now;
        meteorInterval = R(2500, 5000);
    }

    let targetProximity = 0;
    const absorbRadius = runeRadius * (0.22 + evolution * 0.15);

    for (let i = COMETS.length - 1; i >= 0; i--) {
        const ct = COMETS[i];

        const gdx = RCX - ct.x;
        const gdy = RCY - ct.y;
        const gdist2 = gdx * gdx + gdy * gdy;
        const gdist  = Math.sqrt(gdist2) || 1;

        const safeD  = Math.max(gdist, 30);
        const gAccel = GRAVITY_STRENGTH * (escalaMinima * escalaMinima) / (safeD * safeD);

        ct.vx += (gdx / gdist) * gAccel;
        ct.vy += (gdy / gdist) * gAccel;

        const speed = Math.sqrt(ct.vx * ct.vx + ct.vy * ct.vy);
        const maxSpd = 28;

        if (speed > maxSpd) {
            ct.vx = ct.vx / speed * maxSpd;
            ct.vy = ct.vy / speed * maxSpd;
        }

        ct.x += ct.vx;
        ct.y += ct.vy;

        ct.tail.push({ x: ct.x, y: ct.y });
        if (ct.tail.length > 18) ct.tail.shift();

        if (gdist2 < runeRadiusSq * 4) {
            const p = 1 - gdist / (runeRadius * 2);
            if (p > targetProximity) targetProximity = Math.min(p, 1);
        }

        const wasAlive = ct.life > 0;

        if (gdist < absorbRadius) {
            ct.life -= 0.08;
        }

        if (wasAlive && ct.life <= 0) {
            spawnFlash();
        }

        if (ct.life <= 0 || gdist > escalaMinima * 1.8) {
            COMETS.splice(i, 1);
            continue;
        }

        ctx.save();
        ctx.globalAlpha = ct.life * 0.92;

        if (ct.tail.length > 2) {
            for (let t = 1; t < ct.tail.length; t++) {
                const tf = t / ct.tail.length;
                const alpha = tf * 0.75 * ct.life;

                ctx.beginPath();
                ctx.moveTo(ct.tail[t - 1].x, ct.tail[t - 1].y);
                ctx.lineTo(ct.tail[t].x, ct.tail[t].y);
                ctx.strokeStyle = ct.color + alpha.toFixed(2) + ')';
                ctx.lineWidth   = 1.2 + tf * 1.6;
                ctx.shadowColor = ct.color + '0.6)';
                ctx.shadowBlur  = 8;
                ctx.stroke();
            }
        }

        const headR = 5 * ct.life;

        if (headR > 0.3) {
            ctx.shadowBlur  = 18 * ct.life;
            ctx.shadowColor = ct.color + '0.9)';
            ctx.fillStyle   = '#ffffff';
            ctx.beginPath();
            ctx.arc(ct.x, ct.y, headR, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    if (COMETS.length > 0) {
        const closest = COMETS.reduce((best, ct) => {
            const d = (ct.x - RCX) ** 2 + (ct.y - RCY) ** 2;
            return d < best.d ? { d, ct } : best;
        }, { d: Infinity, ct: null }).ct;

        if (closest) {
            targetTiltY = ((closest.x - RCX) / (W / 2)) * 22;
            targetTiltX = -((closest.y - RCY) / (H / 2)) * 22;
        }
    } else {
        targetTiltX = 0;
        targetTiltY = 0;
    }

    currentTiltX += (targetTiltX - currentTiltX) * 0.04;
    currentTiltY += (targetTiltY - currentTiltY) * 0.04;

    svgElement.style.transform = `rotateX(${currentTiltX.toFixed(2)}deg) rotateY(${currentTiltY.toFixed(2)}deg)`;

    currentProximity += (targetProximity - currentProximity) * 0.09;

    if (currentProximity > 0.002 || hexBoostAngle !== 0) {
        hexBoostAngle = (hexBoostAngle + currentProximity * HEX_MAX_DEG_PER_FRAME) % 360;
        hexSpinBoost.style.transform = `rotate(${hexBoostAngle.toFixed(2)}deg)`;

        const rp = PUPIL_REST_R + (PUPIL_MAX_R - PUPIL_REST_R) * currentProximity;
        pupil.setAttribute('r', rp.toFixed(2));
    }
}

/* ═══════════════════════════════════════════════════════════
   CORONA
   ═══════════════════════════════════════════════════════════ */
function drawCorona() {
    const moonR = runeScreenW * 0.20;

    const innerR = moonR * 0.98;
    const outerR = moonR * (2.6 + evolution * 1.2);

    const breath    = 0.92 + 0.08 * Math.sin(tiempoSegundos * 1.4);
    const intensity = (0.55 + evolution * 0.45) * breath;

    const g = ctx.createRadialGradient(RCX, RCY, innerR, RCX, RCY, outerR);

    g.addColorStop(0.00, `rgba(255,220,150,${(0.95 * intensity).toFixed(3)})`);
    g.addColorStop(0.08, `rgba(255,150,60, ${(0.85 * intensity).toFixed(3)})`);
    g.addColorStop(0.22, `rgba(220,70,40,  ${(0.65 * intensity).toFixed(3)})`);
    g.addColorStop(0.45, `rgba(120,30,40,  ${(0.40 * intensity).toFixed(3)})`);
    g.addColorStop(0.72, `rgba(50,15,55,   ${(0.22 * intensity).toFixed(3)})`);
    g.addColorStop(1.00, 'rgba(0,0,0,0)');

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    const numStreamers = isMobile ? 6 : 9;
    const streamerLen  = outerR * (0.85 + evolution * 0.3);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.18 + evolution * 0.20;

    for (let i = 0; i < numStreamers; i++) {
        const ang    = (i / numStreamers) * Math.PI * 2 + tiempoSegundos * 0.06;
        const wobble = Math.sin(tiempoSegundos * 0.8 + i * 1.7) * 0.15;
        const len    = streamerLen * (0.75 + wobble);

        const sx = RCX + Math.cos(ang) * innerR;
        const sy = RCY + Math.sin(ang) * innerR;
        const ex = RCX + Math.cos(ang) * len;
        const ey = RCY + Math.sin(ang) * len;

        const sg = ctx.createLinearGradient(sx, sy, ex, ey);
        sg.addColorStop(0,    `hsla(${22 + i * 4},85%,55%,.85)`);
        sg.addColorStop(0.55, `hsla(${10 + i * 5},78%,38%,.30)`);
        sg.addColorStop(1,    'rgba(0,0,0,0)');

        ctx.strokeStyle = sg;
        ctx.lineWidth   = 1.4 + Math.sin(tiempoSegundos * 1.2 + i) * 0.7;

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
    }

    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   LOOP PRINCIPAL
   ═══════════════════════════════════════════════════════════ */
let lastFrame = performance.now();

function drawUniverse(ts) {
    const now = ts || performance.now();
    const dtMs = now - lastFrame;
    lastFrame = now;

    const dt = Math.min(dtMs, 50) / 1000;

    tiempoSegundos += 0.006;

    /* Recalcula el centro real del SVG cada frame.
       Esto también sigue la deriva de #wrap. */
    syncRuneMetrics();

    evolution = Math.min(1, evolution + EVOLUTION_PER_SEC * dt);

    if (Math.abs(evolution - evoLastSync) > 0.02) {
        document.body.style.setProperty('--evo', evolution.toFixed(3));
        evoLastSync = evolution;

        if (coronaEdge) {
            const newR = 240 + evolution * 22;
            coronaEdge.setAttribute('r', newR.toFixed(1));
        }
    }

    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    NEBULOSAS.forEach((nb, i) => {
        const pulse = .5 + .5 * Math.sin(tiempoSegundos * .32 + i * 2.1);

        if (!nb._g) {
            const g = ctx.createRadialGradient(
                CX + nb.desfaseX,
                CY + nb.desfaseY,
                0,
                CX + nb.desfaseX,
                CY + nb.desfaseY,
                nb.r
            );

            g.addColorStop(0, `hsla(${nb.tono},68%,38%,.85)`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            nb._g = g;
        }

        ctx.globalAlpha = nb.a * pulse;
        ctx.fillStyle   = nb._g;
        ctx.beginPath();
        ctx.arc(CX + nb.desfaseX, CY + nb.desfaseY, nb.r, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.globalAlpha = 1;

    STARS.forEach(s => {
        s.a += s.spd;

        const rawX = CX + Math.cos(s.a) * s.d;
        const rawY = CY + Math.sin(s.a) * s.d;
        const L = applyLens(rawX, rawY);
        const b = s.br * (.42 + .58 * Math.sin(tiempoSegundos * 2.5 + s.a * 4.5));

        drawStar(
            L.x, L.y, s.r, L.angle, L.stretch,
            `hsl(${s.tono},65%,72%)`,
            `hsl(${s.tono},88%,80%)`,
            s.r * 1.8,
            b * .85
        );
    });

    CLUSTERS.forEach(cl => {
        cl.stars.forEach(st => {
            const b = st.br * (.4 + .6 * Math.sin(tiempoSegundos * 1.8 + st.ph));
            const rawX = cl.cx + st.dx;
            const rawY = cl.cy + st.dy;
            const L = applyLens(rawX, rawY);

            drawStar(
                L.x, L.y, st.r, L.angle, L.stretch,
                `hsl(${st.tono},70%,75%)`,
                `hsl(${st.tono},85%,82%)`,
                st.r * 2,
                b * .7
            );
        });
    });

    drawCorona();

    ORBS.forEach(orb => {
        orb.angle += orb.spd;

        const rawX = RCX + Math.cos(orb.angle) * orb.orbitR;
        const rawY = RCY + Math.sin(orb.angle) * orb.orbitR * Math.abs(Math.sin(orb.tilt));

        const z   = Math.sin(orb.angle) * Math.cos(orb.tilt);
        const dep = .55 + .45 * ((z + 1) / 2);
        const L   = applyLens(rawX, rawY);
        const oa  = orb.a * dep * (.48 + .52 * Math.sin(tiempoSegundos * 1.25 + orb.phase));

        drawStar(
            L.x, L.y, orb.r * dep, L.angle, L.stretch,
            `hsl(${orb.tono},78%,70%)`,
            `hsl(${orb.tono},90%,78%)`,
            orb.r * 3 * dep,
            Math.max(oa, 0)
        );
    });

    for (let di = 0; di < 4; di++) {
        const dr = escalaMinima * (.06 + di * .072) + Math.sin(tiempoSegundos * .70 + di * 1.45) * 10;
        const da = (.06 - di * .008) * (.5 + .5 * Math.sin(tiempoSegundos * .55 + di * 1.2));

        if (da <= 0) continue;

        ctx.globalAlpha = da;
        ctx.strokeStyle = `hsla(${15 + di * 12},75%,50%,.85)`;
        ctx.lineWidth   = .8 + di * .14;
        ctx.beginPath();
        ctx.arc(RCX, RCY, dr, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.globalAlpha = 1;

    FLOATERS.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        const L  = applyLens(p.x, p.y);
        const fa = p.a * (.42 + .58 * Math.sin(tiempoSegundos * 1.25 + p.ph));

        drawStar(
            L.x, L.y, p.r, L.angle, L.stretch,
            `hsl(${p.tono},65%,70%)`,
            `hsl(${p.tono},82%,78%)`,
            p.r * 2.2,
            Math.max(fa, 0)
        );
    });

    drawComets();
    drawFlashes();

    const morphMin = 3;
    const morphMax = 9.5 + evolution * 2;
    const n = morphMin + (Math.sin(tiempoSegundos * 1.35) * 0.5 + 0.5) * (morphMax - morphMin);
    const rot = tiempoSegundos * 0.48;

    morphPoly.setAttribute('points', buildPolygonPointsString(n, 200, rot));

    requestAnimationFrame(drawUniverse);
}

requestAnimationFrame(drawUniverse);

/* ═══════════════════════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;

    CX = W / 2;
    CY = H / 2;

    escalaMinima = Math.min(W, H);

    NEBULOSAS.forEach(nb => {
        nb._g = null;
    });

    syncRuneMetrics();
}, { passive: true });
