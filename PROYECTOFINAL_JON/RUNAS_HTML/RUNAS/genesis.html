<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GÉNESIS — Fractal Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --g0: #000501;
  --g1: #001a05;
  --g2: #003d0e;
  --g3: #00701a;
  --g4: #00aa2a;
  --g5: #00e63a;
  --g6: #7fff88;
  --g7: #e0ffe4;
  --white: #f0fff2;
  --black: #000301;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:var(--black);
  overflow:hidden;
  display:flex; justify-content:center; align-items:center;
  font-family: 'Courier New', monospace;
}

/* ===== CAPAS ===== */
#layer-bg    { position:fixed; inset:0; z-index:1; }
#layer-spore { position:fixed; inset:0; z-index:2; pointer-events:none; }
#layer-svg   { position:relative; z-index:10; }
#layer-mold  { position:fixed; inset:0; z-index:3; pointer-events:none; }
#layer-hud   { position:fixed; inset:0; z-index:20; pointer-events:none; }

/* HUD corners — SVG fractal */
.hud-corner {
  position:absolute;
  width:110px; height:110px;
}
.hud-tl { top:14px; left:14px; }
.hud-tr { top:14px; right:14px; transform:scaleX(-1); }
.hud-bl { bottom:14px; left:14px; transform:scaleY(-1); }
.hud-br { bottom:14px; right:14px; transform:scale(-1); }

.hud-text {
  position:absolute;
  font-size:9px;
  letter-spacing:2px;
  color:rgba(0,200,50,0.45);
  text-transform:uppercase;
}
.hud-text.tl { top:28px; left:88px; }
.hud-text.tr { top:28px; right:88px; }
.hud-text.bl { bottom:28px; left:88px; }
.hud-text.br { bottom:28px; right:88px; text-align:right;}

.hud-scanline {
  position:absolute;
  left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(0,220,60,0.08), transparent);
  animation: scan 8s linear infinite;
}
@keyframes scan { from{top:0} to{top:100%} }

/* ===== TITLE ===== */
#title-wrap {
  position:fixed; bottom:10%; left:50%; transform:translateX(-50%);
  z-index:20; pointer-events:none; text-align:center;
  animation: titleFade 4s ease-out forwards;
}
@keyframes titleFade { from{opacity:0; transform:translateX(-50%) translateY(10px)} to{opacity:1; transform:translateX(-50%) translateY(0)} }
#title-main {
  font-family:'Cinzel Decorative', cursive; font-size:clamp(1.4rem,3.5vw,3.5rem);
  font-weight:900; letter-spacing:8px;
  background:linear-gradient(180deg,#e0ffe4 0%,#7fff88 25%,#00e63a 60%,#00701a 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 0 18px rgba(0,230,58,0.9));
  display:block;
}
#title-sub {
  font-family:'Cinzel', serif; font-size:clamp(0.55rem,1.2vw,0.85rem);
  letter-spacing:12px; color:rgba(127,255,136,0.75);
  text-shadow:0 0 18px rgba(0,200,50,0.6);
  display:block; margin-top:8px;
}

/* ===== SVG PRINCIPAL ===== */
#genesis-svg {
  width: min(720px, 90vw);
  height: min(720px, 90vw);
  filter: drop-shadow(0 0 60px rgba(0,180,40,0.6)) drop-shadow(0 0 120px rgba(0,100,20,0.4));
}

/* Animaciones SVG */
.spin-cw-s  { animation: spinCW 80s  linear infinite; transform-origin:500px 500px; }
.spin-ccw-s { animation: spinCCW 100s linear infinite; transform-origin:500px 500px; }
.spin-cw-m  { animation: spinCW 45s  linear infinite; transform-origin:500px 500px; }
.spin-ccw-m { animation: spinCCW 55s linear infinite; transform-origin:500px 500px; }
.spin-cw-f  { animation: spinCW 22s  linear infinite; transform-origin:500px 500px; }
.spin-ccw-f { animation: spinCCW 18s linear infinite; transform-origin:500px 500px; }
.spin-cw-vf { animation: spinCW 8s   linear infinite; transform-origin:500px 500px; }
.breathe    { animation: breathe 7s ease-in-out infinite; transform-origin:500px 500px; }
.pulse-r    { animation: pulseR 4s ease-in-out infinite; transform-origin:500px 500px; }
.wave       { animation: wave 5s ease-in-out infinite; transform-origin:500px 500px; }
.sway       { animation: sway 12s ease-in-out infinite; transform-origin:500px 500px; }

@keyframes spinCW  { to { transform: rotate(360deg); } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes pulseR  { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.03) rotate(5deg)} }
@keyframes wave    { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.97)} }
@keyframes sway    { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
</style>
</head>

    <line x1="468" y1="468" x2="455" y2="455" stroke="#eeffd0" stroke-width="1.2">
      <animate attributeName="x2" values="455;445;460;450;455" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.4;0.85;0.7" dur="1.4s" repeatCount="indefinite"/>
    </line>
  </g>
  <circle cx="500" cy="500" r="20" fill="url(#innerGlow)"/>
  <circle cx="500" cy="500" r="12" fill="#e0ffe4" opacity="0.97">
    <animate attributeName="r" values="10;14;9;13;11;12" dur="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="500" r="5" fill="white">
    <animate attributeName="r" values="4;7;3;6;5;5" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="500" r="2.5" fill="#00ffee" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.3;1;0.6;0.95" dur="0.5s" repeatCount="indefinite"/>
  </circle>
</g>
<g class="spin-cw-vf" filter="url(#glow3)">
  <circle cx="500" cy="500" r="28" fill="none" stroke="#00e63a" stroke-width="2" stroke-dasharray="2 6"/>
</g>

<!-- ===== FLOATING CELLS — Chaos orbit ===== -->
<g style="animation:spinCW 15s linear infinite; transform-origin:500px 500px" opacity="0.7">
  <use href="#cell" transform="translate(500,450)"/>
  <use href="#cell" transform="rotate(72,500,500)  translate(500,450)"/>
  <use href="#cell" transform="rotate(144,500,500) translate(500,450)"/>
  <use href="#cell" transform="rotate(216,500,500) translate(500,450)"/>
  <use href="#cell" transform="rotate(288,500,500) translate(500,450)"/>
</g>
<g style="animation:spinCCW 20s linear infinite; transform-origin:500px 500px" opacity="0.5">
  <use href="#spore-ring" transform="translate(560,440)"/>
  <use href="#spore-ring" transform="rotate(60,500,500)  translate(560,440)"/>
  <use href="#spore-ring" transform="rotate(120,500,500) translate(560,440)"/>
  <use href="#spore-ring" transform="rotate(180,500,500) translate(560,440)"/>
  <use href="#spore-ring" transform="rotate(240,500,500) translate(560,440)"/>
  <use href="#spore-ring" transform="rotate(300,500,500) translate(560,440)"/>
</g>

<!-- Scanline shimmer (SVG) -->
<rect x="0" y="0" width="1000" height="1000" fill="none"
  stroke="rgba(0,200,50,0.04)" stroke-width="2"
  stroke-dasharray="1 4"
  style="animation:wave 3s ease-in-out infinite"
  opacity="0.3"/>

@keyframes spinCW  { to { transform: rotate(360deg); } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }
</svg>
</div>

<script>
// ============================================================
// GENESIS — Script optimizado, loop único
// ============================================================
const CHARGE = {
  active: false, startTime: 0, chargeLevel: 0,
  mx: 0, my: 0, flash: 0, bangParticles: [],
  arcNoise: Array.from({length:6}, () => ({ t: Math.random()*Math.PI*2, spd: 0.06+Math.random()*0.08 })),
};

// Canvases
const bgC = document.getElementById('layer-bg');
const mC  = document.getElementById('layer-mold');
const spC = document.getElementById('layer-spore');
[bgC, mC, spC].forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
const bgX = bgC.getContext('2d');
const mX  = mC.getContext('2d');
const spX = spC.getContext('2d');
const CX  = window.innerWidth/2, CY = window.innerHeight/2;

// BG gradient (dibujado una sola vez)
const bgGrad = bgX.createRadialGradient(CX,CY,0,CX,CY,Math.max(CX,CY)*1.4);
bgGrad.addColorStop(0,'#001a05'); bgGrad.addColorStop(0.5,'#000a02'); bgGrad.addColorStop(1,'#000');
bgX.fillStyle = bgGrad; bgX.fillRect(0,0,bgC.width,bgC.height);

// ---- Filamentos de micilio ----
const MAX_FIL = 35; // reducido
const filaments = [];
function spawnFil() {
  const a = Math.random()*Math.PI*2, d = 80+Math.random()*120;
  return { x:CX+Math.cos(a)*d, y:CY+Math.sin(a)*d,
    angle:a+(Math.random()-.5)*1.2, length:0,
    maxLength:80+Math.random()*180, width:.3+Math.random()*.8,
    alpha:.1+Math.random()*.2, speed:.7+Math.random()*1.2,
    wobble:(Math.random()-.5)*.035, dead:false,
    dark: Math.random()<.5, children:0, maxChildren:1 };
}
for(let i=0;i<MAX_FIL;i++) filaments.push(spawnFil());

// ---- Esporas (sin glow individual — se usa shadowBlur global una vez) ----
const MAX_SPORES = 50; // reducido, sin gradientes por partícula
const spores = [];
function spawnSpore() {
  const a = Math.random()*Math.PI*2, r = 60+Math.random()*280;
  return { x:CX+Math.cos(a)*r, y:CY+Math.sin(a)*r,
    vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35-.08,
    r:.8+Math.random()*2, alpha:.35+Math.random()*.5,
    life:0, maxLife:180+Math.random()*200 };
}
for(let i=0;i<MAX_SPORES;i++) spores.push(spawnSpore());

// HUD refs
const hudBL = document.getElementById('hud-bl');
const hudBR = document.getElementById('hud-br');
const hudTR = document.getElementById('hud-tr');
const genesisEl = document.getElementById('genesis-svg');

let frame = 0;
const TWO_PI = Math.PI*2;

// ============================================================
// LOOP ÚNICO — todo en un solo rAF
// ============================================================
function loop(ts) {
  frame++;

  // ── 1. Actualizar estado de carga ──────────────────────────
  if(CHARGE.active) {
    CHARGE.chargeLevel = Math.min((ts - CHARGE.startTime)/2500, 1);
    const cl = CHARGE.chargeLevel;
    // Atracción de esporas (fuerza suave)
    if(cl > 0.08) {
      const f = cl*cl*0.04;
      spores.forEach(s => {
        const dx=CX-s.x, dy=CY-s.y, d=Math.hypot(dx,dy)||1;
        s.vx += dx/d*f; s.vy += dy/d*f;
        if(Math.hypot(s.vx,s.vy) > 2+cl*3) { s.vx*=.88; s.vy*=.88; }
      });
    }
    // SVG brightness — solo cada 4 frames
    if(frame%4===0) {
      const g = Math.floor(cl*70);
      genesisEl.style.filter = `drop-shadow(0 0 ${40+cl*60}px rgba(0,${180+g},50,${.6+cl*.35})) brightness(${1+cl*.5})`;
      hudTR.textContent = `CARGA: ${Math.floor(cl*100)}%`;
    }
  }

  // ── 2. Canvas micilio (fade + filamentos) ─────────────────
  mX.globalAlpha = 1;
  mX.fillStyle = 'rgba(0,3,1,0.022)';
  mX.fillRect(0,0,mC.width,mC.height);

  // Agrupar filamentos por color para minimizar strokeStyle changes
  mX.lineWidth = 1; // se sobreescribe por filamento pero menos cambios de estado
  for(let i=0; i<filaments.length; i++) {
    const f = filaments[i];
    if(f.dead) { filaments[i] = spawnFil(); continue; }
    f.angle += f.wobble;
    const nx = f.x + Math.cos(f.angle)*f.speed;
    const ny = f.y + Math.sin(f.angle)*f.speed;
    mX.globalAlpha = f.alpha * (1 - f.length/f.maxLength);
    mX.strokeStyle = f.dark ? '#00701a' : '#00aa2a';
    mX.lineWidth = f.width;
    mX.beginPath(); mX.moveTo(f.x,f.y); mX.lineTo(nx,ny); mX.stroke();
    f.x=nx; f.y=ny; f.length+=f.speed; f.dead = f.length>=f.maxLength;
    // Spawn hijo una sola vez
    if(!f.dead && f.children < f.maxChildren && f.length > f.maxLength*.4 && Math.random()<.004) {
      f.children++;
      const c = spawnFil(); c.x=nx; c.y=ny;
      c.angle = f.angle+(Math.random()-.5)*1.2; c.maxLength = f.maxLength*.55;
      if(filaments.length < MAX_FIL*2) filaments.push(c);
    }
  }
  mX.globalAlpha = 1;

  // ── 3. Canvas esporas ─────────────────────────────────────
  const hasBang = CHARGE.bangParticles.length > 0;
  if(hasBang) {
    spX.fillStyle='rgba(0,2,0,.28)'; spX.fillRect(0,0,spC.width,spC.height);
  } else {
    spX.clearRect(0,0,spC.width,spC.height);
  }

  // Esporas: batch sin shadowBlur individual
  spX.shadowBlur = 0;
  spX.fillStyle = '#00e640';
  for(let i=0; i<spores.length; i++) {
    const s = spores[i];
    s.x += s.vx; s.y += s.vy;
    s.life++;
    const t = s.life/s.maxLife;
    const a = s.alpha * (t<.2 ? t/.2 : t>.8 ? (1-t)/.2 : 1);
    spX.globalAlpha = a;
    spX.beginPath(); spX.arc(s.x,s.y,s.r,0,TWO_PI); spX.fill();
    if(s.life >= s.maxLife) spores[i] = spawnSpore();
  }
  spX.globalAlpha = 1;

  // ── 4. Flash del Big Bang ─────────────────────────────────
  if(CHARGE.flash > .005) {
    const g = spX.createRadialGradient(CX,CY,0,CX,CY,Math.max(spC.width,spC.height)*.7);
    g.addColorStop(0, `rgba(220,255,230,${CHARGE.flash})`);
    g.addColorStop(.4,`rgba(0,240,70,${CHARGE.flash*.4})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    spX.fillStyle=g; spX.fillRect(0,0,spC.width,spC.height);
    CHARGE.flash *= .85;
  }

  // ── 5. Partículas Big Bang (sin shadowBlur) ───────────────
  if(hasBang) {
    const keep = [];
    for(let i=0; i<CHARGE.bangParticles.length; i++) {
      const p = CHARGE.bangParticles[i];
      p.alpha -= p.decay;
      if(p.alpha <= 0) continue;
      p.vx *= .976; p.vy *= .976;
      // Retorno suave a órbita
      const ret = Math.max(0, (1-p.alpha) - p.returnDelay) * .01;
      const hx = CX+Math.cos(p.homeAngle)*p.homeDist;
      const hy = CY+Math.sin(p.homeAngle)*p.homeDist;
      p.vx += (hx-p.x)*ret; p.vy += (hy-p.y)*ret;
      p.x += p.vx; p.y += p.vy;
      // Trail simple: 1 línea al punto anterior (sin array)
      spX.globalAlpha = p.alpha*.5;
      spX.strokeStyle = p.col;
      spX.lineWidth = p.r*.7;
      spX.beginPath(); spX.moveTo(p.px,p.py); spX.lineTo(p.x,p.y); spX.stroke();
      spX.globalAlpha = p.alpha;
      spX.fillStyle = p.col;
      spX.beginPath(); spX.arc(p.x,p.y,p.r,0,TWO_PI); spX.fill();
      p.px = p.x; p.py = p.y;
      keep.push(p);
    }
    CHARGE.bangParticles = keep;
  }

  // ── 6. Arcos de energía durante carga ────────────────────
  if(CHARGE.active && CHARGE.chargeLevel > .03) {
    const cl = CHARGE.chargeLevel;
    const numArcs = 1 + Math.floor(cl*3); // máx 4 arcos
    spX.shadowBlur = 0;
    for(let a=0; a<numArcs; a++) {
      const n = CHARGE.arcNoise[a%CHARGE.arcNoise.length];
      n.t += n.spd;
      const cx1 = CHARGE.mx*.3+CX*.7+Math.sin(n.t)*70*cl;
      const cy1 = CHARGE.my*.3+CY*.7+Math.cos(n.t*1.3)*70*cl;
      const cx2 = CHARGE.mx*.7+CX*.3+Math.cos(n.t*.9)*50*cl;
      const cy2 = CHARGE.my*.7+CY*.3+Math.sin(n.t*1.1)*50*cl;
      const hue = 115+Math.sin(n.t*2)*25;
      spX.globalAlpha = cl*(.45+Math.sin(n.t*3+a)*.15);
      spX.strokeStyle = `hsl(${hue},90%,60%)`;
      spX.lineWidth = .5+cl*2;
      spX.beginPath(); spX.moveTo(CHARGE.mx,CHARGE.my);
      spX.bezierCurveTo(cx1,cy1,cx2,cy2,CX,CY); spX.stroke();
    }
    // Anillo cursor
    const pr = 10+Math.sin(ts*.01)*5+cl*18;
    spX.globalAlpha = cl*.65;
    spX.strokeStyle = '#00ff60'; spX.lineWidth = 1+cl*1.5;
    spX.beginPath(); spX.arc(CHARGE.mx,CHARGE.my,pr,0,TWO_PI); spX.stroke();
    spX.globalAlpha = cl;
    spX.fillStyle = `rgba(180,255,200,${cl})`;
    spX.beginPath(); spX.arc(CHARGE.mx,CHARGE.my,2+cl*3,0,TWO_PI); spX.fill();
    spX.globalAlpha = 1;
  }

  // ── 7. HUD (cada 10 frames) ───────────────────────────────
  if(frame%10===0) {
    hudBL.textContent = `ψ=${(frame*.003).toFixed(3)}`;
    hudBR.textContent = `FIL:${filaments.length}`;
    if(!CHARGE.active && CHARGE.bangParticles.length===0) {
      hudTR.textContent = 'FRACTAL_VIVO';
      if(frame%20===0) genesisEl.style.filter='';
    }
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Eventos ───────────────────────────────────────────────────
window.addEventListener('mousedown', e => {
  CHARGE.active=true; CHARGE.startTime=performance.now();
  CHARGE.mx=e.clientX; CHARGE.my=e.clientY;
});
window.addEventListener('mousemove', e => { CHARGE.mx=e.clientX; CHARGE.my=e.clientY; });
window.addEventListener('mouseup', fireRelease);

function fireRelease() {
  if(!CHARGE.active) return;
  CHARGE.active=false;
  const cl = CHARGE.chargeLevel;
  if(cl < .04) { CHARGE.chargeLevel=0; genesisEl.style.filter=''; return; }
  CHARGE.flash = .2+cl*.8;
  genesisEl.style.filter='';
  const count = Math.floor(40+cl*120);
  for(let i=0;i<count;i++) {
    const a=Math.random()*TWO_PI, spd=(1.5+cl*16)*(Math.random()*.7+.3);
    const hue=110+Math.random()*45;
    const px=CX, py=CY;
    CHARGE.bangParticles.push({
      x:px, y:py, px, py,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      homeAngle:Math.random()*TWO_PI, homeDist:60+Math.random()*260,
      r:.8+cl*Math.random()*4, alpha:1,
      decay:.003+Math.random()*.004,
      col:`hsl(${hue},88%,62%)`,
      returnDelay:.2+Math.random()*.5,
    });
  }
  CHARGE.chargeLevel=0;
}

// Touch
window.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  CHARGE.active=true; CHARGE.startTime=performance.now();
  CHARGE.mx=t.clientX; CHARGE.my=t.clientY;
},{passive:true});
window.addEventListener('touchmove', e=>{
  const t=e.touches[0]; CHARGE.mx=t.clientX; CHARGE.my=t.clientY;
},{passive:true});
window.addEventListener('touchend', fireRelease);

// Resize
window.addEventListener('resize', ()=>{
  [bgC,mC,spC].forEach(c=>{c.width=window.innerWidth;c.height=window.innerHeight;});
  const g=bgX.createRadialGradient(CX,CY,0,CX,CY,Math.max(CX,CY)*1.4);
  g.addColorStop(0,'#001a05');g.addColorStop(.5,'#000a02');g.addColorStop(1,'#000');
  bgX.fillStyle=g; bgX.fillRect(0,0,bgC.width,bgC.height);
});

</script>
</body>
