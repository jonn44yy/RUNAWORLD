<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden}
.layer{position:fixed;inset:0;width:100vw;height:100vh;border:0;pointer-events:none;background:transparent}
.bg{z-index:-2}.rune{position:fixed;inset:0;z-index:1;display:block;width:100%;height:100%}.frame{z-index:5}
</style>
</head>
<body>
<iframe class="layer bg" src="../BACKGROUND/background_legendaria_corrupta.html"></iframe>
<canvas id="rune" class="rune"></canvas>
<iframe class="layer frame" src="../MARCOS/marco_legendaria_corrupta.html"></iframe>
<script>
const canvas = document.getElementById('rune');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;
const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ'];
const IS_MOBILE = matchMedia('(max-width: 768px)').matches;
const DPR_LIMIT = IS_MOBILE ? 1 : 1.25;
const GLITCH_LINES = IS_MOBILE ? 3 : 5;
const SHARDS = IS_MOBILE ? 5 : 8;
let dpr = 1;
let w = 0;
let h = 0;
let t = 0;

function resize() {
    dpr = Math.min(devicePixelRatio || 1, DPR_LIMIT);
    w = innerWidth;
    h = innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function ring(radius, color, width, dash) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, TAU);
    ctx.stroke();
    if (dash) ctx.setLineDash([]);
}

function radialMarks(radius, count, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.1;
    for (let i = 0; i < count; i++) {
        const a = i * TAU / count;
        const len = i % 4 === 0 ? 14 : 7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (radius - len), Math.sin(a) * (radius - len));
        ctx.lineTo(Math.cos(a) * radius, Math.sin(a) * radius);
        ctx.stroke();
    }
}

function drawRunes(radius, size, color) {
    ctx.fillStyle = color;
    ctx.font = `${size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < RUNES.length; i++) {
        const a = i * TAU / RUNES.length;
        ctx.fillText(RUNES[i], Math.cos(a) * radius, Math.sin(a) * radius);
    }
}

function drawShards(cx, cy, r) {
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < SHARDS; i++) {
        const a = i * TAU / SHARDS - t * (0.2 + i * 0.01);
        const rr = r * (1.02 + (i % 3) * 0.06);
        ctx.save();
        ctx.translate(Math.cos(a) * rr, Math.sin(a) * rr);
        ctx.rotate(a + t * 0.4);
        ctx.globalAlpha = 0.25 + 0.16 * Math.sin(t * 2 + i);
        ctx.fillStyle = 'rgba(12,0,20,.86)';
        ctx.strokeStyle = i % 2 ? 'rgba(255,215,0,.36)' : 'rgba(170,0,255,.42)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.04);
        ctx.lineTo(r * 0.035, 0);
        ctx.lineTo(0, r * 0.055);
        ctx.lineTo(-r * 0.028, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

function drawGlitch(cx, cy, r) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < GLITCH_LINES; i++) {
        const y = cy + Math.sin(t * 4 + i * 9.7) * r * 0.72;
        const x = cx - r * 0.62 + ((i * 37) % 23);
        ctx.globalAlpha = 0.08 + 0.08 * ((i + 1) % 3);
        ctx.fillStyle = i % 2 ? '#b000ff' : '#ffd700';
        ctx.fillRect(x, y, r * (0.16 + i * 0.035), 1.5);
    }
    ctx.restore();
}

function drawLegendaryCorrupt(cx, cy, r) {
    const pulse = 0.58 + 0.32 * Math.sin(t * 2.4);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.globalCompositeOperation = 'lighter';

    ctx.save();
    ctx.rotate(t * 0.55);
    ring(r, `rgba(255,215,0,${0.42 + pulse * 0.18})`, 1.2, [32, 10, 5, 16]);
    radialMarks(r, 16, 'rgba(255,215,0,.55)');
    ctx.restore();

    ctx.save();
    ctx.rotate(-t * 0.85);
    ring(r * 0.66, `rgba(255,215,0,${0.28 + pulse * 0.15})`, 0.9, null);
    drawRunes(r * 0.66, Math.max(12, r * 0.13), `rgba(255,215,0,${0.55 + pulse * 0.25})`);
    ctx.restore();

    ctx.save();
    ctx.rotate(t * 1.15);
    ring(r * 0.36, `rgba(170,0,255,${0.46 + pulse * 0.2})`, 1.2, [12, 6]);
    ctx.strokeStyle = 'rgba(255,215,0,.72)';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.25);
    ctx.lineTo(0, r * 0.25);
    ctx.moveTo(-r * 0.25, 0);
    ctx.lineTo(r * 0.25, 0);
    ctx.stroke();
    ctx.restore();

    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.22);
    g.addColorStop(0, 'rgba(255,215,0,.95)');
    g.addColorStop(0.42, 'rgba(150,0,210,.65)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, r * (0.08 + pulse * 0.025), 0, TAU);
    ctx.fill();

    ctx.restore();
}

function frame() {
    t += 0.014;
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const r = Math.min(w, h) * 0.34;

    drawLegendaryCorrupt(cx, cy, r);
    drawShards(cx, cy, r);
    drawGlitch(cx, cy, r);

    requestAnimationFrame(frame);
}

resize();
addEventListener('resize', resize, { passive: true });
requestAnimationFrame(frame);
</script>
</body>
</html>
