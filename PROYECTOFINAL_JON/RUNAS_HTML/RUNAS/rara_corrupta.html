<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;filter:drop-shadow(0 0 18px rgba(255,34,68,.5)) drop-shadow(0 0 34px rgba(170,0,255,.32))}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let t=0;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener('resize',resize);
const TAU=Math.PI*2;
function poly(ctx,n,r,rot=0){ctx.beginPath();for(let i=0;i<n;i++){const a=rot+i*TAU/n;const x=Math.cos(a)*r,y=Math.sin(a)*r;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();}
function star(ctx,n,r1,r2,rot=0){ctx.beginPath();for(let i=0;i<n*2;i++){const r=i%2?r2:r1;const a=rot+i*TAU/(n*2);const x=Math.cos(a)*r,y=Math.sin(a)*r;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();}
function corruptFill(cx,cy,r){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,'rgba(255,34,110,.95)');
  g.addColorStop(.32,'rgba(120,0,160,.42)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  return g;
}
function glitchLines(cx,cy,r,amount){
  ctx.save();ctx.globalCompositeOperation='lighter';
  for(let i=0;i<amount;i++){
    const y=cy+(Math.random()-.5)*r*1.65;
    const x1=cx-r*.75+Math.random()*r*.4;
    const w=8+Math.random()*r*.35;
    ctx.globalAlpha=.08+Math.random()*.16;
    ctx.fillStyle=Math.random()>.5?'#ff2244':'#aa00ff';
    ctx.fillRect(x1,y,w,1+Math.random()*2);
  }
  ctx.restore();
}
function cracks(cx,cy,r,count){
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.lineCap='round';
  for(let i=0;i<count;i++){
    const a=Math.random()*TAU;const rr=r*(.25+Math.random()*.72);
    let x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
    ctx.beginPath();ctx.moveTo(x,y);
    const steps=2+Math.floor(Math.random()*3);
    for(let s=0;s<steps;s++){a2=a+(Math.random()-.5)*1.2; x+=Math.cos(a2)*r*(.06+Math.random()*.12); y+=Math.sin(a2)*r*(.06+Math.random()*.12); ctx.lineTo(x,y);}
    ctx.strokeStyle=Math.random()>.35?'rgba(255,34,68,.72)':'rgba(190,0,255,.62)';ctx.lineWidth=.7+Math.random()*1.8;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=8;ctx.stroke();
  }
  ctx.restore();
}
function shards(cx,cy,r,count){
  ctx.save();
  for(let i=0;i<count;i++){
    const a=i*TAU/count+t*(.12+(i%3)*.03);const rr=r*(.95+((i*37)%31)/100);
    const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.92;
    ctx.save();ctx.translate(x,y);ctx.rotate(a+t*.4);ctx.globalAlpha=.28+.18*Math.sin(t*2+i);
    ctx.fillStyle='rgba(20,0,30,.8)';ctx.strokeStyle='rgba(255,34,90,.45)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,-r*.035);ctx.lineTo(r*.035,0);ctx.lineTo(0,r*.05);ctx.lineTo(-r*.025,0);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  }
  ctx.restore();
}
function baseFrame(alpha=.18){ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(0,0,6,'+alpha+')';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalCompositeOperation='lighter';}

function frame(){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,base=Math.min(W,H);
  t+=0.014;

  baseFrame(.18);
  const R=base*.31,breath=.65+.35*Math.sin(t*1.7);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.18);
  ctx.strokeStyle='rgba(60,140,255,.55)';ctx.lineWidth=2;ctx.shadowColor='#3c8cff';ctx.shadowBlur=10;poly(ctx,6,R,-Math.PI/6);ctx.stroke();
  ctx.strokeStyle='rgba(255,34,100,.82)';ctx.lineWidth=1.7;ctx.shadowColor='#ff2244';ctx.shadowBlur=16;ctx.setLineDash([32,8,4,11]);poly(ctx,6,R*.82,Math.PI/6+t*.2);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='rgba(170,0,255,.75)';ctx.lineWidth=1.1;poly(ctx,6,R*.45,-Math.PI/6-t*.35);ctx.stroke();
  ctx.fillStyle=corruptFill(0,0,R*.62);poly(ctx,6,R*.34*breath,-Math.PI/6);ctx.fill();
  ctx.restore();
  cracks(cx,cy,R,13);shards(cx,cy,R*1.04,9);glitchLines(cx,cy,R,12);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
