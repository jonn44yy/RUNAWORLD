<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

#c        { position:fixed; inset:0; z-index:10; }
#c-chroma { position:fixed; inset:0; z-index:11; pointer-events:none; mix-blend-mode:screen; opacity:0; }

#vig {
    position:fixed; inset:0; z-index:780; pointer-events:none; opacity:0;
    background:radial-gradient(ellipse at center,
        rgba(0,0,0,0) 28%, rgba(0,0,0,0.55) 62%, rgba(0,0,0,0.96) 100%);
}
#vig::after {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 2px);
    opacity:0.5;
}

/* TÍTULO CORRUPTO — gradiente ámbar→rojo→sangre→noche */
#ntitle {
    position:fixed; bottom:12%; left:50%; transform:translateX(-50%);
    z-index:820; display:flex; gap:0; white-space:nowrap; pointer-events:none;
}
.nl {
    font-family:'Cinzel Decorative',cursive;
    font-size:clamp(1.5rem,4vw,4.5rem); font-weight:900;
    background:linear-gradient(180deg,#ffd8a0 0%,#ff8045 30%,#c82030 60%,#3a0818 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 18px rgba(255,80,40,0.95))
           drop-shadow(0 0 38px rgba(180,30,20,0.55));
    letter-spacing:8px; opacity:0;
    transform:scale(3.5) translateZ(0);
    display:inline-block;
    transition: text-shadow .15s;
}
/* Glitch ocasional en las letras durante la fase post-flash */
.nl.glitch {
    animation: nl-glitch 0.18s steps(2) 1;
}
@keyframes nl-glitch {
    0%   { transform:scale(1) translate(0,0); filter:drop-shadow(0 0 18px rgba(255,80,40,0.95)); }
    50%  { transform:scale(1) translate(2px,-1px); filter:drop-shadow(2px 0 0 rgba(255,40,60,0.9)) drop-shadow(-2px 0 0 rgba(120,20,180,0.7)); }
    100% { transform:scale(1) translate(0,0); filter:drop-shadow(0 0 18px rgba(255,80,40,0.95)); }
}
#nsub {
    position:fixed; bottom:7.5%; left:50%; transform:translateX(-50%);
    z-index:820; pointer-events:none; white-space:nowrap;
    font-family:'Cinzel',serif; font-size:clamp(0.65rem,1.4vw,1rem);
    letter-spacing:14px; color:rgba(255,110,60,0.92);
    text-shadow:0 0 22px rgba(220,40,20,0.78);
    opacity:0; transition:opacity 2.5s ease-out;
}
#npct {
    position:fixed; bottom:4.5%; left:50%; transform:translateX(-50%);
    z-index:820; pointer-events:none; white-space:nowrap;
    font-family:'Oswald',sans-serif; font-size:clamp(0.6rem,1.2vw,0.9rem);
    letter-spacing:13px; color:rgba(255,150,90,0.95);
    text-shadow:0 0 16px rgba(220,80,40,0.85);
    opacity:0; transition:opacity 2s ease-out 1s;
}

#wrap {
    position:fixed; inset:0; z-index:800;
    display:flex; justify-content:center; align-items:center;
    opacity:0; pointer-events:none;
    animation:efloat 11s ease-in-out infinite;
    perspective:1200px;
}
@keyframes efloat {
    0%,100% { transform:translateY(0px) translateX(0px); }
    25%     { transform:translateY(-9px) translateX(4px); }
    50%     { transform:translateY(-12px) translateX(-5px); }
    75%     { transform:translateY(6px) translateX(-3px); }
}

#esvg {
    width:min(680px,88vw); height:min(680px,88vw);
    /* Halo de corona cálida — ámbar interior, rojo profundo, morado al final.
       --evo crece tras F7 → halo más masivo */
    filter:
        drop-shadow(0 0 calc(20px + var(--evo, 0) * 30px) rgba(255,160,60,0.85))
        drop-shadow(0 0 calc(50px + var(--evo, 0) * 60px) rgba(190,40,20,0.55))
        drop-shadow(0 0 calc(90px + var(--evo, 0) * 80px) rgba(60,10,50,0.40));
    transform-style:preserve-3d;
    will-change:transform;
}

/* Rotaciones inestables (jerks) */
.rs  { animation:ec-rot-corrupt  49s cubic-bezier(.12,.8,.88,.2) infinite; transform-origin:center; }
.rm  { animation:ec-rot-corrupt  23s cubic-bezier(.25,.5,.75,.5) infinite; transform-origin:center; }
.rf  { animation:ec-rot-corrupt   9s cubic-bezier(.55,0,.45,1)   infinite; transform-origin:center; }
.rv  { animation:ec-rot-corrupt  31s cubic-bezier(.1,.9,.9,.1)   infinite reverse; transform-origin:center; }
.rvs { animation:ec-rot-corrupt  67s cubic-bezier(.3,.7,.7,.3)   infinite reverse; transform-origin:center; }

@keyframes ec-rot-corrupt {
    0%   { transform:rotate(0deg); }
    18%  { transform:rotate(68deg); }
    19%  { transform:rotate(65deg); }
    45%  { transform:rotate(162deg); }
    46%  { transform:rotate(168deg); }
    72%  { transform:rotate(271deg); }
    73%  { transform:rotate(268deg); }
    100% { transform:rotate(360deg); }
}

.singularity {
    transform-origin:500px 500px;
    transform-box:fill-box;
    animation:ec-sing 3.4s cubic-bezier(.7,0,.1,1) infinite;
    mix-blend-mode:screen;
    will-change:transform, opacity;
}
@keyframes ec-sing {
    0%   { transform:scale(.3);  opacity:.55; }
    20%  { transform:scale(.95); opacity:.9; }
    50%  { transform:scale(.55); opacity:.4; }
    80%  { transform:scale(1.0); opacity:.8; }
    100% { transform:scale(.3);  opacity:.55; }
}

.crystal-branch {
    stroke-dasharray:28;
    stroke-dashoffset:28;
    opacity:0;
    will-change:stroke-dashoffset, opacity;
}
.crystal-branch:nth-of-type(1) {animation:ec-crack 2.1s ease-out infinite}
.crystal-branch:nth-of-type(2) {animation:ec-crack 1.9s ease-out infinite .21s}
.crystal-branch:nth-of-type(3) {animation:ec-crack 2.4s ease-out infinite .44s}
.crystal-branch:nth-of-type(4) {animation:ec-crack 1.7s ease-out infinite .65s}
.crystal-branch:nth-of-type(5) {animation:ec-crack 2.2s ease-out infinite .88s}
.crystal-branch:nth-of-type(6) {animation:ec-crack 1.8s ease-out infinite 1.10s}
.crystal-branch:nth-of-type(7) {animation:ec-crack 2.0s ease-out infinite 1.32s}
.crystal-branch:nth-of-type(8) {animation:ec-crack 2.3s ease-out infinite 1.55s}
@keyframes ec-crack {
    0%   { stroke-dashoffset:28; opacity:0; }
    18%  { opacity:.8; }
    55%  { stroke-dashoffset:0; opacity:.9; }
    80%  { stroke-dashoffset:0; opacity:.55; }
    100% { stroke-dashoffset:0; opacity:0; }
}

.peri-text {
    font-family:'Courier New', monospace;
    font-size:15px;
    fill:#b04020;
    letter-spacing:2.4px;
    opacity:.55;
}

#rune-flash {
    position:fixed; inset:0; z-index:810; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(255,90,40,1) 0%, rgba(180,30,40,0.6) 40%, rgba(0,0,0,0) 75%);
    opacity:0;
}

/* Variable de evolución global */
body { --evo: 0; }
</style>
</head>

<script>
'use strict';

const W = window.innerWidth, H = window.innerHeight, CX = W/2, CY = H/2, MIN = Math.min(W, H);
const cv = document.getElementById('c');     cv.width = W; cv.height = H;
const ctx = cv.getContext('2d');
const cc = document.getElementById('c-chroma'); cc.width = W; cc.height = H;
const cctx = cc.getContext('2d');

const L = (a,b,t) => a + (b-a)*t;
const C = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const eI = t => t*t*t;
const eO = t => 1 - Math.pow(1-t, 3);
const eIO = t => t < .5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2) + 1;
const R = (a,b) => a + Math.random() * (b-a);

const isMobile = MIN < 768;

/* ═══════════════════════════════════════════════════════════
   TIMINGS
   F1 → F7 = invocación (con corrupción progresiva en F1-F4)
   F5 = flash CORRUPTO (no blanco)
   F7 = reveal eclipse en lugar de Eterna azul
   TITLE_ABSORB = 5s tras F6 (título succionado al núcleo)
   EXPAND = la luna crece hasta tapar la pantalla
   FADE = todo se desvanece → UI detrás visible
   ═══════════════════════════════════════════════════════════ */
const T = {
    F1: 0,
    F2: 3500,
    F2b: 5200,
    F3: 6400,
    F4: 9800,
    F5: 14300,
    F6: 15500,
    F7: 17300,
    TITLE_ABSORB: 20500,
    EXPAND_START: 22500,
    EXPAND_END:   25500,
    FADE_START:   25500,
    FADE_END:     28500
};
let START = performance.now(), el = 0;

/* Niveles de corrupción para F1-F4 (sube linealmente) — alimenta la paleta */
function corruptionLevel(elapsed) {
    /* Subiendo de 0 → 1 entre F1 y F4 (cuando ya es total) */
    return C(elapsed / T.F4, 0, 1);
}

/* ═══════════════════════════════════════════════════════════
   F1 — GRIETAS (con leve corrupción: ~12% rojas)
   ═══════════════════════════════════════════════════════════ */
const CRACKS = [], SHARDS = [];
(function() {
    for (let g = 0; g < 20; g++) {
        const sx = R(W*.04, W*.96), sy = R(H*.04, H*.96);
        const segs = [], n = ~~R(5, 14);
        let x = sx, y = sy;
        for (let s = 0; s < n; s++) {
            const len = R(28, 195), ang = R(0, Math.PI*2);
            const nx = x + Math.cos(ang)*len, ny = y + Math.sin(ang)*len;
            segs.push({ x1:x, y1:y, x2:nx, y2:ny, branch:false });
            if (Math.random() > .55) {
                const bL = R(15, 80), bA = ang + R(-.9, .9);
                segs.push({ x1:nx, y1:ny, x2:nx+Math.cos(bA)*bL, y2:ny+Math.sin(bA)*bL, branch:true });
            }
            x = nx; y = ny;
        }
        /* Corrupción: 1 de cada 6-7 grietas tiene hue rojo (0-30) en vez de morado/azul (170-320) */
        const corrupt = Math.random() < 0.16;
        const hue = corrupt ? R(0, 25) : R(170, 320);
        CRACKS.push({
            segs, prog:0, spd:R(.012,.045), a:R(.5,1), w:R(.7,3.5),
            hue, corrupt, delay:R(0,2400), born:null, parts:[]
        });
    }
    for (let i = 0; i < 35; i++) {
        const cx = R(W*.1, W*.9), cy = R(H*.1, H*.9);
        const sides = ~~R(3, 6), pts = [];
        for (let s = 0; s < sides; s++) {
            const a = (s/sides)*Math.PI*2 + R(-.3,.3), r = R(8, 35);
            pts.push({ x:Math.cos(a)*r, y:Math.sin(a)*r });
        }
        const corrupt = Math.random() < 0.16;
        SHARDS.push({
            cx, cy, pts,
            hue: corrupt ? R(355, 380) % 360 : R(200, 320),
            corrupt,
            a:0, targetA:R(.15,.55), rot:R(0,Math.PI*2), rotSpd:R(-.02,.02),
            delay:R(400,2800), shimmer:R(0,Math.PI*2)
        });
    }
})();
let ctT = 0;
function drawCracks(elapsed) {
    ctT += .045;
    const corrupt = corruptionLevel(elapsed);

    /* Aura de fondo sutil — antes era morada pura, ahora se contamina con rojo conforme avanza */
    const crG = Math.min(elapsed / 3000, 1) * .12;
    ctx.save(); ctx.globalAlpha = crG;
    const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, MIN*.6);
    /* Mezcla morado base con rojo conforme corruption sube */
    const r1 = Math.round(60 + corrupt * 40);
    const g1 = Math.round(20 - corrupt * 18);
    const b1 = Math.round(120 - corrupt * 100);
    bg.addColorStop(0, `rgba(${r1},${g1},${b1},.30)`);
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(CX, CY, MIN*.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    CRACKS.forEach(cr => {
        if (elapsed < cr.delay) return;
        if (!cr.born) cr.born = elapsed;
        cr.prog = Math.min(cr.prog + cr.spd, 1);
        if (cr.prog <= 0) return;

        /* Las grietas corruptas parpadean más erráticamente */
        const flickFreq = cr.corrupt ? 11 : 7;
        const flk = .5 + .5 * Math.abs(Math.sin(ctT * flickFreq + cr.hue * .01));

        ctx.save();
        const nS = cr.segs.length, sP = cr.prog * nS;
        for (let si = 0; si < nS; si++) {
            if (si > sP) break;
            const sg = cr.segs[si], lp = Math.min(sP - si, 1);
            const ex = L(sg.x1, sg.x2, lp), ey = L(sg.y1, sg.y2, lp);
            const bw = sg.branch ? .5 : 1;

            ctx.globalAlpha = cr.a * flk * 0.2 * bw;
            ctx.strokeStyle = `hsl(${cr.hue}, 90%, 80%)`;
            ctx.lineWidth = cr.w * 8 * bw;
            ctx.beginPath(); ctx.moveTo(sg.x1, sg.y1); ctx.lineTo(ex, ey); ctx.stroke();

            ctx.globalAlpha = cr.a * flk * 0.5 * bw;
            ctx.strokeStyle = `hsl(${cr.hue}, 95%, 70%)`;
            ctx.lineWidth = cr.w * 3 * bw;
            ctx.beginPath(); ctx.moveTo(sg.x1, sg.y1); ctx.lineTo(ex, ey); ctx.stroke();

            ctx.globalAlpha = cr.a * flk * 1 * bw;
            /* Núcleo blanco normal — pero las corruptas tienen núcleo rojo apagado */
            ctx.strokeStyle = cr.corrupt ? '#ffe0c0' : '#fff';
            ctx.lineWidth = cr.w * 0.8 * bw;
            ctx.beginPath(); ctx.moveTo(sg.x1, sg.y1); ctx.lineTo(ex, ey); ctx.stroke();

            if (si === Math.floor(sP) && lp < .3) {
                ctx.globalAlpha = cr.a * (1 - lp*3) * .8;
                ctx.fillStyle = `hsla(${cr.hue}, 90%, 80%, ${0.6 * (1 - lp*3)})`;
                ctx.beginPath(); ctx.arc(ex, ey, 18 + cr.w*8, 0, Math.PI*2); ctx.fill();
            }
            if (si === Math.floor(sP) && Math.random() > .35 && cr.parts.length < 40) {
                cr.parts.push({ x:ex, y:ey, vx:R(-2.5,2.5), vy:R(-2.5,2.5), r:R(1,4), a:R(.5,.95), hue:cr.hue });
            }
        }
        ctx.restore();

        cr.parts = cr.parts.filter(p => {
            p.x += p.vx; p.y += p.vy; p.a *= .97;
            if (p.a < .04) return false;
            ctx.save(); ctx.globalAlpha = p.a;
            ctx.fillStyle = `hsl(${p.hue},85%,80%)`;
            ctx.shadowColor = `hsl(${p.hue},90%,85%)`;
            ctx.shadowBlur = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            return true;
        });
    });

    SHARDS.forEach(sh => {
        if (elapsed < sh.delay) return;
        sh.a = Math.min(sh.a + .008, sh.targetA);
        sh.rot += sh.rotSpd; sh.shimmer += .04;
        const sv = .5 + .5 * Math.sin(sh.shimmer);
        ctx.save();
        ctx.translate(sh.cx, sh.cy); ctx.rotate(sh.rot);
        ctx.globalAlpha = sh.a * sv;
        ctx.fillStyle   = `hsla(${sh.hue},60%,25%,.4)`;
        ctx.strokeStyle = `hsla(${sh.hue},80%,75%,.8)`;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = `hsl(${sh.hue},90%,70%)`;
        ctx.shadowBlur = 2;
        ctx.beginPath(); ctx.moveTo(sh.pts[0].x, sh.pts[0].y);
        for (let i = 1; i < sh.pts.length; i++) ctx.lineTo(sh.pts[i].x, sh.pts[i].y);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.globalAlpha = sh.a * sv * .6;
        ctx.strokeStyle = 'rgba(255,255,255,.5)';
        ctx.lineWidth = .6;
        ctx.beginPath();
        ctx.moveTo(sh.pts[0].x*.4, sh.pts[0].y*.4);
        ctx.lineTo(sh.pts[1].x*.6, sh.pts[1].y*.6);
        ctx.stroke();
        ctx.restore();
    });
}

/* ═══════════════════════════════════════════════════════════
   F2 — IMPLOSIÓN CON VÓRTICE (corrupción: 1-2 brazos rojos)
   ═══════════════════════════════════════════════════════════ */
let allP = [], imploded = false, vortexAngle = 0;
function recogerParticulas() {
    CRACKS.forEach(cr => cr.parts.forEach(p => allP.push({ x:p.x, y:p.y, vx:0, vy:0, r:p.r, a:p.a, hue:p.hue })));
    SHARDS.forEach(sh => {
        for (let i = 0; i < 3; i++)
            allP.push({ x:sh.cx+R(-20,20), y:sh.cy+R(-20,20), vx:0, vy:0, r:R(1.5,5), a:R(.4,.95), hue:sh.hue });
    });
    for (let i = 0; i < 120; i++) {
        const e = ~~R(0,4);
        let x, y;
        if (e === 0) { x = R(0,W); y = 0; }
        else if (e === 1) { x = W; y = R(0,H); }
        else if (e === 2) { x = R(0,W); y = H; }
        else { x = 0; y = R(0,H); }
        /* Corrupción: 18% de partículas son rojas */
        const corrupt = Math.random() < 0.18;
        const hue = corrupt ? R(0, 25) : R(200, 330);
        allP.push({ x, y, vx:0, vy:0, r:R(1.5,5), a:R(.3,.9), hue });
    }
}
function drawImplosion(prog) {
    const pull = eI(prog);
    vortexAngle += .06 + pull * .15;

    /* Espirales del vórtice — el primero (arm 0) y el quinto (arm 4) son rojos corruptos */
    ctx.save();
    for (let arm = 0; arm < 8; arm++) {
        const corruptArm = (arm === 0 || arm === 4);
        const baseHue = corruptArm ? 5 + arm * 3 : 240 + arm * 15;
        const bA = vortexAngle + (arm/8)*Math.PI*2;
        ctx.globalAlpha = pull * .25;
        ctx.strokeStyle = `hsla(${baseHue},${corruptArm?85:70}%,70%,.5)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let t = 0; t < 1; t += .02) {
            const sR = MIN * (.35 - t*.32) * pull + (1-pull) * MIN * .45 * t;
            const a = bA + t*Math.PI*3;
            if (t === 0) ctx.moveTo(CX + Math.cos(a)*sR, CY + Math.sin(a)*sR);
            else ctx.lineTo(CX + Math.cos(a)*sR, CY + Math.sin(a)*sR);
        }
        ctx.stroke();
    }
    ctx.restore();

    /* Rayos convergentes */
    if (pull > .3) {
        ctx.save();
        for (let r = 0; r < 12; r++) {
            const corruptRay = (r % 5 === 0); /* 1 de cada 5 corrompido */
            const angle = (r/12)*Math.PI*2 + vortexAngle*.5;
            const sR = MIN*(.5+.2*(1-pull)), eR = MIN*.02;
            const sx = CX+Math.cos(angle)*sR, sy = CY+Math.sin(angle)*sR;
            const ex = CX+Math.cos(angle)*eR, ey = CY+Math.sin(angle)*eR;
            ctx.globalAlpha = (pull-.3)*.5;
            const rg = ctx.createLinearGradient(sx, sy, ex, ey);
            const rH = corruptRay ? 5 : 260 + r*8;
            rg.addColorStop(0, 'rgba(0,0,0,0)');
            rg.addColorStop(.4, `hsla(${rH},80%,75%,.4)`);
            rg.addColorStop(1, corruptRay ? 'rgba(255,180,160,.85)' : 'rgba(255,255,255,.8)');
            ctx.strokeStyle = rg;
            ctx.lineWidth = 1 + pull*2;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
        }
        ctx.restore();
    }

    /* Partículas con rotación orbital */
    allP = allP.filter(p => {
        const dx = CX - p.x, dy = CY - p.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const f = (1 + pull*12) / d;
        const px = -dy/d, py = dx/d;
        p.vx += dx*f*.09 + px*pull*1.5;
        p.vy += dy*f*.09 + py*pull*1.5;
        p.x += p.vx; p.y += p.vy; p.a -= .008;
        if (d < 10 || p.a <= 0) return false;
        ctx.save(); ctx.globalAlpha = p.a;
        ctx.fillStyle = `hsl(${p.hue},80%,78%)`;
        ctx.shadowColor = `hsl(${p.hue},90%,82%)`;
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        return true;
    });

    ctx.save(); ctx.globalAlpha = pull * .55;
    const cg = ctx.createRadialGradient(CX, CY, 0, CX, CY, MIN*.32*pull);
    cg.addColorStop(0,  'rgba(235,215,255,.97)');
    cg.addColorStop(.3, 'rgba(150,100,255,.5)');
    cg.addColorStop(.6, 'rgba(90,70,190,.2)');
    cg.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(CX, CY, MIN*.32*pull, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    if (pull > .5) {
        ctx.save();
        for (let w = 0; w < 3; w++) {
            const wR = MIN*(.05+w*.08)*(pull-.5)*2;
            ctx.globalAlpha = (1-pull)*.4;
            ctx.strokeStyle = `hsla(${270+w*20},75%,72%,.6)`;
            ctx.lineWidth = 1.5 - w*.3;
            ctx.shadowColor = `hsla(${270+w*20},85%,78%,.3)`;
            ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(CX, CY, wR, 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    }
}

/* ═══════════════════════════════════════════════════════════
   F2b — SINGULARIDAD (corrupción: rim rojo en el punto central)
   ═══════════════════════════════════════════════════════════ */
let singT = 0;
const singP = [];
function drawSingularity(prog) {
    singT += .03;
    const p = eIO(prog), col = prog < .5 ? eI(prog*2) : 1;
    const exp = prog > .5 ? eO((prog-.5)*2) : 0;

    /* Disco de acreción — anillo 0 y 3 ya en rojo (corruption escalada) */
    for (let ring = 0; ring < 5; ring++) {
        const corruptRing = (ring === 0 || ring === 3);
        const baseHue = corruptRing ? 8 + ring*4 : 260 + ring*18;
        const rR = MIN*(.03+ring*.04)*(1-exp*.6), rA = singT*(2.5-ring*.4);
        ctx.save();
        ctx.translate(CX, CY); ctx.rotate(rA); ctx.scale(1, .35+ring*.05);
        ctx.globalAlpha = (.4+ring*.1) * col * (1-exp*.7);
        ctx.strokeStyle = `hsla(${baseHue},${corruptRing?85:80}%,${65+ring*5}%,.8)`;
        ctx.lineWidth = 2.5 - ring*.3;
        ctx.shadowColor = `hsla(${baseHue},90%,75%,.6)`;
        ctx.shadowBlur = 4;
        for (let arc = 0; arc < 3; arc++) {
            const sA = arc*Math.PI*2/3 + singT*ring*.3;
            ctx.beginPath(); ctx.arc(0, 0, rR, sA, sA + Math.PI*.55); ctx.stroke();
        }
        ctx.restore();
    }

    /* Punto de singularidad — con halo rojo corrupto */
    const cR = 4 + Math.sin(singT*8)*2, cG = MIN*(.08+col*.04);
    ctx.save(); ctx.globalAlpha = .9 * col;
    const sg = ctx.createRadialGradient(CX, CY, 0, CX, CY, cG);
    sg.addColorStop(0,   'rgba(255,255,255,1)');
    sg.addColorStop(.1,  'rgba(255,220,200,.95)');         /* ya tirando a cálido */
    sg.addColorStop(.3,  `rgba(220,90,80,${.7*col})`);     /* RIM ROJO CORRUPTO */
    sg.addColorStop(.6,  `rgba(80,20,80,${.3*col})`);
    sg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.shadowColor = 'rgba(255,150,120,.95)';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(CX, CY, cG, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.arc(CX, CY, cR, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    /* Micro-partículas orbitando — algunas rojas */
    if (Math.random() > .6 && col > .2) {
        const ang = R(0, Math.PI*2), dist = R(MIN*.15, MIN*.4);
        const corrupt = Math.random() < 0.2;
        singP.push({
            x:CX+Math.cos(ang)*dist, y:CY+Math.sin(ang)*dist,
            r:R(.5,2.5), a:R(.5,.9),
            hue: corrupt ? R(0,20) : R(230,310),
            spd:R(.03,.08)
        });
    }
    for (let i = singP.length-1; i >= 0; i--) {
        const sp = singP[i];
        const dx = CX-sp.x, dy = CY-sp.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        sp.x += dx/d * (sp.spd*MIN*.15);
        sp.y += dy/d * (sp.spd*MIN*.15);
        const px = -dy/d, py = dx/d;
        sp.x += px*sp.spd*MIN*.04;
        sp.y += py*sp.spd*MIN*.04;
        sp.a -= .012;
        if (d < 8 || sp.a <= 0) { singP.splice(i, 1); continue; }
        ctx.save(); ctx.globalAlpha = sp.a;
        ctx.fillStyle = `hsl(${sp.hue},85%,80%)`;
        ctx.shadowColor = `hsl(${sp.hue},90%,85%)`;
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    /* Lentes gravitacionales */
    if (col > .4) {
        ctx.save();
        for (let i = 0; i < 6; i++) {
            const lA = singT*.8 + i*Math.PI/3;
            const lR = MIN*(.06+.02*Math.sin(singT*3+i));
            ctx.globalAlpha = .25 * col * (1-exp);
            const corruptLens = (i === 1 || i === 4);
            const lHue = corruptLens ? 10 + i*5 : 240 + i*20;
            const lg = ctx.createRadialGradient(
                CX+Math.cos(lA)*lR, CY+Math.sin(lA)*lR, 0,
                CX+Math.cos(lA)*lR, CY+Math.sin(lA)*lR, 12
            );
            lg.addColorStop(0, `hsla(${lHue},80%,85%,.8)`);
            lg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = lg;
            ctx.beginPath(); ctx.arc(CX+Math.cos(lA)*lR, CY+Math.sin(lA)*lR, 12, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    /* Onda expansiva pre-pulso */
    if (exp > .1) {
        const wR = MIN*.02 + exp*MIN*.35;
        ctx.save(); ctx.globalAlpha = exp*.4*(1-exp);
        ctx.strokeStyle = 'rgba(220,170,200,.7)';
        ctx.lineWidth = 3*(1-exp);
        ctx.shadowColor = 'rgba(200,120,140,.8)';
        ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(CX, CY, wR, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }
}

/* ═══════════════════════════════════════════════════════════
   F3 — PULSO (corrupción: chromatic aberration potenciada hacia el rojo)
   ═══════════════════════════════════════════════════════════ */
let pT = 0, rings = [];
const spiralP = [];
function drawPulso(elapsed) {
    pT = (elapsed - T.F3) / 750;
    const corrupt = corruptionLevel(elapsed); /* sube fuerte aquí (~0.7-1.0) */
    const lub = Math.max(0, Math.sin(pT * Math.PI*2));
    const dub = Math.max(0, Math.sin((pT-.2) * Math.PI*2));
    const sub = Math.max(0, Math.sin((pT-.4) * Math.PI*2.5) * .5);
    const pulse = Math.max(lub, dub, sub);

    if (pulse > .85 && rings.length < 12) {
        const strong = lub > .85;
        /* En F3 ya hay corrupción media; algunos anillos directamente rojos */
        const cor = Math.random() < .35 + corrupt*.3;
        rings.push({
            r:8, a: strong?.9:.55,
            hue: cor ? R(0, 20) : R(210, 325),
            corrupt: cor,
            distort: R(1, 8 + corrupt*4),
            spd: strong?4.5:2.8,
            lineW: strong?2.2:1,
            chrom: strong
        });
    }

    rings = rings.filter(rg => {
        rg.r += rg.spd; rg.a *= .948;
        if (rg.a < .01) return false;
        if (rg.chrom) {
            /* Aberración cromática — el lado morado se va corrompiendo a rojo más oscuro */
            const purpleC = rg.corrupt ? 'rgba(120,20,180,' : `hsla(${rg.hue},85%,74%,`;
            [{off:-rg.distort*1.5, c:'rgba(255,40,60,', m:.45},
             {off:0,                c:purpleC,           m:1},
             {off:rg.distort*1.5,   c:'rgba(80,30,160,', m:.45}].forEach(ch => {
                ctx.save();
                ctx.globalAlpha = rg.a * ch.m;
                ctx.strokeStyle = ch.c + rg.a + ')';
                ctx.lineWidth = rg.lineW;
                ctx.shadowColor = ch.c + '0.5)';
                ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(CX + ch.off*.5, CY, rg.r, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            });
        } else {
            [-rg.distort, 0, rg.distort].forEach((off, i) => {
                const h = rg.hue + (i-1)*32;
                ctx.save();
                ctx.globalAlpha = rg.a * (i===1?1:.45);
                ctx.strokeStyle = `hsla(${h},85%,74%,${rg.a})`;
                ctx.lineWidth = rg.lineW;
                ctx.shadowColor = `hsla(${h},92%,78%,.5)`;
                ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(CX + off*.5, CY, rg.r, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            });
        }
        return true;
    });

    /* Partículas espirales — % rojas sube con corrupción */
    if (pulse > .6 && Math.random() > .4) {
        const ang = R(0, Math.PI*2);
        const cor = Math.random() < .25 + corrupt*.3;
        spiralP.push({
            x:CX, y:CY, ang,
            spd:R(2,6),
            rotSpd: R(.04,.12) * (Math.random()>.5?1:-1),
            r:R(1,3.5), a:R(.6,.95),
            hue: cor ? R(0,25) : R(220,320),
            decay: R(.008,.02)
        });
    }
    for (let i = spiralP.length-1; i >= 0; i--) {
        const sp = spiralP[i];
        sp.ang += sp.rotSpd;
        sp.x += Math.cos(sp.ang) * sp.spd;
        sp.y += Math.sin(sp.ang) * sp.spd;
        sp.spd *= .99;
        sp.a -= sp.decay;
        if (sp.a <= 0) { spiralP.splice(i, 1); continue; }
        ctx.save(); ctx.globalAlpha = sp.a;
        ctx.fillStyle = `hsl(${sp.hue},82%,78%)`;
        ctx.shadowColor = `hsl(${sp.hue},90%,82%)`;
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = sp.a*.3;
        ctx.beginPath(); ctx.moveTo(sp.x, sp.y);
        ctx.lineTo(sp.x - Math.cos(sp.ang)*sp.spd*5, sp.y - Math.sin(sp.ang)*sp.spd*5);
        ctx.strokeStyle = `hsl(${sp.hue},80%,75%)`;
        ctx.lineWidth = sp.r*.6;
        ctx.stroke();
        ctx.restore();
    }

    /* Aura multi-capa — la sombra aurática se enrojece con corrupción */
    const cr = 14 + pulse*30;
    ctx.save();
    const oG = ctx.createRadialGradient(CX, CY, 0, CX, CY, cr*5);
    /* Mezcla del púrpura original con rojo conforme corruption sube */
    const auraR = Math.round(160 + corrupt * 80);
    const auraG = Math.round(110 - corrupt * 80);
    const auraB = Math.round(255 - corrupt * 200);
    oG.addColorStop(0,  `rgba(${auraR},${auraG},${auraB},${pulse*.15})`);
    oG.addColorStop(.3, `rgba(${auraR-60},${auraG-50},${auraB-40},${pulse*.08})`);
    oG.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = oG; ctx.beginPath(); ctx.arc(CX, CY, cr*5, 0, Math.PI*2); ctx.fill();

    const cg = ctx.createRadialGradient(CX, CY, 0, CX, CY, cr*3.5);
    cg.addColorStop(0,   'rgba(255,255,255,1)');
    cg.addColorStop(.15, `rgba(240,220,255,${.92+pulse*.08})`);
    cg.addColorStop(.35, `rgba(${180+corrupt*40},130,${255-corrupt*180},${.55+pulse*.35})`);
    cg.addColorStop(.6,  `rgba(${115+corrupt*60},${85-corrupt*40},${230-corrupt*180},${.35+pulse*.25})`);
    cg.addColorStop(1,   'rgba(25,12,75,0)');
    ctx.fillStyle = cg;
    ctx.shadowColor = `rgba(${175+corrupt*50},${125-corrupt*60},${255-corrupt*200},.95)`;
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(CX, CY, cr*3.5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = '#fff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(CX, CY, cr*.55, 0, Math.PI*2); ctx.fill();

    if (pulse > .8) {
        ctx.globalAlpha = (pulse-.8)*4;
        for (let ray = 0; ray < 16; ray++) {
            const cor = (ray % 5 === 0); /* 1 de cada 5 rayos rojo */
            const rA = ray/16*Math.PI*2 + pT*.3;
            const rLen = cr*2 + pulse*cr*2.5;
            const rg = ctx.createLinearGradient(CX, CY, CX+Math.cos(rA)*rLen, CY+Math.sin(rA)*rLen);
            const h = cor ? 10 : 260 + ray*6;
            rg.addColorStop(0,  'rgba(255,255,255,.6)');
            rg.addColorStop(.3, `hsla(${h},80%,75%,.3)`);
            rg.addColorStop(1,  'rgba(0,0,0,0)');
            ctx.strokeStyle = rg;
            ctx.lineWidth = 1.5 + pulse;
            ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(CX+Math.cos(rA)*rLen, CY+Math.sin(rA)*rLen); ctx.stroke();
        }
    }
    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   F4 — GEOMETRÍA SAGRADA — VERSIÓN ABSORBIDA
   En lugar de "escribirse" hacia afuera, las formas APARECEN brevemente
   en su tamaño/posición original y son ABSORBIDAS al centro.
   Hue + paleta fuertemente roja (corrupción casi total en F4).
   ═══════════════════════════════════════════════════════════ */
const SHAPES = [
    {t:'c',  r:MIN*.055, hue:262, spd:.82, delay:0  },
    {t:'c',  r:MIN*.11,  hue:242, spd:.64, delay:.10},
    {t:'c',  r:MIN*.17,  hue:282, spd:.52, delay:.18},
    {t:'c',  r:MIN*.23,  hue:222, spd:.44, delay:.26},
    {t:'c',  r:MIN*.30,  hue:262, spd:.36, delay:.34},
    {t:'c',  r:MIN*.38,  hue:248, spd:.30, delay:.42},
    {t:'h',  r:MIN*.13,  rot:0,           hue:294, spd:.56, delay:.14},
    {t:'h',  r:MIN*.21,  rot:Math.PI/6,   hue:252, spd:.46, delay:.24},
    {t:'h',  r:MIN*.31,  rot:0,           hue:272, spd:.36, delay:.36},
    {t:'tri',r:MIN*.17,  rot:0,           hue:304, spd:.5,  delay:.18},
    {t:'tri',r:MIN*.17,  rot:Math.PI,     hue:242, spd:.5,  delay:.30},
    {t:'tri',r:MIN*.25,  rot:0,           hue:272, spd:.4,  delay:.38},
    {t:'tri',r:MIN*.25,  rot:Math.PI,     hue:222, spd:.4,  delay:.46},
    {t:'star', r:MIN*.19, hue:286, spd:.48, delay:.22},
];
let geoS = null, geoT = 0;
function initGeo() {
    geoS = SHAPES.map(s => ({ ...s, p:0 }));
}
function drawPt(pts, dL, close) {
    const n = pts.length;
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 0; i < n; i++) {
        if (i > dL) break;
        const f = Math.min(dL - i, 1), ni = (i+1) % n;
        ctx.lineTo(L(pts[i][0], pts[ni][0], f), L(pts[i][1], pts[ni][1], f));
    }
    if (close && dL >= n - .01) ctx.closePath();
    ctx.stroke();
}

/* Pequeñas estelas que viajan desde la forma hacia el centro mientras se absorbe */
const absorbTrails = [];
function drawGeoAbsorption(elapsed) {
    geoT += .013;
    const gP = C((elapsed - T.F4) / (T.F5 - T.F4), 0, 1);

    geoS.forEach(sh => {
        if (gP < sh.delay) return;
        /* lp = 0 → 1 ciclo: aparece-y-es-absorbida */
        const lp = Math.min((gP - sh.delay) / ((1 - sh.delay) * .85), 1);

        let scale, alpha;
        if (lp < 0.18) {
            /* APARICIÓN: pop-in al tamaño completo */
            const t = lp / 0.18;
            scale = eO(t);
            alpha = t * .9;
        } else {
            /* ABSORCIÓN: shrink agresivo hacia el centro con fade */
            const t = (lp - 0.18) / 0.82;
            const ease = eI(t); /* aceleración cúbica → "succión" */
            scale = (1 - ease);
            alpha = (1 - t) * .9;
        }
        if (scale < 0.001 || alpha < 0.01) return;

        const rot = geoT * sh.spd * .5 + (lp > .18 ? (lp-.18)*4 : 0); /* gira más rápido al absorberse */
        /* Hue corrupto: las formas se enrojecen progresivamente conforme son tragadas */
        const corruptShift = lp > 0.18 ? (lp - 0.18) / 0.82 : 0;
        const corruptHue = sh.hue + (350 - sh.hue) * corruptShift * 0.85;

        ctx.save();
        ctx.translate(CX, CY); ctx.rotate(rot); ctx.scale(scale, scale);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = `hsla(${corruptHue},80%,${68 - corruptShift*15}%,${.6 + lp*.3})`;
        ctx.lineWidth = 1.5 + lp*1.4;
        ctx.shadowColor = `hsla(${corruptHue},90%,72%,.6)`;
        ctx.shadowBlur = 3;

        if (sh.t === 'c') {
            ctx.beginPath(); ctx.arc(0, 0, sh.r, 0, Math.PI*2); ctx.stroke();
        } else if (sh.t === 'h') {
            ctx.rotate(sh.rot || 0);
            const pts = Array.from({length:6}, (_, i) => {
                const a = (i/6)*Math.PI*2 - Math.PI/6;
                return [Math.cos(a)*sh.r, Math.sin(a)*sh.r];
            });
            drawPt(pts, 6, true);
        } else if (sh.t === 'tri') {
            ctx.rotate(sh.rot || 0);
            const pts = Array.from({length:3}, (_, i) => {
                const a = (i/3)*Math.PI*2 - Math.PI/6;
                return [Math.cos(a)*sh.r, Math.sin(a)*sh.r];
            });
            drawPt(pts, 3, true);
        } else if (sh.t === 'star') {
            const pts = [];
            for (let i = 0; i < 16; i++) {
                const a = (i/16)*Math.PI*2;
                const r2 = i%2===0 ? sh.r : sh.r*.45;
                pts.push([Math.cos(a)*r2, Math.sin(a)*r2]);
            }
            drawPt(pts, 16, true);
        }
        ctx.restore();

        /* Spawn de estelas ocasionales: pixels viajan desde la forma hacia el centro */
        if (lp > 0.18 && lp < 0.95 && Math.random() > 0.78 && absorbTrails.length < 80) {
            const ang = R(0, Math.PI*2);
            const startR = sh.r * scale;
            absorbTrails.push({
                x: CX + Math.cos(ang)*startR,
                y: CY + Math.sin(ang)*startR,
                vx: 0, vy: 0,
                a: R(.5, .9),
                r: R(.8, 2.2),
                hue: corruptHue
            });
        }
    });

    /* Update de las estelas (gravedad hacia centro) */
    for (let i = absorbTrails.length-1; i >= 0; i--) {
        const t = absorbTrails[i];
        const dx = CX - t.x, dy = CY - t.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        t.vx += (dx/d) * 0.7; t.vy += (dy/d) * 0.7;
        t.vx *= 0.94; t.vy *= 0.94;
        t.x += t.vx; t.y += t.vy;
        t.a -= 0.018;
        if (d < 8 || t.a <= 0) { absorbTrails.splice(i, 1); continue; }
        ctx.save(); ctx.globalAlpha = t.a;
        ctx.fillStyle = `hsl(${t.hue},80%,75%)`;
        ctx.shadowColor = `hsl(${t.hue},90%,80%)`;
        ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    /* Pulso central aún visible — más débil porque algo va MAL */
    ctx.save(); ctx.globalAlpha = .35;
    drawPulso(T.F3 + 200);
    ctx.globalAlpha = 1;
    ctx.restore();

    /* Halo central rojo creciente — el agujero se hace evidente */
    ctx.save();
    const halR = MIN * (.04 + gP * .06);
    const halG = ctx.createRadialGradient(CX, CY, 0, CX, CY, halR*2);
    halG.addColorStop(0,   `rgba(255,80,40,${.5 + gP*.3})`);
    halG.addColorStop(.4,  `rgba(180,30,40,${.3 + gP*.2})`);
    halG.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = halG;
    ctx.beginPath(); ctx.arc(CX, CY, halR*2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   F5 — FLASH CORRUPTO
   Glitches rojos/morados, scanlines, vibración violenta — NO blanco
   ═══════════════════════════════════════════════════════════ */
function drawCorruptFlash(prog) {
    const fp = eI(Math.min(prog*2, 1));
    const fr = eO(Math.max(prog*2 - 1, 0));
    const v = fp - fr;

    /* Pulsos discontinuos para sensación glitch */
    const pulse1 = Math.sin(prog * 32) > .3 ? 1 : 0;
    const pulse2 = Math.sin(prog * 49 + 1.3) > .55 ? 1 : 0;
    const violent = (pulse1 || pulse2) && v > .3;

    /* Blackout base (negro corrupto, ligeramente cárdeno) */
    if (v > .08) {
        ctx.save();
        ctx.globalAlpha = v * .94;
        ctx.fillStyle = violent ? '#1a0410' : '#000000';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }

    /* Estallidos rojos al pulsar */
    if (violent) {
        ctx.save();
        ctx.globalAlpha = v * .85;
        const gPick = Math.random();
        if (gPick < 0.5) {
            ctx.fillStyle = `rgba(${180 + Math.random()*75},20,40,1)`;
        } else {
            ctx.fillStyle = `rgba(120,${10 + Math.random()*30},${140 + Math.random()*60},1)`;
        }
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }

    /* Aberración cromática extrema rojo/morado (no rojo/azul) */
    const shift = 50 * v;
    cctx.clearRect(0, 0, W, H);
    if (shift > .4) {
        cctx.save();
        cctx.globalAlpha = v * .72;
        cctx.fillStyle = 'rgba(255,30,60,1)';
        cctx.fillRect(shift, 0, W, H);
        cctx.globalAlpha = v * .58;
        cctx.fillStyle = 'rgba(120,20,180,1)';
        cctx.fillRect(-shift, 0, W, H);
        cctx.restore();
        cc.style.opacity = String(v * .85);
    } else {
        cc.style.opacity = '0';
    }

    /* Scanlines aleatorias — estática */
    if (v > .25) {
        ctx.save();
        for (let y = 0; y < H; y += 4) {
            if (Math.random() > .94) {
                ctx.globalAlpha = v * .42;
                ctx.fillStyle = Math.random() > .5
                    ? `rgba(255,40,60,1)`
                    : `rgba(50,10,80,1)`;
                ctx.fillRect(0, y, W, 1 + Math.random()*3);
            }
        }
        /* Bandas horizontales gruesas ocasionales */
        if (Math.random() > .85) {
            const bandY = R(0, H), bandH = R(8, 30);
            ctx.globalAlpha = v * .35;
            ctx.fillStyle = 'rgba(180,30,50,1)';
            ctx.fillRect(0, bandY, W, bandH);
        }
        ctx.restore();
    }

    /* Vibración VIOLENTA de pantalla */
    const vib = v * 26;
    cv.style.transform = `translate(${(Math.random()-.5)*vib}px, ${(Math.random()-.5)*vib*.7}px)`;
}

/* Polígono morfo */
const POLY_SAMPLES = 36;
const _polyBuf = new Array(POLY_SAMPLES);
const SVG_CX = 500, SVG_CY = 500;
function buildPolygonPointsString(n, radius, rotation) {
    const nLow = n|0, nHigh = nLow+1, t = n - nLow;
    const thetaL = (Math.PI*2)/nLow, halfL = thetaL*.5;
    const thetaH = (Math.PI*2)/nHigh, halfH = thetaH*.5;
    const chL = Math.cos(halfL), chH = Math.cos(halfH);
    for (let i = 0; i < POLY_SAMPLES; i++) {
        const phi = (i/POLY_SAMPLES) * Math.PI*2;
        const ph = phi - rotation;
        let lL = ph % thetaL; if (lL < 0) lL += thetaL; lL -= halfL;
        let lH = ph % thetaH; if (lH < 0) lH += thetaH; lH -= halfH;
        const rL = radius * chL / Math.cos(lL);
        const rH = radius * chH / Math.cos(lH);
        const rr = rL*(1-t) + rH*t;
        _polyBuf[i] = (SVG_CX + Math.cos(phi)*rr).toFixed(2) + ',' + (SVG_CY + Math.sin(phi)*rr).toFixed(2);
    }
    return _polyBuf.join(' ');
}

function drawFlashes() {
    if (FLASHES.length === 0) return;
    const baseR = MIN * (0.35 + evolution*0.15);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = FLASHES.length-1; i >= 0; i--) {
        const f = FLASHES[i];
        f.age++;
        if (f.age >= f.ttl) { FLASHES.splice(i, 1); continue; }
        const t = f.age / f.ttl;
        const ease = 1 - (1-t)*(1-t);
        const radius = f.size + baseR*ease;
        const alpha = (1-t) * f.intensity;

        ctx.strokeStyle = `rgba(255,${~~(140+(1-t)*100)},${~~(40+(1-t)*60)},${alpha.toFixed(3)})`;
        ctx.lineWidth = 2 + (1-t)*5;
        ctx.shadowColor = `rgba(255,90,30,${(alpha*.9).toFixed(3)})`;
        ctx.shadowBlur = 28;
        ctx.beginPath(); ctx.arc(CX, CY, radius, 0, Math.PI*2); ctx.stroke();

            g.addColorStop(0,    `rgba(255,220,150,${fillA.toFixed(3)})`);

            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(CX, CY, radius*0.9, 0, Math.PI*2); ctx.fill();
        }
    }
    ctx.restore();
}

function drawComets() {
    if (!animDone) return; /* no spawneamos cometas hasta que el reveal esté completo */
    const now = Date.now();
    if (lastMeteorTime === 0) lastMeteorTime = now;

    const spawnAccel = 1 - evolution*0.4;
    if (COMETS.length < MAX_COMETS && now - lastMeteorTime > meteorInterval*spawnAccel) {
        spawnMeteor();
        lastMeteorTime = now;
        meteorInterval = R(2200, 4500);
    }

    let targetProximity = 0;
    const absorbRadius = runeRadius * (0.22 + evolution*0.15);

    for (let i = COMETS.length-1; i >= 0; i--) {
        const ct = COMETS[i];
        const gdx = CX - ct.x, gdy = CY - ct.y;
        const gdist2 = gdx*gdx + gdy*gdy;
        const gdist = Math.sqrt(gdist2);
        const safeD = Math.max(gdist, 30);
        const gAccel = GRAVITY_STRENGTH * (MIN*MIN) / (safeD*safeD);
        ct.vx += (gdx/gdist) * gAccel;
        ct.vy += (gdy/gdist) * gAccel;
        const speed = Math.sqrt(ct.vx*ct.vx + ct.vy*ct.vy);
        const maxSpd = 28;
        if (speed > maxSpd) { ct.vx = ct.vx/speed*maxSpd; ct.vy = ct.vy/speed*maxSpd; }
        ct.x += ct.vx; ct.y += ct.vy;
        ct.tail.push({x:ct.x, y:ct.y});
        if (ct.tail.length > 18) ct.tail.shift();

        if (gdist2 < runeRadiusSq*4) {
            const p = 1 - gdist/(runeRadius*2);
            if (p > targetProximity) targetProximity = Math.min(p, 1);
        }

        const wasAlive = ct.life > 0;
        if (gdist < absorbRadius) ct.life -= 0.08;
        if (wasAlive && ct.life <= 0) spawnFlash();

        if (ct.life <= 0 || gdist > MIN*1.8) { COMETS.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = ct.life * 0.92;
        if (ct.tail.length > 2) {
            for (let t = 1; t < ct.tail.length; t++) {
                const tf = t / ct.tail.length;
                const alpha = tf * 0.75 * ct.life;
                ctx.beginPath();
                ctx.moveTo(ct.tail[t-1].x, ct.tail[t-1].y);
                ctx.lineTo(ct.tail[t].x, ct.tail[t].y);
                ctx.strokeStyle = ct.color + alpha.toFixed(2) + ')';
                ctx.lineWidth = 1.2 + tf*1.6;
                ctx.shadowColor = ct.color + '0.6)';
                ctx.shadowBlur = 8;
                ctx.stroke();
            }
        }
        const headR = 5 * ct.life;
        if (headR > 0.3) {
            ctx.shadowBlur = 18 * ct.life;
            ctx.shadowColor = ct.color + '0.9)';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(ct.x, ct.y, headR, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    if (COMETS.length > 0) {
        const closest = COMETS.reduce((best, ct) => {
            const d = (ct.x-CX)**2 + (ct.y-CY)**2;
            return d < best.d ? {d, ct} : best;
        }, {d:Infinity, ct:null}).ct;
        if (closest) {
            targetTiltY = ((closest.x - CX) / (W/2)) * 22;
            targetTiltX = -((closest.y - CY) / (H/2)) * 22;
        }
    } else {
        targetTiltX = 0; targetTiltY = 0;
    }

    currentTiltX += (targetTiltX - currentTiltX) * 0.04;
    currentTiltY += (targetTiltY - currentTiltY) * 0.04;
    /* Sólo aplicamos tilt si NO estamos en fase expand/fade */
    if (el < T.EXPAND_START) {
        svgEl.style.transform = `rotateX(${currentTiltX.toFixed(2)}deg) rotateY(${currentTiltY.toFixed(2)}deg)`;
    }

    currentProximity += (targetProximity - currentProximity) * 0.09;
    if (currentProximity > 0.002 || hexBoostAngle !== 0) {
        hexBoostAngle = (hexBoostAngle + currentProximity * 9) % 360;
        hexSpinBoost.style.transform = `rotate(${hexBoostAngle.toFixed(2)}deg)`;
        const rp = PUPIL_REST_R + (PUPIL_MAX_R - PUPIL_REST_R) * currentProximity;
        pupil.setAttribute('r', rp.toFixed(2));
    }
}

function drawCorona() {
    const svgW = svgEl.getBoundingClientRect().width;
    const moonR = svgW * 0.20;
    const innerR = moonR * 0.98;
    const outerR = moonR * (2.6 + evolution*1.2);
    const breath = 0.92 + 0.08 * Math.sin(uT*1.4);
    const intensity = (0.55 + evolution*0.45) * breath;

    const g = ctx.createRadialGradient(CX, CY, innerR, CX, CY, outerR);
    g.addColorStop(0.00, `rgba(255,220,150,${(0.95*intensity).toFixed(3)})`);
    g.addColorStop(0.08, `rgba(255,150,60, ${(0.85*intensity).toFixed(3)})`);
    g.addColorStop(0.22, `rgba(220,70,40,  ${(0.65*intensity).toFixed(3)})`);
    g.addColorStop(0.45, `rgba(120,30,40,  ${(0.40*intensity).toFixed(3)})`);
    g.addColorStop(0.72, `rgba(50,15,55,   ${(0.22*intensity).toFixed(3)})`);
    g.addColorStop(1.00, 'rgba(0,0,0,0)');

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    const numStreamers = isMobile ? 6 : 9;
    const streamerLen = outerR * (0.85 + evolution*0.3);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.18 + evolution*0.20;
    for (let i = 0; i < numStreamers; i++) {
        const ang = (i/numStreamers)*Math.PI*2 + uT*0.06;
        const wobble = Math.sin(uT*0.8 + i*1.7) * 0.15;
        const len = streamerLen * (0.75 + wobble);
        const sx = CX + Math.cos(ang)*innerR;
        const sy = CY + Math.sin(ang)*innerR;
        const ex = CX + Math.cos(ang)*len;
        const ey = CY + Math.sin(ang)*len;
        const sg = ctx.createLinearGradient(sx, sy, ex, ey);
        sg.addColorStop(0,    `hsla(${22+i*4},85%,55%,.85)`);
        sg.addColorStop(0.55, `hsla(${10+i*5},78%,38%,.30)`);
        sg.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.strokeStyle = sg;
        ctx.lineWidth = 1.4 + Math.sin(uT*1.2 + i)*0.7;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    }
    ctx.restore();
}

function drawCorruptUniverse(alpha) {
    /* Nebulosas (tonos sangre/morado/quemado) */
    NEBULOSAS.forEach((nb, i) => {
        const pulse = .5 + .5 * Math.sin(uT*.32 + i*2.1);
        if (!nb._g) {
            const g = ctx.createRadialGradient(CX+nb.ox, CY+nb.oy, 0, CX+nb.ox, CY+nb.oy, nb.r);
            g.addColorStop(0, `hsla(${nb.tono},68%,38%,.85)`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            nb._g = g;
        }
        ctx.save();
        ctx.globalAlpha = nb.a * alpha * pulse;
        ctx.fillStyle = nb._g;
        ctx.beginPath(); ctx.arc(CX+nb.ox, CY+nb.oy, nb.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    /* Estrellas */
    STARS.forEach(s => {
        s.a += s.spd;
        const ox = CX + Math.cos(s.a) * s.d;
        const oy = CY + Math.sin(s.a) * s.d;
        const b = s.br * (.42 + .58 * Math.sin(uT*2.5 + s.a*4.5));
        ctx.save();
        ctx.globalAlpha = b * alpha * .85;
        ctx.fillStyle = `hsl(${s.tono},65%,72%)`;
        ctx.shadowColor = `hsl(${s.tono},88%,80%)`;
        ctx.shadowBlur = s.r * 1.8;
        ctx.beginPath(); ctx.arc(ox, oy, s.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    /* Clusters */
    CLUSTERS.forEach(cl => {
        cl.stars.forEach(st => {
            const b = st.br * (.4 + .6 * Math.sin(uT*1.8 + st.ph));
            ctx.save();
            ctx.globalAlpha = b * alpha * .7;
            ctx.fillStyle = `hsl(${st.tono},75%,82%)`;
            ctx.beginPath(); ctx.arc(cl.cx+st.dx, cl.cy+st.dy, st.r, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });
    });

    /* Anillos de gravedad */
    for (let di = 0; di < 4; di++) {
        const dr = MIN * (.06 + di*.072) + Math.sin(uT*.70 + di*1.45) * 10;
        const da = (.06 - di*.008) * (.5 + .5*Math.sin(uT*.55 + di*1.2)) * alpha;
        if (da <= 0) continue;
        ctx.save();
        ctx.globalAlpha = Math.max(da, 0);
        ctx.strokeStyle = `hsla(${15 + di*12},75%,50%,.85)`;
        ctx.lineWidth = .8 + di*.14;
        ctx.beginPath(); ctx.arc(CX, CY, dr, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }

    /* Orbs */
    ORBS.forEach(orb => {
        orb.angle += orb.spd;
        const x = CX + Math.cos(orb.angle) * orb.orbitR;
        const y = CY + Math.sin(orb.angle) * orb.orbitR * Math.abs(Math.sin(orb.tilt));
        const z = Math.sin(orb.angle) * Math.cos(orb.tilt);
        const dep = .55 + .45 * ((z+1)/2);
        const oa = orb.a * dep * (.48 + .52*Math.sin(uT*1.25 + orb.phase)) * alpha;
        ctx.save();
        ctx.globalAlpha = Math.max(oa, 0);
        ctx.fillStyle = `hsl(${orb.tono},78%,70%)`;
        ctx.shadowColor = `hsl(${orb.tono},90%,78%)`;
        ctx.shadowBlur = orb.r * 3 * dep;
        ctx.beginPath(); ctx.arc(x, y, orb.r*dep, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    /* Floaters */
    FLOATERS.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const fa = p.a * (.42 + .58*Math.sin(uT*1.25 + p.ph)) * alpha;
        ctx.save();
        ctx.globalAlpha = Math.max(fa, 0);
        ctx.fillStyle = `hsl(${p.tono},65%,70%)`;
        ctx.shadowColor = `hsl(${p.tono},82%,78%)`;
        ctx.shadowBlur = p.r * 2.2;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });
}

/* ═══════════════════════════════════════════════════════════
   ABSORCIÓN DE TÍTULO (5s tras spawn de letras)
   ═══════════════════════════════════════════════════════════ */
let titleAbsorbed = false;
function absorbTitleAnim() {
    /* Stagger leve para que las 3 líneas no se vayan al mismo tiempo */
    [
        { el: ntitle, delay: 0,   dur: 1500 },
        { el: nsub,   delay: 120, dur: 1400 },
        { el: npct,   delay: 220, dur: 1300 }
    ].forEach(({el: target, delay, dur}) => {
        setTimeout(() => {
            const rect = target.getBoundingClientRect();
            const tCenterY = rect.top + rect.height/2;
            const moveY = (H/2) - tCenterY;
            target.style.transition =
                `transform ${dur}ms cubic-bezier(.7,0,.85,.35), ` +
                `opacity ${dur}ms cubic-bezier(.5,0,1,.5), ` +
                `filter ${dur}ms ease-in`;
            target.style.transform =
                `translate(-50%, ${moveY.toFixed(1)}px) scale(0.04) rotate(${Math.random() > .5 ? 540 : -540}deg)`;
            target.style.opacity = '0';
            target.style.filter = 'blur(10px)';
        }, delay);
    });
    /* Spawn una rafaga de flashes en el centro como si el título fuera "tragado" */
    let bursts = 0;
    const burstInterval = setInterval(() => {
        spawnFlash();
        bursts++;
        if (bursts >= 4) clearInterval(burstInterval);
    }, 250);
}

/* ═══════════════════════════════════════════════════════════
   EXPANSIÓN DEL ECLIPSE — la luna crece hasta tapar la pantalla
   ═══════════════════════════════════════════════════════════ */
function drawEclipseExpansion(progress) {
    const eased = eO(progress);
    const targetR = Math.sqrt(W*W + H*H) * 0.6; /* > diagonal/2 con margen */
    const startR = MIN * 0.20;
    const r = startR + (targetR - startR) * eased;

    /* Empuja evolución a max durante expansión */
    evolution = Math.min(1, Math.max(evolution, 0.6 + progress*0.4));

    /* Anillo caliente brillante (borde de la luna en expansión) — se atenúa */
    const edgeAlpha = (1 - eased) * 0.85;
    if (edgeAlpha > 0.04) {
        ctx.save();
        ctx.strokeStyle = `rgba(255,140,50,${edgeAlpha.toFixed(3)})`;
        ctx.lineWidth = 6;
        ctx.shadowColor = `rgba(255,80,20,${(edgeAlpha*0.9).toFixed(3)})`;
        ctx.shadowBlur = 40;
        ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2); ctx.stroke();
        /* Anillo secundario más fino */
        ctx.strokeStyle = `rgba(255,220,150,${(edgeAlpha*0.6).toFixed(3)})`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.arc(CX, CY, r-3, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }

    /* Cuerpo negro de la luna */
    ctx.save();
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   FADE OUT — todo se desvanece a opacidad 0 → UI detrás visible
   ═══════════════════════════════════════════════════════════ */
function applyFadeOut(progress) {
    const a = (1 - eO(progress)).toFixed(3);
    cv.style.opacity = a;
    wrap.style.opacity = a;
    document.getElementById('vig').style.opacity = a;
}

/* ═══════════════════════════════════════════════════════════
   LOOP PRINCIPAL
   ═══════════════════════════════════════════════════════════ */
let geoInit = false, f7a = 0;
let lastFrame = performance.now();

function loop(ts) {
    el = ts - START;
    const dtMs = ts - lastFrame;
    lastFrame = ts;
    const dt = Math.min(dtMs, 50) / 1000;

    ctx.clearRect(0, 0, W, H);

    /* Fondo oscuro corrompido conforme avanza F2-F4 (subtle red tint) */
    if (el >= T.F2 && el < T.F7) {
        const bgT = C((el - T.F2) / 1500, 0, 1);
        const corrupt = corruptionLevel(el);
        const rR = ~~(eI(bgT) * 8 + corrupt * 6);
        const gG = 0;
        const bB = ~~(eI(bgT) * 6);
        ctx.fillStyle = `rgba(${rR},${gG},${bB},${(eI(bgT)*0.97).toFixed(3)})`;
        ctx.fillRect(0, 0, W, H);
    }

    /* F1: cracks */
    if (el < T.F2) drawCracks(el);
    else cv.style.transform = '';

    /* F2: implosion */
    if (el >= T.F2 && el < T.F2b) {
        if (!imploded) { imploded = true; recogerParticulas(); }
        drawImplosion(C((el - T.F2) / (T.F2b - T.F2), 0, 1));
    }

    /* F2b: singularity */
    if (el >= T.F2b && el < T.F3) {
        drawSingularity(C((el - T.F2b) / (T.F3 - T.F2b), 0, 1));
    }

    /* F3: pulse */
    if (el >= T.F3 && el < T.F4) {
        const p = C((el - T.F3) / (T.F4 - T.F3), 0, 1);
        ctx.globalAlpha = eO(p);
        drawPulso(el);
        ctx.globalAlpha = 1;
    }

    /* F4: geometría ABSORBIDA */
    if (el >= T.F4 && el < T.F5) {
        if (!geoInit) { geoInit = true; initGeo(); }
        drawGeoAbsorption(el);
    }

    /* F5: corrupt flash */
    if (el >= T.F5 && el < T.F6) {
        drawCorruptFlash(C((el - T.F5) / (T.F6 - T.F5), 0, 1));
    } else if (el >= T.F6) {
        cv.style.transform = '';
        cc.style.opacity = '0';
    }

    /* F6: letras (ECLIPSE) + glitch ocasional */
    if (el >= T.F6 && !letSpawned) spawnLetras();
    if (el >= T.F6 && el < T.TITLE_ABSORB) {
        nsub.style.opacity = String(C((el - T.F6 - 500) / 1600, 0, 1));
        npct.style.opacity = String(C((el - T.F6 - 1100) / 1600, 0, 1));
        if (el >= T.F6 + 800) maybeGlitchTitle(performance.now());
    }

    /* F7: ECLIPSE REVEAL (corrupto) — se queda activo hasta el final */
    if (el >= T.F7) {
        const p = C((el - T.F7) / 4500, 0, 1);
        f7a = eO(p);

        /* Negro absoluto de fondo bajo el resto */
        ctx.fillStyle = '#000005';
        ctx.fillRect(0, 0, W, H);

        drawCorruptUniverse(f7a);
        drawCorona();
        drawComets();
        drawFlashes();
        updateExplode();

        if (!revDone && p > 0.15) {
            revDone = true;
            if (!explodeFired) { explodeFired = true; spawnExplosion(); }
            runeFlashEl.style.transition = 'opacity 0.15s ease-in';
            runeFlashEl.style.opacity = '1';
            setTimeout(() => {
                runeFlashEl.style.transition = 'opacity 1.8s ease-out';
                runeFlashEl.style.opacity = '0';
            }, 180);
            wrap.style.transition = 'opacity 3.5s ease-out';
            wrap.style.opacity = '1';
            setTimeout(() => { animDone = true; }, 4500);
            if (!periTimer) periTimer = setInterval(tickPeriWriter, 130);
        }
        document.getElementById('vig').style.opacity = '1';

        /* Sólo durante el período de "respiración" entre F7 y EXPAND, evolución sube */
        if (el < T.EXPAND_START) {
            evolution = Math.min(1, evolution + EVOLUTION_PER_SEC * dt);
            if (Math.abs(evolution - evoLastSync) > 0.02) {
                document.body.style.setProperty('--evo', evolution.toFixed(3));
                evoLastSync = evolution;
                if (coronaEdge) {
                    const newR = 240 + evolution * 22;
                    coronaEdge.setAttribute('r', newR.toFixed(1));
                }
            }
        }

        /* Polígono morfo (más vértices con evolución alta) */
        const morphMin = 3, morphMax = 9.5 + evolution*2;
        const n = morphMin + (Math.sin(uT*1.35)*0.5 + 0.5) * (morphMax - morphMin);
        morphPoly.setAttribute('points', buildPolygonPointsString(n, 200, uT*0.48));
        uT += 0.006;
    }

    /* TITLE_ABSORB: títulos succionados */
    if (el >= T.TITLE_ABSORB && !titleAbsorbed) {
        titleAbsorbed = true;
        absorbTitleAnim();
    }

    /* EXPAND: la luna crece y traga la pantalla */
    if (el >= T.EXPAND_START && el < T.EXPAND_END) {
        const p = C((el - T.EXPAND_START) / (T.EXPAND_END - T.EXPAND_START), 0, 1);
        drawEclipseExpansion(p);
    }

    /* Mantener pantalla negra entre EXPAND_END y final */
    if (el >= T.EXPAND_END && el < T.FADE_END) {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H);
    }

    /* FADE: opacities a 0 → revela UI debajo */
    if (el >= T.FADE_START && el < T.FADE_END) {
        const p = C((el - T.FADE_START) / (T.FADE_END - T.FADE_START), 0, 1);
        applyFadeOut(p);
    } else if (el >= T.FADE_END) {
        cv.style.opacity = '0';
        wrap.style.opacity = '0';
        document.getElementById('vig').style.opacity = '0';
        if (periTimer) { clearInterval(periTimer); periTimer = null; }
    }

    requestAnimationFrame(loop);
}

START = performance.now();
lastFrame = START;
requestAnimationFrame(loop);
</script>
