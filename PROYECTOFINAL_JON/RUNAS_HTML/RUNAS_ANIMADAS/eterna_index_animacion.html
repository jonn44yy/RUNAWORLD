<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

#c       { position:fixed; inset:0; z-index:10; }
#c-chroma{ position:fixed; inset:0; z-index:11; pointer-events:none; mix-blend-mode:screen; opacity:0; }

#vig {
    position:fixed; inset:0; z-index:780; pointer-events:none; opacity:0;
    background:radial-gradient(ellipse at center,
        rgba(0,0,0,0) 28%, rgba(0,0,0,0.5) 62%, rgba(0,0,0,0.94) 100%);
}
#vig::after {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 2px);
    opacity:0.5;
}

#ntitle {
    position:fixed; bottom:12%; left:50%; transform:translateX(-50%);
    z-index:820; display:flex; gap:0; white-space:nowrap; pointer-events:none;
}
.nl {
    font-family:'Cinzel Decorative',cursive;
    font-size:clamp(1.5rem,4vw,4.5rem); font-weight:900;
    background:linear-gradient(180deg,#fff 0%,#dccfff 30%,#9860ff 60%,#50c0ff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 20px rgba(160,100,255,0.95));
    letter-spacing:8px; opacity:0;
    transform:scale(3.5) translateZ(0);
    display:inline-block;
}
#nsub {
    position:fixed; bottom:7.5%; left:50%; transform:translateX(-50%);
    z-index:820; pointer-events:none; white-space:nowrap;
    font-family:'Cinzel',serif; font-size:clamp(0.65rem,1.4vw,1rem);
    letter-spacing:14px; color:rgba(185,155,255,0.9);
    text-shadow:0 0 22px rgba(160,100,255,0.75);
    opacity:0; transition:opacity 2.5s ease-out;
}
#npct {
    position:fixed; bottom:4.5%; left:50%; transform:translateX(-50%);
    z-index:820; pointer-events:none; white-space:nowrap;
    font-family:'Oswald',sans-serif; font-size:clamp(0.6rem,1.2vw,0.9rem);
    letter-spacing:13px; color:rgba(110,200,255,0.95);
    text-shadow:0 0 16px rgba(80,180,255,0.85);
    opacity:0; transition:opacity 2s ease-out 1s;
}

#wrap {
    position:fixed; inset:0; z-index:800;
    display:flex; justify-content:center; align-items:center;
    opacity:0; pointer-events:none;
    animation:efloat 8s ease-in-out infinite;
    perspective:1200px;
}
@keyframes efloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }

#esvg {
    width:min(680px,88vw); height:min(680px,88vw);
    filter:drop-shadow(0 0 22px rgba(145,85,255,0.45))
           drop-shadow(0 0 55px rgba(65,155,255,0.18));
    transform-style:preserve-3d;
    will-change:transform;
}
.rs  { animation:er 52s linear infinite; transform-origin:center; }
.rm  { animation:er 26s linear infinite; transform-origin:center; }
.rf  { animation:er 11s linear infinite; transform-origin:center; }
.rv  { animation:er 36s linear infinite reverse; transform-origin:center; }
.rvs { animation:er 65s linear infinite reverse; transform-origin:center; }
.rp  { animation:ep 3.5s ease-in-out infinite; }
@keyframes er { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes ep { 0%,100%{opacity:.5;transform:scale(.97)} 50%{opacity:1;transform:scale(1.04)} }

#rune-flash { display:none !important; opacity:0 !important; }
</style>
</head>

<script>
const W=window.innerWidth,H=window.innerHeight,CX=W/2,CY=H/2,MIN=Math.min(W,H);
// Versión ligera para fondo: se dibuja a menor resolución y el navegador escala el canvas.
// Mantiene la composición, pero reduce bastante coste de GPU/CPU detrás del blur del index.
const RENDER_SCALE = 0.55;
const cv=document.getElementById('c');
cv.width=Math.max(1,Math.floor(W*RENDER_SCALE));cv.height=Math.max(1,Math.floor(H*RENDER_SCALE));
cv.style.width='100vw';cv.style.height='100vh';
const ctx=cv.getContext('2d');ctx.scale(RENDER_SCALE,RENDER_SCALE);
const cc=document.getElementById('c-chroma');
cc.width=Math.max(1,Math.floor(W*RENDER_SCALE));cc.height=Math.max(1,Math.floor(H*RENDER_SCALE));
cc.style.width='100vw';cc.style.height='100vh';
const cctx=cc.getContext('2d');cctx.scale(RENDER_SCALE,RENDER_SCALE);
const L=(a,b,t)=>a+(b-a)*t,C=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const eI=t=>t*t*t,eO=t=>1-Math.pow(1-t,3),eIO=t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
const R=(a,b)=>a+Math.random()*(b-a);

// Tiempos — F2b = singularidad entre implosión y pulso
const T={F1:0,F2:3500,F2b:5200,F3:6400,F4:9800,F5:14300,F6:15500,F7:17300};
let START=performance.now(),el=0;

// ═══════════════════════════════════
// F1: GRIETAS MEJORADAS
// ═══════════════════════════════════
const CRACKS=[],SHARDS=[];
(function(){
    for(let g=0;g<10;g++){
        const sx=R(W*.04,W*.96),sy=R(H*.04,H*.96);
        const segs=[],n=~~R(5,14);let x=sx,y=sy;
        for(let s=0;s<n;s++){
            const len=R(28,195),ang=R(0,Math.PI*2);
            const nx=x+Math.cos(ang)*len,ny=y+Math.sin(ang)*len;
            segs.push({x1:x,y1:y,x2:nx,y2:ny,branch:false});
            if(Math.random()>.55){
                const bL=R(15,80),bA=ang+R(-.9,.9);
                segs.push({x1:nx,y1:ny,x2:nx+Math.cos(bA)*bL,y2:ny+Math.sin(bA)*bL,branch:true});
            }
            x=nx;y=ny;
        }
        CRACKS.push({segs,prog:0,spd:R(.012,.045),a:R(.5,1),w:R(.7,3.5),hue:R(170,320),delay:R(0,2400),born:null,parts:[]});
    }
    for(let i=0;i<16;i++){
        const cx=R(W*.1,W*.9),cy=R(H*.1,H*.9),sides=~~R(3,6),pts=[];
        for(let s=0;s<sides;s++){const a=(s/sides)*Math.PI*2+R(-.3,.3),r=R(8,35);pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});}
        SHARDS.push({cx,cy,pts,hue:R(200,320),a:0,targetA:R(.15,.55),rot:R(0,Math.PI*2),rotSpd:R(-.02,.02),delay:R(400,2800),shimmer:R(0,Math.PI*2)});
    }
})();
let ctT=0;
function drawCracks(elapsed){
    ctT+=.045;
    const crG=Math.min(elapsed/3000,1)*.12;
    ctx.save();ctx.globalAlpha=crG;
    const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,MIN*.6);
    bg.addColorStop(0,'rgba(60,20,120,.3)');bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(CX,CY,MIN*.6,0,Math.PI*2);ctx.fill();ctx.restore();

    CRACKS.forEach(cr=>{
        if(elapsed<cr.delay)return;
        if(!cr.born)cr.born=elapsed;
        cr.prog=Math.min(cr.prog+cr.spd,1);if(cr.prog<=0)return;
        const flk=.5+.5*Math.abs(Math.sin(ctT*7+cr.hue*.01));
        ctx.save();const nS=cr.segs.length,sP=cr.prog*nS;
        for(let si=0;si<nS;si++){
            if(si>sP)break;
            const sg=cr.segs[si],lp=Math.min(sP-si,1);

let exParts=[],explodeFired=false;
function spawnExplosion(){
    for(let i=0;i<45;i++){const ang=Math.random()*Math.PI*2;exParts.push({x:CX,y:CY,ang,spd:R(3,14),curve:R(-.02,.02),r:R(1.5,5.5),alpha:1,hue:R(230,320),decay:R(.008,.018),grav:R(0,.08)});}
    for(let i=0;i<24;i++){const ang=Math.random()*Math.PI*2;exParts.push({x:CX,y:CY,ang,spd:R(.5,4),curve:R(-.03,.03),r:R(3,8),alpha:.8,hue:R(200,300),decay:R(.005,.012),grav:R(0,.04)});}
    for(let i=0;i<28;i++){const ang=Math.random()*Math.PI*2;exParts.push({x:CX,y:CY,ang,spd:R(5,18),curve:R(-.015,.015),r:R(.5,2),alpha:1,hue:R(240,360),decay:R(.015,.03),grav:0});}
}
function updateExplode(){
    exParts=exParts.filter(p=>{p.ang+=p.curve;p.x+=Math.cos(p.ang)*p.spd;p.y+=Math.sin(p.ang)*p.spd+p.grav;p.spd*=.972;p.alpha-=p.decay;
        if(p.alpha<=0)return false;ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=`hsl(${p.hue},88%,78%)`;
        ctx.shadowColor=`hsl(${p.hue},100%,72%)`;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();return true;});
}

// ═══════════════════════════════════
// UNIVERSO
// ═══════════════════════════════════
const STARS=Array.from({length:120},()=>({a:R(0,Math.PI*2),d:R(20,MIN*.68),r:R(.22,2.4),br:R(.2,.95),spd:R(.00012,.00072),hue:R(198,322)}));
const NEBS=[{ox:R(-MIN*.35,MIN*.35),oy:R(-MIN*.35,MIN*.35),r:MIN*R(.28,.52),hue:R(238,292),a:R(.06,.12)},{ox:R(-MIN*.28,MIN*.28),oy:R(-MIN*.28,MIN*.28),r:MIN*R(.2,.38),hue:R(198,248),a:R(.05,.1)},{ox:R(-MIN*.22,MIN*.22),oy:R(-MIN*.22,MIN*.22),r:MIN*R(.15,.3),hue:R(268,322),a:R(.04,.09)},{ox:R(-MIN*.18,MIN*.18),oy:R(-MIN*.18,MIN*.18),r:MIN*R(.12,.24),hue:R(210,270),a:R(.04,.08)}];
const ORBS=Array.from({length:32},()=>({angle:R(0,Math.PI*2),orbitR:R(MIN*.08,MIN*.42),tilt:R(0,Math.PI),spd:R(.006,.03)*(Math.random()>.5?1:-1),r:R(.8,3.5),a:R(.18,.65),hue:R(208,325),phase:R(0,Math.PI*2)}));
const FLOATERS=Array.from({length:24},()=>({x:R(0,W),y:R(0,H),vx:R(-.18,.18),vy:R(-.14,.14),r:R(.4,2.2),a:R(.06,.42),hue:R(198,330),ph:R(0,Math.PI*2)}));
const CLUSTERS=Array.from({length:4},()=>({cx:CX+R(-W*.42,W*.42),cy:CY+R(-H*.42,H*.42),stars:Array.from({length:~~R(4,10)},()=>({dx:R(-50,50),dy:R(-50,50),r:R(.2,1.4),br:R(.3,.9),hue:R(200,320),ph:R(0,Math.PI*2)}))}));

// ASTEROIDES + OJO
const COMETS=[];const svgEl=document.getElementById('esvg');
let lastAT=0,tTX=0,tTY=0,cTX=0,cTY=0,animDone=false;
function drawComets(){
    if(!animDone)return;const now=Date.now();if(lastAT===0)lastAT=now;
    if(now-lastAT>R(7000,9000)){const sl=Math.random()<.5;COMETS.push({x:sl?-80:W+80,y:R(0,H),vx:sl?R(6,10):-R(6,10),vy:R(-4,4)});lastAT=now;}
    for(let i=COMETS.length-1;i>=0;i--){let ct=COMETS[i];ct.x+=ct.vx;ct.y+=ct.vy;
        if(ct.x<-100||ct.x>W+100||ct.y<-100||ct.y>H+100){COMETS.splice(i,1);continue;}
        ctx.save();ctx.beginPath();ctx.moveTo(ct.x,ct.y);ctx.lineTo(ct.x-ct.vx*15,ct.y-ct.vy*15);
        ctx.strokeStyle='rgba(220,235,255,0.85)';ctx.lineWidth=2.5;ctx.shadowColor='#fff';ctx.shadowBlur=0;ctx.stroke();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ct.x,ct.y,5,0,Math.PI*2);ctx.fill();ctx.restore();}
    if(COMETS.length>0){const a=COMETS[0];tTY=(a.x-CX)/(W/2)*30;tTX=-(a.y-CY)/(H/2)*30;}else{tTX=0;tTY=0;}
    cTX+=(tTX-cTX)*.04;cTY+=(tTY-cTY)*.04;svgEl.style.transform=`rotateX(${cTX}deg) rotateY(${cTY}deg)`;
}

let uT=0,revDone=false;
function drawUniverse(alpha){
    uT+=.006;
    NEBS.forEach((nb,i)=>{const pulse=.5+.5*Math.sin(uT*.35+i*2.1);ctx.save();ctx.globalAlpha=nb.a*alpha*pulse;
        const ng=ctx.createRadialGradient(CX+nb.ox,CY+nb.oy,0,CX+nb.ox,CY+nb.oy,nb.r);ng.addColorStop(0,`hsla(${nb.hue},72%,60%,.9)`);ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng;ctx.beginPath();ctx.arc(CX+nb.ox,CY+nb.oy,nb.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    ctx.save();ctx.globalAlpha=alpha*.09;for(let bi=0;bi<5;bi++){const bA=bi*Math.PI/4+uT*.014;
        const bG=ctx.createLinearGradient(CX+Math.cos(bA)*MIN,CY+Math.sin(bA)*MIN,CX-Math.cos(bA)*MIN,CY-Math.sin(bA)*MIN);
        bG.addColorStop(0,'rgba(0,0,0,0)');bG.addColorStop(.35,`hsla(${228+bi*23},62%,55%,.5)`);bG.addColorStop(.5,`hsla(${238+bi*23},68%,62%,.72)`);bG.addColorStop(.65,`hsla(${228+bi*23},62%,55%,.5)`);bG.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=bG;ctx.fillRect(0,0,W,H);}ctx.restore();
    STARS.forEach(s=>{s.a+=s.spd;const ox=CX+Math.cos(s.a)*s.d,oy=CY+Math.sin(s.a)*s.d;const b=s.br*(.42+.58*Math.sin(uT*2.5+s.a*4.5));
        ctx.save();ctx.globalAlpha=b*alpha*.85;ctx.fillStyle=`hsl(${s.hue},72%,78%)`;ctx.shadowColor=`hsl(${s.hue},92%,86%)`;ctx.shadowBlur=s.r*2.8;
        ctx.beginPath();ctx.arc(ox,oy,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    CLUSTERS.forEach(cl=>{cl.stars.forEach(st=>{const b=st.br*(.4+.6*Math.sin(uT*1.8+st.ph));ctx.save();ctx.globalAlpha=b*alpha*.7;
        ctx.fillStyle=`hsl(${st.hue},75%,82%)`;ctx.shadowColor=`hsl(${st.hue},90%,88%)`;ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(cl.cx+st.dx,cl.cy+st.dy,st.r,0,Math.PI*2);ctx.fill();ctx.restore();});});
    ctx.save();ctx.globalAlpha=alpha*.22;for(let i=0;i<28;i++){const ang=(i/28)*Math.PI*2+uT*.09,rL=MIN*(.28+.1*Math.sin(uT*.55+i));
        const rG=ctx.createLinearGradient(CX,CY,CX+Math.cos(ang)*rL,CY+Math.sin(ang)*rL);
        rG.addColorStop(0,`hsla(${232+i*5},82%,78%,.88)`);rG.addColorStop(.5,`hsla(${232+i*5},65%,60%,.22)`);rG.addColorStop(1,'rgba(0,0,0,0)');
        ctx.strokeStyle=rG;ctx.lineWidth=2+Math.sin(uT*1.6+i)*1;ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(ang)*rL,CY+Math.sin(ang)*rL);ctx.stroke();}ctx.restore();
    ORBS.forEach(orb=>{orb.angle+=orb.spd;const x=CX+Math.cos(orb.angle)*orb.orbitR,y=CY+Math.sin(orb.angle)*orb.orbitR*Math.abs(Math.sin(orb.tilt));
        const z=Math.sin(orb.angle)*Math.cos(orb.tilt),depth=.55+.45*((z+1)/2),oa=orb.a*depth*(.48+.52*Math.sin(uT*1.25+orb.phase))*alpha;
        ctx.save();ctx.globalAlpha=Math.max(oa,0);ctx.fillStyle=`hsl(${orb.hue},82%,78%)`;ctx.shadowColor=`hsl(${orb.hue},92%,85%)`;ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(x,y,orb.r*depth,0,Math.PI*2);ctx.fill();ctx.restore();});
    for(let di=0;di<7;di++){const dr=MIN*(.06+di*.056)+Math.sin(uT*.72+di*1.45)*10,da=(.06-di*.007)*(.52+.48*Math.sin(uT*.58+di*1.22))*alpha;
        ctx.save();ctx.globalAlpha=Math.max(da,0);ctx.strokeStyle=`hsla(${246+di*11},78%,74%,.88)`;ctx.lineWidth=.9+di*.15;
        ctx.shadowColor=`hsla(${246+di*11},88%,78%,.42)`;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(CX,CY,dr,0,Math.PI*2);ctx.stroke();ctx.restore();}
    FLOATERS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        const fa=p.a*(.42+.58*Math.sin(uT*1.25+p.ph))*alpha;ctx.save();ctx.globalAlpha=Math.max(fa,0);
        ctx.fillStyle=`hsl(${p.hue},70%,78%)`;ctx.shadowColor=`hsl(${p.hue},88%,86%)`;ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    drawComets();
    const beat=.5+.5*Math.sin(uT*2.3)*Math.sin(uT*3.1);const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,55+beat*35);
    bg.addColorStop(0,`rgba(140,90,255,${beat*.25})`);bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(CX,CY,100+beat*35,0,Math.PI*2);ctx.fill();
}

// ══ LOOP ══
let geoInit=false,f7a=0;const runeFlashEl=document.getElementById('rune-flash');
let __lastFrame=0;
function loop(ts){
    if(ts-__lastFrame<33){ requestAnimationFrame(loop); return; }
    __lastFrame=ts;
    el=ts-START;ctx.clearRect(0,0,W,H);
    if(el>=T.F2){const dt=C((el-T.F2)/1500,0,1);ctx.fillStyle=`rgba(0,0,${~~(eI(dt)*255*0.08)},${eI(dt)*0.98})`;ctx.fillRect(0,0,W,H);}
    if(el<T.F2){drawCracks(el);}else{cv.style.transform='';}
    if(el>=T.F2&&el<T.F2b){if(!imploded){imploded=true;recogerParticulas();}drawImplosioin(C((el-T.F2)/(T.F2b-T.F2),0,1));}
    if(el>=T.F2b&&el<T.F3){drawSingularity(C((el-T.F2b)/(T.F3-T.F2b),0,1));}
    if(el>=T.F3&&el<T.F4){const p=C((el-T.F3)/(T.F4-T.F3),0,1);ctx.globalAlpha=eO(p);drawPulso(el);ctx.globalAlpha=1;}
    if(el>=T.F4&&el<T.F5){if(!geoInit){geoInit=true;initGeo();}drawGeo(el);}
    if(el>=T.F5&&el<T.F6){drawFlash(C((el-T.F5)/(T.F6-T.F5),0,1));}else{cv.style.transform='';cc.style.opacity='0';}
    if(el>=T.F6&&!letSpawned)spawnLetras();
    if(el>=T.F6){document.getElementById('nsub').style.opacity=String(C((el-T.F6-500)/1600,0,1));document.getElementById('npct').style.opacity=String(C((el-T.F6-1100)/1600,0,1));}
    if(el>=T.F7){const p=C((el-T.F7)/4500,0,1);f7a=eO(p);ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);drawUniverse(f7a);updateExplode();
        document.getElementById('vig').style.opacity='1';
        if(!revDone&&p>.15){revDone=true;const rev=document.getElementById('wrap');
            if(!explodeFired){explodeFired=true;spawnExplosion();}
            rev.style.transition='opacity 3.5s ease-out';rev.style.opacity='1';
            setTimeout(()=>{animDone=true;},5000);
        }
    }
    requestAnimationFrame(loop);
}
START=performance.now();requestAnimationFrame(loop);
</script>
