<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

/*
 * Todos los elementos de la animación van en z-index muy alto
 * para superponerse sobre cualquier UI del juego.
 * El canvas principal #c es transparente durante F1 —
 * solo el alquitrán cubre la pantalla progresivamente.
 * A partir de F2 se rellena con negro total.
 */
#c-bg     { position:fixed; inset:0; z-index:9000; pointer-events:none; }
#c        { position:fixed; inset:0; z-index:9001; pointer-events:none; }
#c-fg     { position:fixed; inset:0; z-index:9002; pointer-events:none; }
#c-chroma { position:fixed; inset:0; z-index:9003; pointer-events:none; mix-blend-mode:screen; opacity:0; }

#vig {
    position:fixed; inset:0; z-index:9780; pointer-events:none; opacity:0;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 22%,rgba(0,5,1,0.45) 58%,rgba(0,3,0,0.97) 100%);
}
#vig::after {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,10,2,0.06) 0px,rgba(0,10,2,0.06) 1px,transparent 1px,transparent 2px);
    opacity:0.45;
}
#ntitle { position:fixed; bottom:12%; left:50%; transform:translateX(-50%); z-index:9820; display:flex; gap:0; white-space:nowrap; pointer-events:none; }
.nl {
    font-family:'Cinzel Decorative',cursive; font-size:clamp(1.5rem,4vw,4.5rem); font-weight:900;
    background:linear-gradient(180deg,#e0ffe4 0%,#7fff88 25%,#00e63a 60%,#00701a 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(0,230,58,0.95));
    letter-spacing:8px; opacity:0; transform:scale(3.5) translateZ(0); display:inline-block;
}
#nsub {
    position:fixed; bottom:7.5%; left:50%; transform:translateX(-50%); z-index:9820; pointer-events:none; white-space:nowrap;
    font-family:'Cinzel',serif; font-size:clamp(0.65rem,1.4vw,1rem); letter-spacing:14px; color:rgba(127,255,136,0.9);
    text-shadow:0 0 22px rgba(0,200,50,0.75); opacity:0; transition:opacity 2.5s ease-out;
}
#npct {
    position:fixed; bottom:4.5%; left:50%; transform:translateX(-50%); z-index:9820; pointer-events:none; white-space:nowrap;
    font-family:'Oswald',sans-serif; font-size:clamp(0.6rem,1.2vw,0.9rem); letter-spacing:13px; color:rgba(0,230,58,0.95);
    text-shadow:0 0 16px rgba(0,200,50,0.85); opacity:0; transition:opacity 2s ease-out 1s;
}
#wrap {
    position:fixed; inset:0; z-index:9800; display:flex; justify-content:center; align-items:center;
    opacity:0; pointer-events:none; animation:gfloat 8s ease-in-out infinite; perspective:1200px;
}
@keyframes gfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
#gsvg {
    width:min(680px,88vw); height:min(680px,88vw);
    filter:drop-shadow(0 0 55px rgba(0,200,50,0.9)) drop-shadow(0 0 130px rgba(0,100,20,0.4));
    transform-style:preserve-3d; will-change:transform;
}
.rs  { animation:gr 52s linear infinite; transform-origin:center; }
.rm  { animation:gr 26s linear infinite; transform-origin:center; }
.rf  { animation:gr 11s linear infinite; transform-origin:center; }
.rv  { animation:gr 36s linear infinite reverse; transform-origin:center; }
.rvs { animation:gr 65s linear infinite reverse; transform-origin:center; }
.rp  { animation:gp 3.5s ease-in-out infinite; }
@keyframes gr { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes gp { 0%,100%{opacity:.5;transform:scale(.97)} 50%{opacity:1;transform:scale(1.04)} }
#spore-flash {
    position:fixed; inset:0; z-index:9810; pointer-events:none;
    background:radial-gradient(ellipse at center,rgba(180,255,190,1) 0%,rgba(0,200,50,0.6) 40%,rgba(0,0,0,0) 75%);
    opacity:0;
}
</style>
</head>

<canvas id="c-bg"></canvas>

</defs>

<script>
const W=window.innerWidth,H=window.innerHeight,CX=W/2,CY=H/2,MIN=Math.min(W,H);
const IS_MOBILE=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||W<768;
const cv=document.getElementById('c');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
const cvBg=document.getElementById('c-bg');cvBg.width=W;cvBg.height=H;const ctxBg=cvBg.getContext('2d');
const cvFg=document.getElementById('c-fg');cvFg.width=W;cvFg.height=H;const ctxFg=cvFg.getContext('2d');
const cc=document.getElementById('c-chroma');cc.width=W;cc.height=H;const cctx=cc.getContext('2d');
const L=(a,b,t)=>a+(b-a)*t,C=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const eI=t=>t*t*t,eO=t=>1-Math.pow(1-t,3),eIO=t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
const R=(a,b)=>a+Math.random()*(b-a);
const G=(h,s,l,a=1)=>`hsla(${h},${s}%,${l}%,${a})`;

const T={F1:0,F2:3500,F2b:5200,F3:6400,F4:9800,F5:14300,F6:15500,F7:17300};
let START=performance.now(),el=0;

// ═══ FONDO NEBULOSO ═══
let bgCanvas=null;
function buildBgNebula(){
    const off=document.createElement('canvas');off.width=W;off.height=H;
    const octx=off.getContext('2d');
    for(let n=0;n<42;n++){
        const nx=R(0,W),ny=R(0,H),nr=R(55,340),nh=R(98,148),na=R(0.016,0.065);
        const ng=octx.createRadialGradient(nx,ny,0,nx,ny,nr);
        ng.addColorStop(0,`hsla(${nh},75%,24%,${na*2})`);ng.addColorStop(0.4,`hsla(${nh+12},60%,14%,${na})`);ng.addColorStop(1,'rgba(0,0,0,0)');
        octx.fillStyle=ng;octx.beginPath();octx.arc(nx,ny,nr,0,Math.PI*2);octx.fill();
    }
    for(let v=0;v<28;v++){
        const vx1=R(0,W),vy1=R(0,H),vx2=R(0,W),vy2=R(0,H),vh=R(105,140);
        const vg=octx.createLinearGradient(vx1,vy1,vx2,vy2);
        vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(0.5,`hsla(${vh},60%,22%,0.05)`);vg.addColorStop(1,'rgba(0,0,0,0)');
        octx.strokeStyle=vg;octx.lineWidth=R(0.4,2.2);octx.beginPath();octx.moveTo(vx1,vy1);
        octx.quadraticCurveTo(R(0,W),R(0,H),vx2,vy2);octx.stroke();
    }
    bgCanvas=off;
}
let bgT=0;
function drawBgNebula(alpha){
    if(!bgCanvas)return;bgT+=0.005;
    ctxBg.clearRect(0,0,W,H);
    ctxBg.globalAlpha=alpha*0.92;
    ctxBg.drawImage(bgCanvas,0,Math.sin(bgT)*6);
    ctxBg.globalAlpha=1;
    const beat=0.5+0.5*Math.sin(Date.now()*0.0005)*Math.sin(Date.now()*0.00033);
    ctxBg.save();ctxBg.globalAlpha=beat*0.055*alpha;
    const bg2=ctxBg.createRadialGradient(CX,CY,0,CX,CY,MIN*0.52);
    bg2.addColorStop(0,'hsla(125,80%,32%,1)');bg2.addColorStop(1,'rgba(0,0,0,0)');
    ctxBg.fillStyle=bg2;ctxBg.beginPath();ctxBg.arc(CX,CY,MIN*0.52,0,Math.PI*2);ctxBg.fill();ctxBg.restore();
}

// ═══ PRIMER PLANO BOKEH ═══
const FG_SHARDS=Array.from({length:20},()=>({
    x:R(0,W),y:R(0,H),vx:R(-0.07,0.07),vy:R(-0.055,0.055),
    r:R(30,95),hue:R(100,148),a:R(0.05,0.2),phase:R(0,Math.PI*2),
    rot:R(0,Math.PI*2),rotSpd:R(-0.003,0.003),sides:~~R(3,7)
}));
function drawFgLayer(alpha){
    ctxFg.clearRect(0,0,W,H);
    FG_SHARDS.forEach(s=>{
        s.x+=s.vx;s.y+=s.vy;s.rot+=s.rotSpd;s.phase+=0.007;
        if(s.x<-100)s.x=W+100;if(s.x>W+100)s.x=-100;
        if(s.y<-100)s.y=H+100;if(s.y>H+100)s.y=-100;
        const fa=s.a*(0.5+0.5*Math.sin(s.phase))*alpha;
        ctxFg.save();ctxFg.filter=`blur(${s.r*0.52}px)`;ctxFg.globalAlpha=fa;
        ctxFg.beginPath();
        for(let i=0;i<s.sides;i++){
            const a=s.rot+(i/s.sides)*Math.PI*2,rr=s.r*(0.7+0.3*Math.sin(s.phase+i*1.4));
            if(i===0)ctxFg.moveTo(s.x+Math.cos(a)*rr,s.y+Math.sin(a)*rr);
            else ctxFg.lineTo(s.x+Math.cos(a)*rr,s.y+Math.sin(a)*rr);
        }
        ctxFg.closePath();
        const sg=ctxFg.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
        sg.addColorStop(0,`hsla(${s.hue},85%,62%,0.9)`);sg.addColorStop(0.5,`hsla(${s.hue+15},70%,42%,0.5)`);sg.addColorStop(1,'rgba(0,0,0,0)');
        ctxFg.fillStyle=sg;ctxFg.fill();ctxFg.filter='none';ctxFg.restore();
    });
}

// ═══ PULSO GLOBAL cada 3s ═══
let GLOBAL_PULSE=0,lastBeatTime=0;
const PULSE_PARTICLES=[];
function triggerGlobalPulse(){
    GLOBAL_PULSE=1;
    const n=IS_MOBILE?20:60;
    for(let i=0;i<n;i++){
        const ang=Math.random()*Math.PI*2;
        PULSE_PARTICLES.push({x:CX,y:CY,ang,spd:R(2,10),r:R(1.2,4.5),a:0.95,hue:R(100,150),decay:R(0.013,0.025),curve:R(-0.02,0.02)});
    }
    const svg=document.getElementById('gsvg');
    svg.style.transition='filter 0.1s ease-out';
    svg.style.filter='drop-shadow(0 0 90px rgba(0,255,80,1)) drop-shadow(0 0 220px rgba(0,230,50,0.9)) brightness(1.6)';
    setTimeout(()=>{svg.style.transition='filter 1.4s ease-out';svg.style.filter='drop-shadow(0 0 55px rgba(0,200,50,0.9)) drop-shadow(0 0 130px rgba(0,100,20,0.4))';},140);
}
function updatePulse(now){
    if(now-lastBeatTime>=3000){lastBeatTime=now;triggerGlobalPulse();}
    if(GLOBAL_PULSE>0)GLOBAL_PULSE=Math.max(0,GLOBAL_PULSE-0.025);
    if(GLOBAL_PULSE>0.65){
        const wR=MIN*(0.04+(1-GLOBAL_PULSE)*0.6);
        ctx.save();ctx.globalAlpha=GLOBAL_PULSE*0.38;
        ctx.strokeStyle='rgba(100,255,130,0.88)';ctx.lineWidth=3*GLOBAL_PULSE;
        ctx.shadowColor='rgba(0,255,80,0.95)';ctx.shadowBlur=22;
        ctx.beginPath();ctx.arc(CX,CY,wR,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=GLOBAL_PULSE*0.18;ctx.beginPath();ctx.arc(CX,CY,wR*0.58,0,Math.PI*2);ctx.stroke();
        ctx.restore();
    }
    for(let i=PULSE_PARTICLES.length-1;i>=0;i--){
        const p=PULSE_PARTICLES[i];p.ang+=p.curve;p.x+=Math.cos(p.ang)*p.spd;p.y+=Math.sin(p.ang)*p.spd;p.spd*=0.975;p.a-=p.decay;
        if(p.a<=0){PULSE_PARTICLES.splice(i,1);continue;}
        ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=G(p.hue,90,65);ctx.shadowColor=G(p.hue,95,70,0.8);ctx.shadowBlur=p.r*2;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════════════
// F1: ALQUITRÁN VISCOSO — olas suaves tipo bezier cayendo,
//     sin fondo propio, tapa la pantalla del jugador
// ═══════════════════════════════════════════════════════════════
//
// En vez de gaussianas, usamos una suma de sinusoides de baja
// frecuencia con interpolación bezier → curvas suaves como en
// el dibujo: colinas de distintos tamaños, sin picos.

// Puntos de control de la ola — pocos, muy separados, para curvas anchas
// ═══════════════════════════════════════════════════════════════
// F1: ALQUITRÁN VISCOSO
// ═══════════════════════════════════════════════════════════════
const WAVE_NODES_COUNT = 7;
// Amplitudes MUY DISPARES: mezcla de olas grandes, medianas y pequeñas
const waveNodes = [
    {phase: R(0,Math.PI*2), phaseSpd: R(0.003,0.007), amp: H*R(0.12,0.20)}, // grande
    {phase: R(0,Math.PI*2), phaseSpd: R(0.008,0.014), amp: H*R(0.02,0.06)}, // pequeña
    {phase: R(0,Math.PI*2), phaseSpd: R(0.004,0.009), amp: H*R(0.14,0.22)}, // muy grande
    {phase: R(0,Math.PI*2), phaseSpd: R(0.010,0.016), amp: H*R(0.02,0.05)}, // pequeña
    {phase: R(0,Math.PI*2), phaseSpd: R(0.005,0.010), amp: H*R(0.10,0.18)}, // grande
    {phase: R(0,Math.PI*2), phaseSpd: R(0.009,0.015), amp: H*R(0.02,0.07)}, // pequeña
    {phase: R(0,Math.PI*2), phaseSpd: R(0.004,0.008), amp: H*R(0.13,0.21)}, // grande
];

// tarLevel: Y del nivel medio. Empieza fuera de pantalla.
let tarLevel = -H * 0.25;
const tarFallSpd = (H * 1.18) / T.F2;

// Hilos viscosos
const TAR_THREADS = Array.from({length: IS_MOBILE ? 5 : 9}, (_, i) => ({
    xRatio:       (i + 0.5 + R(-0.2,0.2)) / (IS_MOBILE ? 5 : 9),
    stretchPhase: R(0, Math.PI*2),
    stretchSpd:   R(0.005, 0.014),
    maxLen:       R(H*0.06, H*0.16),
    width:        R(5, 14)
}));

// Extremos fijos (sin R() cada frame)
const TAR_LEFT_SAG  = R(0, H*0.015);
const TAR_RIGHT_SAG = R(0, H*0.015);

let viscT = 0;
let f1Done = false; // true cuando todas las olas han llegado abajo

function getTarProfile() {
    const pts = [];
    pts.push({x: 0, y: tarLevel + TAR_LEFT_SAG});
    for (let i = 0; i < WAVE_NODES_COUNT; i++) {
        const nd = waveNodes[i];
        const x   = W * (i + 1) / (WAVE_NODES_COUNT + 1);
        const sag = nd.amp * Math.abs(Math.sin(nd.phase))
                  + nd.amp * 0.18 * Math.abs(Math.sin(nd.phase * 2.3 + viscT * 0.3));
        pts.push({x, y: tarLevel + sag});
    }
    pts.push({x: W, y: tarLevel + TAR_RIGHT_SAG});
    return pts;
}

function buildWavePath(ctx2, pts) {
    ctx2.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i], p1 = pts[i+1];
        ctx2.quadraticCurveTo(p0.x, p0.y, (p0.x+p1.x)*0.5, (p0.y+p1.y)*0.5);
    }
    ctx2.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
}

function drawViscous(elapsed, dt) {
    viscT += 0.015;
    tarLevel += tarFallSpd * dt;
    waveNodes.forEach(nd => { nd.phase += nd.phaseSpd; });

    const pts = getTarProfile();
    const maxY = 0; // calculamos inline sin spread
    let ptsMaxY = tarLevel;
    for (let i = 0; i < pts.length; i++) if (pts[i].y > ptsMaxY) ptsMaxY = pts[i].y;

    // ¿Todas las olas cubrieron la pantalla? → F1 terminada
    if (!f1Done && tarLevel > H * 0.88) f1Done = true;

    ctx.save();

    // ── 1. MASA ──
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W, 0);
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    for (let i = pts.length-2; i >= 0; i--) {
        const p0 = pts[i+1], p1 = pts[i];
        ctx.quadraticCurveTo(p0.x, p0.y, (p0.x+p1.x)*0.5, (p0.y+p1.y)*0.5);
    }
    ctx.lineTo(pts[0].x, pts[0].y);
    ctx.lineTo(0, 0);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, 0, 0, ptsMaxY + H*0.05);
    grad.addColorStop(0,    'rgba(0,  1, 0, 1.0)');
    grad.addColorStop(0.55, 'rgba(0,  8, 2, 0.99)');
    grad.addColorStop(0.82, 'rgba(0, 26, 6, 0.98)');
    grad.addColorStop(0.93, 'rgba(0, 52,11, 0.97)');
    grad.addColorStop(1,    'rgba(0, 82,18, 0.97)');
    ctx.fillStyle = grad;
    ctx.fill();

    // ── 2. BORDE LUMINOSO ── (sin shadowBlur doble)
    ctx.beginPath();
    buildWavePath(ctx, pts);
    ctx.shadowColor = 'rgba(0,210,50,0.9)';
    ctx.shadowBlur  = IS_MOBILE ? 8 : 20;
    ctx.strokeStyle = 'rgba(40,235,80,0.85)';
    ctx.lineWidth   = IS_MOBILE ? 3 : 5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.shadowBlur = 0; // apagar shadow antes del segundo stroke
    if (!IS_MOBILE) {
        ctx.strokeStyle = 'rgba(210,255,218,0.22)';
        ctx.lineWidth   = 1.5;
        ctx.stroke();
    }

    ctx.restore();

    // ── 3. HILOS ── (sin shadowBlur en el cuerpo, solo en la gota)
    TAR_THREADS.forEach(th => {
        th.stretchPhase += th.stretchSpd;
        const thX   = th.xRatio * W;
        const segW  = W / (pts.length-1);
        const idx   = Math.min(Math.floor(thX/segW), pts.length-2);
        const frac  = (thX - idx*segW) / segW;
        const baseY = L(pts[idx].y, pts[idx+1].y, frac);
        const tGrow = Math.min(elapsed / (T.F2*0.65), 1);
        const len   = th.maxLen * tGrow * (0.45 + 0.55*Math.abs(Math.sin(th.stretchPhase)));
        const tipY  = baseY + len;
        if (baseY > H+30) return;

        const wB = th.width, wT = Math.max(0.5, wB*0.07);
        ctx.save();
        // Gradiente sin shadow en el cuerpo = mucho más rápido
        const tg = ctx.createLinearGradient(thX, baseY, thX, tipY);
        tg.addColorStop(0,   'rgba(0,55,13,0.97)');
        tg.addColorStop(0.5, 'rgba(0,35, 8,0.88)');
        tg.addColorStop(0.85,'rgba(0,15, 3,0.70)');
        tg.addColorStop(1,   'rgba(0, 5, 1,0.00)');
        ctx.fillStyle = tg;
        ctx.beginPath();
        ctx.moveTo(thX-wB*0.5, baseY);
        ctx.bezierCurveTo(thX-wB*0.5, baseY+len*0.35, thX-wT*0.5, tipY-len*0.18, thX, tipY);
        ctx.bezierCurveTo(thX+wT*0.5, tipY-len*0.18, thX+wB*0.5, baseY+len*0.35, thX+wB*0.5, baseY);
        ctx.closePath();

        // Gota — shadow solo aquí, una sola vez

            dg.addColorStop(0.7, 'rgba(0,55,12,0.50)');
            dg.addColorStop(1,   'rgba(0,0,0,0)');

        }

    });

    // ── 4. BURBUJAS (desktop, sin shadow) ──
    if (!IS_MOBILE && tarLevel > H*0.1) {
        ctx.save();
        for (let b = 0; b < 5; b++) {
            const bx = (b/5+0.1)*W + Math.sin(viscT*0.6+b*2.2)*W*0.06;

            ctx.arc(bx, by, 1.5+Math.sin(viscT+b), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
}

const ECO_N = IS_MOBILE ? 0.4 : 1.0; // factor de cantidad
const ECO_SPORES=Array.from({length:~~(280*ECO_N)},()=>({a:R(0,Math.PI*2),d:R(20,MIN*0.68),r:R(0.2,2.2),br:R(0.2,0.95),spd:R(0.0001,0.0006),hue:R(95,155)}));
const ECO_NEBS=[{ox:R(-MIN*0.3,MIN*0.3),oy:R(-MIN*0.3,MIN*0.3),r:MIN*R(0.25,0.5),hue:R(100,140),a:R(0.06,0.11)},{ox:R(-MIN*0.25,MIN*0.25),oy:R(-MIN*0.25,MIN*0.25),r:MIN*R(0.18,0.35),hue:R(108,135),a:R(0.05,0.1)},{ox:R(-MIN*0.2,MIN*0.2),oy:R(-MIN*0.2,MIN*0.2),r:MIN*R(0.12,0.28),hue:R(115,145),a:R(0.04,0.09)}];
const ECO_ROOTS=Array.from({length:~~(12*ECO_N)},(_,i)=>({baseAngle:i/12*Math.PI*2,len:R(MIN*0.18,MIN*0.38),wobble:R(0,Math.PI*2),wobbleSpd:R(0.008,0.025),width:R(0.4,1.4),alpha:R(0.15,0.42),hue:R(100,140),segments:~~R(5,10)}));
const ECO_MUSHROOMS=Array.from({length:~~(18*ECO_N)},()=>({angle:R(0,Math.PI*2),orbitR:R(MIN*0.1,MIN*0.44),tilt:R(0,Math.PI),spd:R(0.004,0.025)*(Math.random()>0.5?1:-1),r:R(0.8,3.5),a:R(0.18,0.65),hue:R(100,145),phase:R(0,Math.PI*2),capR:R(2,5)}));
const ECO_FLOATERS=Array.from({length:~~(65*ECO_N)},()=>({x:R(0,W),y:R(0,H),vx:R(-0.16,0.16),vy:R(-0.14,0.14),r:R(0.4,2.2),a:R(0.06,0.42),hue:R(98,150),ph:R(0,Math.PI*2)}));

// Código cometas del usuario — preservado íntegro
const ECO_COMETS=[];
let lastAT=0,tTX=0,tTY=0,cTX=0,cTY=0,animDone=false;
const gsvgEl=document.getElementById('gsvg');
function drawEcoComets(){
    if(!animDone)return;
    const now=Date.now();if(lastAT===0)lastAT=now;
    if(now-lastAT>R(8000,12000)){const sl=Math.random()<0.5;ECO_COMETS.push({x:sl?-80:W+80,y:R(0,H),vx:sl?R(5,9):-R(5,9),vy:R(-3,3),hue:R(95,145),nodes:[],wobble:R(0,Math.PI*2)});lastAT=now;}
    for(let i=ECO_COMETS.length-1;i>=0;i--){
        const ct=ECO_COMETS[i];ct.x+=ct.vx;ct.y+=ct.vy;ct.wobble+=0.08;
        ct.nodes.unshift({x:ct.x,y:ct.y});if(ct.nodes.length>10)ct.nodes.pop();
        if(ct.x<-120||ct.x>W+120||ct.y<-120||ct.y>H+120){ECO_COMETS.splice(i,1);continue;}
        ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
        for(let n=1;n<ct.nodes.length;n++){const p0=ct.nodes[n-1],p1=ct.nodes[n],t2=n/ct.nodes.length,wob=Math.sin(ct.wobble+n*0.6)*3;ctx.strokeStyle=`hsla(${ct.hue},90%,${35+t2*20}%,${0.2+t2*0.4})`;ctx.lineWidth=6*(1-t2);ctx.beginPath();ctx.moveTo(p0.x+wob,p0.y-wob);ctx.lineTo(p1.x-wob,p1.y+wob);ctx.stroke();}
        const head=ct.nodes[0]||{x:ct.x,y:ct.y},pulse2=0.6+Math.sin(ct.wobble*2)*0.4;
        const hg=ctx.createRadialGradient(head.x,head.y,0,head.x,head.y,18);hg.addColorStop(0,`rgba(220,255,230,${pulse2})`);hg.addColorStop(0.3,`hsla(${ct.hue+10},95%,60%,0.8)`);hg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=hg;ctx.beginPath();ctx.arc(head.x,head.y,6+pulse2*4,0,Math.PI*2);ctx.fill();
        for(let k=0;k<3;k++){const ak=ct.wobble+k*2;ctx.fillStyle=`hsla(${ct.hue+20},90%,65%,0.7)`;ctx.beginPath();ctx.arc(head.x+Math.cos(ak)*6,head.y+Math.sin(ak)*6,1.5,0,Math.PI*2);ctx.fill();}
        ctx.restore();
    }
    if(ECO_COMETS.length>0){const a2=ECO_COMETS[0];tTY=(a2.x-CX)/(W/2)*28;tTX=-(a2.y-CY)/(H/2)*28;}else{tTX=0;tTY=0;}
    cTX+=(tTX-cTX)*0.04;cTY+=(tTY-cTY)*0.04;
    gsvgEl.style.transform=`rotateX(${cTX}deg) rotateY(${cTY}deg)`;
}

let uT=0,revDone=false;
function drawEcosistema(alpha){
    uT+=0.006;
    ECO_NEBS.forEach((nb,i)=>{const pulse3=0.5+0.5*Math.sin(uT*0.35+i*2.1);ctx.save();ctx.globalAlpha=nb.a*alpha*pulse3;const ng=ctx.createRadialGradient(CX+nb.ox,CY+nb.oy,0,CX+nb.ox,CY+nb.oy,nb.r);ng.addColorStop(0,G(nb.hue,72,42,0.9));ng.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ng;ctx.beginPath();ctx.arc(CX+nb.ox,CY+nb.oy,nb.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    ctx.save();ctx.globalAlpha=alpha*0.15;for(let bi=0;bi<6;bi++){const bA=bi*Math.PI/3+uT*0.012;const bG=ctx.createLinearGradient(CX+Math.cos(bA)*MIN,CY+Math.sin(bA)*MIN,CX-Math.cos(bA)*MIN,CY-Math.sin(bA)*MIN);bG.addColorStop(0,'rgba(0,0,0,0)');bG.addColorStop(0.35,G(118+bi*8,65,35,0.5));bG.addColorStop(0.5,G(122+bi*8,70,42,0.7));bG.addColorStop(0.65,G(118+bi*8,65,35,0.5));bG.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bG;ctx.fillRect(0,0,W,H);}ctx.restore();
    ECO_SPORES.forEach(s=>{s.a+=s.spd;const ox=CX+Math.cos(s.a)*s.d,oy=CY+Math.sin(s.a)*s.d;const b=s.br*(0.42+0.58*Math.sin(uT*2.5+s.a*4.5));ctx.save();ctx.globalAlpha=b*alpha*0.82;ctx.fillStyle=G(s.hue,72,65);ctx.beginPath();ctx.arc(ox,oy,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    ECO_ROOTS.forEach(root=>{root.wobble+=root.wobbleSpd;const baseAng=root.baseAngle+uT*0.04+Math.sin(uT*0.3+root.wobble)*0.15;ctx.save();ctx.globalAlpha=root.alpha*alpha;ctx.strokeStyle=G(root.hue,75,38);ctx.lineWidth=root.width;ctx.shadowColor=G(root.hue,80,42,0.4);ctx.shadowBlur=0;ctx.beginPath();let rx=CX+Math.cos(baseAng)*MIN*0.05,ry=CY+Math.sin(baseAng)*MIN*0.05;ctx.moveTo(rx,ry);for(let seg=0;seg<root.segments;seg++){const segAng=baseAng+Math.sin(uT*0.8+seg*1.3+root.wobble)*0.35;rx+=Math.cos(segAng)*root.len/root.segments;ry+=Math.sin(segAng)*root.len/root.segments;ctx.lineTo(rx,ry);}ctx.stroke();ctx.globalAlpha=root.alpha*alpha*0.7;ctx.fillStyle=G(root.hue+15,80,52);ctx.beginPath();ctx.arc(rx,ry,root.width*3,0,Math.PI*2);ctx.fill();ctx.restore();});
    for(let di=0;di<8;di++){const dr=MIN*(0.055+di*0.052)+Math.sin(uT*0.7+di*1.4)*9,da=(0.055-di*0.006)*(0.52+0.48*Math.sin(uT*0.58+di*1.22))*alpha;ctx.save();ctx.globalAlpha=Math.max(da,0);ctx.strokeStyle=G(115+di*8,78,45,0.88);ctx.lineWidth=0.9+di*0.12;ctx.shadowColor=G(118+di*8,85,48,0.38);ctx.shadowBlur=0;ctx.beginPath();ctx.arc(CX,CY,dr,0,Math.PI*2);ctx.stroke();ctx.restore();}
    ECO_MUSHROOMS.forEach(orb=>{orb.angle+=orb.spd;const x=CX+Math.cos(orb.angle)*orb.orbitR,y=CY+Math.sin(orb.angle)*orb.orbitR*Math.abs(Math.sin(orb.tilt));const z=Math.sin(orb.angle)*Math.cos(orb.tilt),depth=0.55+0.45*((z+1)/2);const oa=orb.a*depth*(0.48+0.52*Math.sin(uT*1.2+orb.phase))*alpha;ctx.save();ctx.globalAlpha=Math.max(oa,0);ctx.strokeStyle=G(orb.hue,70,35);ctx.lineWidth=orb.r*0.4*depth;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+orb.capR*depth*2);ctx.stroke();ctx.fillStyle=G(orb.hue+20,85,55);ctx.beginPath();ctx.ellipse(x,y,orb.capR*depth*1.5,orb.capR*depth*0.7,-0.2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=Math.max(oa*0.8,0);ctx.fillStyle=G(orb.hue+35,95,75);ctx.beginPath();ctx.arc(x-orb.capR*depth*0.3,y-orb.capR*depth*0.15,orb.r*0.4*depth,0,Math.PI*2);ctx.fill();ctx.restore();});
    ECO_FLOATERS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;const fa=p.a*(0.42+0.58*Math.sin(uT*1.25+p.ph))*alpha;ctx.save();ctx.globalAlpha=Math.max(fa,0);ctx.fillStyle=G(p.hue,70,65);ctx.shadowColor=G(p.hue,85,70,0.6);ctx.shadowBlur=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    drawEcoComets();
    const beat2=0.5+0.5*Math.sin(uT*2.2)*Math.sin(uT*3.0);const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,55+beat2*35);bg.addColorStop(0,`rgba(0,180,50,${beat2*0.25})`);bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(CX,CY,100+beat2*35,0,Math.PI*2);ctx.fill();
}

// ═══ LOOP PRINCIPAL ═══
let geoInit=false,f7a=0,lastTS=0;
const sporeFlashEl=document.getElementById('spore-flash');
buildBgNebula();

function loop(ts){
    const dt=lastTS>0?Math.min(ts-lastTS,50):16;
    lastTS=ts;
    el=ts-START;
    ctx.clearRect(0,0,W,H);  // siempre limpiamos — en F1 queda transparente
    const f7Active=el>=T.F7;
    if(f7Active){drawBgNebula(f7a);if(!IS_MOBILE)drawFgLayer(f7a*0.65);updatePulse(ts);}
    else{ctxBg.clearRect(0,0,W,H);ctxFg.clearRect(0,0,W,H);}

    if(el<T.F2 && !f1Done) drawViscous(el,dt);

    // F2 arranca cuando el alquitrán cubrió toda la pantalla (f1Done) O cuando llega el timer
    const f2Start = f1Done ? Math.min(el, T.F2) : (el >= T.F2 ? T.F2 : Infinity);
    const inF2plus = f1Done || el >= T.F2;

    if(inF2plus){const dt2=C((el-T.F2)/1500,0,1);ctx.fillStyle=`rgba(0,${~~(dt2*8*0.08)},${~~(dt2*3*0.08)},${dt2*0.98})`;ctx.fillRect(0,0,W,H);cv.style.transform='';}
    if(inF2plus&&el<T.F2b){if(!imploded){imploded=true;recogerParticulas();}drawVortice(C((el-T.F2)/(T.F2b-T.F2),0,1));}
    if(el>=T.F2b&&el<T.F3) drawSingularidad(C((el-T.F2b)/(T.F3-T.F2b),0,1));
    if(el>=T.F3&&el<T.F4){const p=C((el-T.F3)/(T.F4-T.F3),0,1);ctx.globalAlpha=eO(p);drawPulso(el);ctx.globalAlpha=1;}
    if(el>=T.F4&&el<T.F5){if(!geoInit){geoInit=true;initGeo();}drawGeo(el);}
    if(el>=T.F5&&el<T.F6) drawFlash(C((el-T.F5)/(T.F6-T.F5),0,1));
    else if(el>=T.F6){cv.style.transform='';cc.style.opacity='0';}
    if(el>=T.F6&&!letSpawned) spawnLetras();
    if(el>=T.F6){document.getElementById('nsub').style.opacity=String(C((el-T.F6-500)/1600,0,1));document.getElementById('npct').style.opacity=String(C((el-T.F6-1100)/1600,0,1));}
    if(el>=T.F7){
        const p=C((el-T.F7)/4500,0,1);f7a=eO(p);
        ctx.fillStyle='#000501';ctx.fillRect(0,0,W,H);
        drawEcosistema(f7a);updateExplode();
        document.getElementById('vig').style.opacity='1';
        if(!revDone&&p>0.15){
            revDone=true;const rev=document.getElementById('wrap');
            if(!explodeFired){explodeFired=true;spawnExplosion();}
            sporeFlashEl.style.transition='opacity 0.15s ease-in';sporeFlashEl.style.opacity='1';
            setTimeout(()=>{sporeFlashEl.style.transition='opacity 1.8s ease-out';sporeFlashEl.style.opacity='0';},180);
            rev.style.transition='opacity 3.5s ease-out';rev.style.opacity='1';
            setTimeout(()=>{animDone=true;},5000);
        }
    }
    requestAnimationFrame(loop);
}
START=performance.now();lastBeatTime=START;requestAnimationFrame(loop);
</script>
