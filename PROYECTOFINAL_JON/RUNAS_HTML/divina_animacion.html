<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --divine-white:#FFFFF0; --divine-gold:#FFFACD; --divine-glow:rgba(255,255,240,0.7); }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; }

        #divine-bg {
            position:fixed; inset:0;
            background:radial-gradient(circle at center,rgba(255,255,240,0.18) 0%,rgba(0,0,0,1) 88%);
            opacity:0;
        }

        /* ── RAYOS DE LUZ emanando desde el centro ── */
        #divine-rays {
            position:fixed; inset:0; z-index:20;
            pointer-events:none; opacity:0;
        }

        /* ── HALO ── */
        #divine-halo {
            position:fixed; left:50%;
            width:360px; height:110px;
            border:5px solid var(--divine-gold); border-radius:50%;
            box-shadow:0 0 50px rgba(255,255,180,0.8), 0 0 100px rgba(255,255,150,0.4),
                       inset 0 0 30px rgba(255,255,200,0.15);
            opacity:0; z-index:100;
            top:0; transform:translateX(-50%) translateY(-220px);
        }
        /* Segundo halo interior pulsante */
        #divine-halo::after {
            content:'';
            position:absolute; inset:8px;
            border:2px solid rgba(255,255,200,0.4);
            border-radius:50%;
            animation:halo-pulse 2s ease-in-out infinite;
        }
        @keyframes halo-pulse {
            0%,100% { opacity:0.3; transform:scale(0.95); }
            50%      { opacity:0.8; transform:scale(1.05); }
        }

        /* ── CRUZ ── */
        #divine-cross {
            position:fixed; left:50%;
            width:18px; height:320px;
            background:linear-gradient(to bottom, rgba(255,255,240,0) 0%, #FFFFF0 20%, #FFFFF0 80%, rgba(255,255,240,0) 100%);
            opacity:0; z-index:100;
            box-shadow:0 0 70px var(--divine-white), 0 0 140px rgba(255,255,200,0.4);
            border-radius:9px;
            top:0; transform:translateX(-50%) translateY(110vh);
        }
        #divine-cross::after {
            content:''; position:absolute; top:80px; left:-91px;
            width:200px; height:18px;
            background:linear-gradient(to right, rgba(255,255,240,0) 0%, #FFFFF0 20%, #FFFFF0 80%, rgba(255,255,240,0) 100%);
            border-radius:9px;
            box-shadow:0 0 40px var(--divine-white);
        }

        /* ── TEXTO LATÍN ── */
        #lux-text {
            position:fixed; left:50%; top:50%;
            transform:translate(-50%,-50%) translateY(160px);
            z-index:160; pointer-events:none;
            opacity:0; text-align:center;
            letter-spacing:18px;
            font-family:'Cinzel', serif;
            font-size:clamp(0.9rem,2.5vw,1.6rem);
            font-weight:700;
            color:rgba(255,250,200,0.9);
            text-shadow:0 0 30px gold, 0 0 60px rgba(255,215,0,0.5);
            text-transform:uppercase;
        }

        /* ── ANILLOS EXPANSIVOS ── */
        #ring-container {
            position:fixed; inset:0; z-index:25; pointer-events:none;
        }

        /* ── FLASH ── */
        #divine-flash {
            position:fixed; inset:0; z-index:200;
            background:radial-gradient(circle at center, #FFFFFF 0%, #FFFFF0 40%, #FFFACD 100%);
            opacity:0; pointer-events:none;
        }

        /* ── RESULTADO ── */
        #divine-result {
            position:fixed; inset:0; z-index:150;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            opacity:0; transform:scale(0.5);
        }
        #divine-runa-svg {
            width:min(640px,82vw); height:min(640px,82vw);
            filter:drop-shadow(0 0 80px rgba(255,215,0,0.6));
            margin-bottom:-10px;
        }
        .divine-text {
            font-family:'Cinzel Decorative',cursive;
            font-size:clamp(1.6rem,4vw,4.5rem); font-weight:900;
            background:linear-gradient(to bottom,#FFFFFF 0%,#FFFACD 40%,#FFD700 100%);
            -webkit-background-clip:text; background-clip:text; color:transparent;
            filter:drop-shadow(0 0 40px rgba(255,215,0,0.9));
            letter-spacing:12px; line-height:1;
        }
        .divine-pct {
            color:var(--divine-gold); font-family:'Oswald',sans-serif;
            font-size:clamp(0.9rem,1.8vw,1.8rem); letter-spacing:18px;
            text-shadow:0 0 25px gold; margin-top:14px; font-weight:700;
        }

        /* CSS rotaciones SVG */
        .rotate-slow         { animation:giro 50s linear infinite; transform-origin:center; }
        .rotate-slow-reverse { animation:giro 70s linear infinite reverse; transform-origin:center; }
        .rotate-outer        { animation:giro 90s linear infinite; transform-origin:center; }
        .rotate-fast         { animation:giro 28s linear infinite; transform-origin:center; }
        .rotate-rev          { animation:giro 70s linear infinite reverse; transform-origin:center; }
        .pulse-soft          { animation:pulso 6s ease-in-out infinite; }
        @keyframes giro  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }

        /* Plumas */
        .feather {
            position:fixed; top:-120px;
            background-color:var(--divine-white); opacity:0.9;
            clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
            filter:blur(0.5px); z-index:50;
        }
    </style>
</head>
<body>

<div id="divine-bg"></div>
<canvas id="divine-rays"></canvas>
<div id="divine-halo"></div>
<div id="divine-cross"></div>
<div id="ring-container"></div>
<div id="divine-flash"></div>

            <g transform="rotate(315,500,500) translate(500,55)"><use href="#link" transform="translate(0,28) rotate(90)"/></g>
            <use href="#fractal-dot" transform="translate(855,145)"/>
            <use href="#fractal-dot" transform="translate(145,855)"/>

            <line x1="0" y1="-68" x2="0"    y2="450"  stroke="white" stroke-width="0.8" opacity="0.3"/>
            <line x1="0" y1="-68" x2="0"    y2="-490" stroke="white" stroke-width="0.8" opacity="0.3"/>

    <h1 class="divine-text">Divine Aura</h1>

<script>
const H = window.innerHeight, W = window.innerWidth, CX = W/2, CY = H/2;

const bg          = document.getElementById('divine-bg');
const halo        = document.getElementById('divine-halo');
const cross       = document.getElementById('divine-cross');
const flash       = document.getElementById('divine-flash');
const result      = document.getElementById('divine-result');
const luxText     = document.getElementById('lux-text');
const raysCanvas  = document.getElementById('divine-rays');
raysCanvas.width = W; raysCanvas.height = H;
raysCanvas.style.position='fixed'; raysCanvas.style.inset='0';
raysCanvas.style.width='100%'; raysCanvas.style.height='100%';
raysCanvas.style.zIndex='20'; raysCanvas.style.pointerEvents='none';
const raysCtx = raysCanvas.getContext('2d');

// ── RAYOS DE LUZ desde el centro ──
let raysT = 0, raysRaf = null, raysAlpha = 0;
const NUM_RAYS = 12;
const rayAngles = Array.from({length:NUM_RAYS}, (_,i) => (i/NUM_RAYS)*Math.PI*2);

function drawRays() {
    raysCtx.clearRect(0,0,W,H);
    raysT += 0.008;
    const cx=CX, cy=CY;
    const maxLen = Math.sqrt(CX*CX+CY*CY)*1.4;
    rayAngles.forEach((baseAngle,i) => {
        const angle = baseAngle + Math.sin(raysT + i*0.5)*0.08;
        const width = (2 + Math.sin(raysT*2 + i)*1.5) * raysAlpha;
        const grad = raysCtx.createLinearGradient(cx,cy, cx+Math.cos(angle)*maxLen, cy+Math.sin(angle)*maxLen);
        grad.addColorStop(0,   `rgba(255,255,200,${0.35*raysAlpha})`);
        grad.addColorStop(0.3, `rgba(255,245,180,${0.15*raysAlpha})`);
        grad.addColorStop(1,   'rgba(255,240,150,0)');
        raysCtx.save();
        raysCtx.translate(cx,cy); raysCtx.rotate(angle);
        raysCtx.beginPath();
        raysCtx.moveTo(-width,0); raysCtx.lineTo(0,0); raysCtx.lineTo(-width*0.5, maxLen); raysCtx.lineTo(width*0.5, maxLen); raysCtx.lineTo(width,0);
        raysCtx.fillStyle = grad;
        raysCtx.fill();
        raysCtx.restore();
    });
    raysRaf = requestAnimationFrame(drawRays);
}

// ── ANILLOS EXPANSIVOS ──
function lanzarAnillo(color, opacity) {
    const c = document.createElement('canvas');
    c.width=W; c.height=H;
    c.style.cssText=`position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:25;`;
    document.getElementById('ring-container').appendChild(c);
    const ctx=c.getContext('2d');
    let r=0, alpha=opacity;
    const maxR = Math.sqrt(CX*CX+CY*CY)*1.1;
    function expand() {
        ctx.clearRect(0,0,W,H);
        r += 6; alpha = opacity*(1-r/maxR);
        if(r>maxR||alpha<=0){c.remove();return;}
        ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2);
        ctx.strokeStyle=color.replace(')',`,${alpha})`).replace('rgb','rgba');
        ctx.lineWidth=3; ctx.stroke();
        requestAnimationFrame(expand);
    }
    requestAnimationFrame(expand);
}

// ── PLUMAS ──
function lanzarPluma() {
    const p = document.createElement('div');
    p.className = 'feather';
    const size = Math.random()*15+10;
    p.style.width  = size+'px'; p.style.height = (size*3)+'px';
    p.style.left   = (Math.random()>0.5?Math.random()*25:Math.random()*25+75)+'vw';
    document.body.appendChild(p);
    const dur=(Math.random()*4+7)*1000, drift=(Math.random()-0.5)*200, spin=(Math.random()-0.5)*400, start=performance.now();
    const total=H+size*4+120;
    function tick(now){const prog=Math.min((now-start)/dur,1);p.style.transform=`translate(${drift*prog}px,${-120+total*prog}px) rotate(${spin*prog}deg)`;p.style.opacity=prog<0.08?prog/0.08:prog>0.85?(1-prog)/0.15:0.7;if(prog<1)requestAnimationFrame(tick);else p.remove();}
    requestAnimationFrame(tick);
}

// ── LLUVIA DE ESTRELLAS doradas post-flash ──
function lluviaEstrellas() {
    for(let i=0;i<60;i++){setTimeout(()=>{
        const p=document.createElement('div');
        const x=Math.random()*W, size=2+Math.random()*5, dur=2+Math.random()*5;
        p.style.cssText=`position:fixed;left:${x}px;top:-10px;z-index:160;width:${size}px;height:${size}px;border-radius:50%;background:#FFFACD;box-shadow:0 0 8px rgba(255,215,0,0.9),0 0 16px rgba(255,215,0,0.5);pointer-events:none;`;
        document.body.appendChild(p);
        const start=performance.now(), drift=(Math.random()-0.5)*60;
        function caer(now){const prog=Math.min((now-start)/(dur*1000),1);p.style.transform=`translate(${drift*prog}px,${(H+20)*prog}px)`;p.style.opacity=prog<0.1?prog/0.1:prog>0.75?(1-prog)/0.25:1;if(prog<1)requestAnimationFrame(caer);else p.remove();}
        requestAnimationFrame(caer);
    },i*90);}
}

function vibrar() {
    let intensity=30;
    const timer=setInterval(()=>{document.body.style.transform=`translate(${(Math.random()-0.5)*intensity}px,${(Math.random()-0.5)*intensity}px)`;intensity*=0.93;if(intensity<0.3){clearInterval(timer);document.body.style.transform='';}},40);
}

// ══ SECUENCIA ══

const plumas = setInterval(lanzarPluma, 100);

// Fondo
bg.style.transition='opacity 2s ease-in';
setTimeout(()=>{ bg.style.opacity='1'; },100);

// Rayos de luz aparecen a los 1.5s, crecen gradualmente
setTimeout(()=>{
    drawRays();
    let rt=0;const ri=setInterval(()=>{ raysAlpha=Math.min(rt/40,0.6); rt++; if(rt>40)clearInterval(ri); },50);
}, 1200);

// Anillos expansivos desde el segundo 2
setTimeout(()=>{
    lanzarAnillo('rgb(255,240,150)',0.5);
    setTimeout(()=>lanzarAnillo('rgb(255,250,200)',0.35),800);
    setTimeout(()=>lanzarAnillo('rgb(255,245,170)',0.25),1600);
},2000);

// Halo baja + cruz sube a los 800ms
setTimeout(()=>{
    halo.style.opacity='1'; cross.style.opacity='1';
    halo.style.transition=cross.style.transition='all 4s cubic-bezier(0.4,0,0.2,1)';
    halo.style.transform=`translateX(-50%) translateY(${CY-120}px)`;
    cross.style.transform=`translateX(-50%) translateY(${CY-150}px)`;
},800);

// Flash a los 5s
setTimeout(()=>{
    clearInterval(plumas);
    // Parar rayos suavemente
    setTimeout(()=>{ if(raysRaf) cancelAnimationFrame(raysRaf); raysCtx.clearRect(0,0,W,H); },500);

    flash.style.transition='none'; flash.style.opacity='1';
    vibrar();

    setTimeout(()=>{
        flash.style.transition='opacity 6s ease-out'; flash.style.opacity='0';
        halo.style.display=cross.style.display='none';

        // Texto "Lux Aeterna" aparece bajo la runa
        luxText.style.transition='opacity 3s ease-in, transform 3s ease-out';
        luxText.style.opacity='1';
        luxText.style.transform='translate(-50%,-50%) translateY(140px)';

        // Lluvia de estrellas doradas
        setTimeout(lluviaEstrellas,4500);

        // Reveal de la runa
        result.style.transition='all 6s cubic-bezier(0.05,0.9,0.1,1)';
        result.style.opacity='1'; result.style.transform='scale(1)';

        // El texto desaparece después de un rato
        setTimeout(()=>{
            luxText.style.transition='opacity 2.5s ease-out';
            luxText.style.opacity='0';
        },6000);

    },600);
},5000);
</script>
</body>
</html>
