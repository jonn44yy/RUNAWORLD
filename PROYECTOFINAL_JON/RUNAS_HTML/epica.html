<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; display:flex; justify-content:center; align-items:center; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let t = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

function frame() {
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    ctx.clearRect(0,0,W,H);
    t += 0.03;

    const R = Math.min(W,H) * 0.28;

    // Anillo
    ctx.save(); ctx.translate(cx,cy);
    ctx.strokeStyle = `rgba(160,80,255,${0.4 + 0.2*Math.sin(t*2)})`;
    ctx.lineWidth = 1; ctx.shadowColor="#a050ff"; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(0,0,R*0.55,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();

    // Estrella 4 puntas girando
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*3);
    ctx.strokeStyle = `rgba(160,80,255,${0.7 + 0.25*Math.sin(t*5)})`;
    ctx.lineWidth = 2; ctx.shadowColor="#a050ff"; ctx.shadowBlur=30;
    for(let i=0;i<4;i++){
        const a=(i/4)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*R*0.15, Math.sin(a)*R*0.15);
        ctx.lineTo(Math.cos(a)*R, Math.sin(a)*R);
        ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();

    // Centro
    const p = 4 + 3*Math.abs(Math.sin(t*5));
    ctx.fillStyle=`rgba(160,80,255,0.9)`;
    ctx.shadowColor="#a050ff"; ctx.shadowBlur=25;
    ctx.beginPath(); ctx.arc(cx,cy,p,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
