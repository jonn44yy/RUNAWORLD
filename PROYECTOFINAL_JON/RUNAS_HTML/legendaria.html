<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; display:flex; justify-content:center; align-items:center; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let t = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

function frame() {
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;
    ctx.clearRect(0,0,W,H);
    t += 0.012;

    const R1 = Math.min(W,H) * 0.36;
    const R2 = R1 * 0.65;
    const R3 = R1 * 0.35;

    // Anillo exterior con marcas
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*0.6);
    ctx.strokeStyle = `rgba(255,215,0,${0.55 + 0.2*Math.sin(t*2)})`;
    ctx.lineWidth=1.2; ctx.shadowColor="#ffd700"; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(0,0,R1,0,Math.PI*2); ctx.stroke();
    for(let i=0;i<16;i++){
        const a=(i/16)*Math.PI*2;
        const len=i%4===0?14:7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*(R1-len), Math.sin(a)*(R1-len));
        ctx.lineTo(Math.cos(a)*R1, Math.sin(a)*R1);
        ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();

    // Anillo medio con runas
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(-t*0.9);
    ctx.strokeStyle=`rgba(255,215,0,${0.35+0.15*Math.sin(t*3)})`;
    ctx.lineWidth=0.8; ctx.shadowColor="#ffd700"; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(0,0,R2,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=`rgba(255,215,0,${0.6+0.3*Math.sin(t*2)})`;
    ctx.font=`${R1*0.13}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ["ᚠ","ᚢ","ᚦ","ᚨ","ᚱ","ᚲ","ᚷ","ᚹ"].forEach((r,i)=>{
        const a=(i/8)*Math.PI*2;
        ctx.fillText(r, Math.cos(a)*R2, Math.sin(a)*R2);
    });
    ctx.shadowBlur=0; ctx.restore();

    // Anillo interior + cruz
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*1.4);
    ctx.strokeStyle=`rgba(255,215,0,${0.7+0.25*Math.sin(t*4)})`;
    ctx.lineWidth=1.5; ctx.shadowColor="#ffd700"; ctx.shadowBlur=25;
    ctx.beginPath(); ctx.arc(0,0,R3,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-R3*0.7); ctx.lineTo(0,R3*0.7);
    ctx.moveTo(-R3*0.7,0); ctx.lineTo(R3*0.7,0); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();

    // Centro pulsante
    const pulso = 5 + 3*Math.sin(t*4);
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,pulso*3);
    grad.addColorStop(0,"rgba(255,215,0,0.9)"); grad.addColorStop(1,"rgba(255,215,0,0)");
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,pulso*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#ffd700"; ctx.shadowBlur=20; ctx.shadowColor="#ffd700";
    ctx.beginPath(); ctx.arc(cx,cy,pulso,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
