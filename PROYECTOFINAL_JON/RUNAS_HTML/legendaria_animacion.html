<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#08090d; overflow:hidden; }

/* Neón en bordes */
#neon-overlay { position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0; }
.neon-line { position:absolute;border-radius:3px;background:#ffd700;box-shadow:0 0 25px #ffd700,0 0 60px rgba(255,215,0,0.7); }
#neon-overlay .neon-top    { top:0;left:0;right:0;height:5px; }
#neon-overlay .neon-bottom { bottom:0;left:0;right:0;height:5px; }
#neon-overlay .neon-left   { left:0;top:0;bottom:0;width:5px; }
#neon-overlay .neon-right  { right:0;top:0;bottom:0;width:5px; }
@keyframes neonPulse { from{opacity:0.5;} to{opacity:1;} }
</style>
</head>
<body>
<div id="neon-overlay">
    <div class="neon-line neon-top"></div>
    <div class="neon-line neon-bottom"></div>
    <div class="neon-line neon-left"></div>
    <div class="neon-line neon-right"></div>
</div>

<script>
const neon = document.getElementById("neon-overlay");

// Partículas desde los bordes
function lanzarParticulasEsquinas(cantidad) {
    const color = "#ffaa00";
    const w = window.innerWidth, h = window.innerHeight;
    for (let i = 0; i < cantidad; i++) {
        setTimeout(() => {
            const p = document.createElement("div");
            const lado = Math.floor(Math.random() * 4);
            let x, y, tx, ty;
            if      (lado === 0) { x = Math.random()*w; y = 0; tx = (Math.random()-0.5)*150; ty = 80+Math.random()*150; }
            else if (lado === 1) { x = Math.random()*w; y = h; tx = (Math.random()-0.5)*150; ty = -(80+Math.random()*150); }
            else if (lado === 2) { x = 0; y = Math.random()*h; tx = 80+Math.random()*150; ty = (Math.random()-0.5)*150; }
            else                 { x = w; y = Math.random()*h; tx = -(80+Math.random()*150); ty = (Math.random()-0.5)*150; }
            const size = 4+Math.random()*5, dur = 1.2+Math.random()*1;
            p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${size}px;
                border-radius:50%;background:${color};box-shadow:0 0 8px ${color},0 0 16px ${color};
                pointer-events:none;z-index:200;
                transition:transform ${dur}s ease-out,opacity ${dur}s ease-out;`;
            document.body.appendChild(p);
            p.getBoundingClientRect();
            p.style.transform = `translate(${tx}px,${ty}px) scale(0)`;
            p.style.opacity   = "0";
            setTimeout(() => p.remove(), dur * 1000);
        }, i * 60);
    }
}

// Arrancar neón y partículas — sin runa, pantalla limpia
neon.style.transition = "none";
neon.style.opacity    = "1";
neon.style.animation  = "neonPulse 0.5s ease-in-out infinite alternate";
lanzarParticulasEsquinas(35);

// A los 8s apagar el neón y volver al preview
setTimeout(() => {
    neon.style.animation  = "";
    neon.style.transition = "opacity 2s ease-out";
    neon.style.opacity    = "0";
    setTimeout(() => { window.location.href = "legendaria.html"; }, 2000);
}, 8000);
</script>
</body>
</html>
