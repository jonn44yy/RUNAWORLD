<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#08090d; overflow:hidden; }

#flash-rojo { position:fixed;inset:0;background:#ff0022;z-index:9000;opacity:0;pointer-events:none; }
#neon-overlay { position:fixed;inset:0;z-index:9001;pointer-events:none;opacity:0; }
.neon-line { position:absolute;border-radius:3px;background:#ff2244;box-shadow:0 0 25px #ff2244,0 0 60px rgba(255,34,68,0.7); }
#neon-overlay .neon-top    { top:0;left:0;right:0;height:5px; }
#neon-overlay .neon-bottom { bottom:0;left:0;right:0;height:5px; }
#neon-overlay .neon-left   { left:0;top:0;bottom:0;width:5px; }
#neon-overlay .neon-right  { right:0;top:0;bottom:0;width:5px; }
@keyframes neonPulse { from{opacity:0.55;} to{opacity:1;} }

#mitica-runa {
    position:fixed; z-index:9500; pointer-events:none;
    opacity:0; transform-origin:center center;
    filter:drop-shadow(0 0 20px rgba(255,34,68,0.9)) drop-shadow(0 0 60px rgba(255,34,68,0.5));
}
</style>
</head>
<body>

<div id="flash-rojo"></div>
<div id="neon-overlay">
    <div class="neon-line neon-top"></div>
    <div class="neon-line neon-bottom"></div>
    <div class="neon-line neon-left"></div>
    <div class="neon-line neon-right"></div>
</div>

<svg id="mitica-runa" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="200" r="185" fill="none" stroke="#ff2244" stroke-width="1.5" opacity="0.9"/>
    <circle cx="200" cy="200" r="145" fill="none" stroke="#ff2244" stroke-width="0.8" opacity="0.7"/>
    <circle cx="200" cy="200" r="80"  fill="none" stroke="#ff2244" stroke-width="1.2" opacity="0.8"/>
    <g stroke="#ff2244" stroke-width="2.5" opacity="1" stroke-linecap="round">
        <line x1="200" y1="125" x2="200" y2="95"/><line x1="193" y1="110" x2="200" y2="95"/><line x1="207" y1="110" x2="200" y2="95"/>
        <line x1="200" y1="275" x2="200" y2="305"/><line x1="193" y1="290" x2="207" y2="290"/>
        <line x1="275" y1="200" x2="305" y2="200"/><line x1="290" y1="193" x2="305" y2="200"/><line x1="290" y1="207" x2="305" y2="200"/>
        <line x1="125" y1="200" x2="95"  y2="200"/><line x1="110" y1="193" x2="95"  y2="200"/><line x1="110" y1="207" x2="95"  y2="200"/>
        <line x1="254" y1="146" x2="275" y2="125"/><line x1="146" y1="146" x2="125" y2="125"/>
        <line x1="254" y1="254" x2="275" y2="275"/><line x1="146" y1="254" x2="125" y2="275"/>
    </g>
    <g stroke="#ff2244" stroke-width="2" opacity="0.9">
        <line x1="200" y1="140" x2="200" y2="260"/>
        <line x1="140" y1="200" x2="260" y2="200"/>
        <circle cx="200" cy="200" r="25" fill="none"/>
        <circle cx="200" cy="200" r="6" fill="#ff2244"/>
    </g>
    <g font-size="13" fill="#ff2244" opacity="0.9" font-family="serif" text-anchor="middle">
        <text transform="rotate(0,200,200)   translate(200,22)">ᚠ</text>
        <text transform="rotate(22,200,200)  translate(200,22)">ᚢ</text>
        <text transform="rotate(44,200,200)  translate(200,22)">ᚦ</text>
        <text transform="rotate(66,200,200)  translate(200,22)">ᚨ</text>
        <text transform="rotate(88,200,200)  translate(200,22)">ᚱ</text>
        <text transform="rotate(110,200,200) translate(200,22)">ᚲ</text>
        <text transform="rotate(132,200,200) translate(200,22)">ᚷ</text>
        <text transform="rotate(154,200,200) translate(200,22)">ᚹ</text>
        <text transform="rotate(176,200,200) translate(200,22)">ᚺ</text>
        <text transform="rotate(198,200,200) translate(200,22)">ᚾ</text>
        <text transform="rotate(220,200,200) translate(200,22)">ᛁ</text>
        <text transform="rotate(242,200,200) translate(200,22)">ᛃ</text>
        <text transform="rotate(264,200,200) translate(200,22)">ᛇ</text>
        <text transform="rotate(286,200,200) translate(200,22)">ᛈ</text>
        <text transform="rotate(308,200,200) translate(200,22)">ᛉ</text>
        <text transform="rotate(330,200,200) translate(200,22)">ᛊ</text>
    </g>
</svg>

<script>
const runa  = document.getElementById("mitica-runa");
const flash = document.getElementById("flash-rojo");
const neon  = document.getElementById("neon-overlay");

const VW = window.innerWidth, VH = window.innerHeight;
const CX = VW/2, CY = VH/2;
const TAM_INICIAL = 80;
const TAM_MAXIMO  = Math.min(VW,VH) * 0.78;

let angulo=0, velAngular=0, explosionHecha=false, terminada=false;
let startTime=null, raf=null;

function lerp(a,b,t){ return a+(b-a)*t; }
function easeIn(t){ return t*t*t; }
function easeOut(t){ return 1-Math.pow(1-t,3); }

function posRuna(x,y,size,opacity){
    runa.style.width    = size+"px";
    runa.style.height   = size+"px";
    runa.style.left     = x+"px";
    runa.style.top      = y+"px";
    runa.style.opacity  = opacity;
    runa.style.transform = `translate(-50%,-50%) rotate(${angulo}deg)`;
}

function lanzarParticulas(n){
    for(let i=0;i<n;i++){
        setTimeout(()=>{
            const p = document.createElement("div");
            const x = Math.random()*VW, y = Math.random()*VH;
            const ang = Math.random()*Math.PI*2, d = 80+Math.random()*280;
            const tx = Math.cos(ang)*d, ty = Math.sin(ang)*d;
            const sz = 3+Math.random()*6, dur = 3+Math.random()*7;
            p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;
                border-radius:50%;background:#ff2244;box-shadow:0 0 10px #ff2244,0 0 20px #ff2244;
                pointer-events:none;z-index:9002;
                transition:transform ${dur}s ease-out,opacity ${dur}s ease-out;`;
            document.body.appendChild(p);
            p.getBoundingClientRect();
            p.style.transform = `translate(${tx}px,${ty}px) scale(0)`;
            p.style.opacity   = "0";
            setTimeout(()=>p.remove(), dur*1000+200);
        }, i*12);
    }
}

function animacion(ts){
    if(terminada) return;
    if(!startTime) startTime = ts;
    const ms = ts - startTime;

    // Fase 1: aparición pequeña
    if(ms < 400){
        const p = ms/400;
        posRuna(CX,CY, lerp(TAM_INICIAL*0.2,TAM_INICIAL,easeOut(p)), p);
        velAngular=0; angulo=0;

    // Fase 2: crece girando
    } else if(ms < 2800){
        const p = (ms-400)/2400;
        const size = lerp(TAM_INICIAL, TAM_MAXIMO, easeIn(p));
        velAngular = lerp(0.2, 20, easeIn(p));
        angulo += velAngular;
        const glow = lerp(20, 90, p);
        runa.style.filter = `drop-shadow(0 0 ${glow}px rgba(255,34,68,0.95)) drop-shadow(0 0 ${glow*2}px rgba(255,34,68,0.5))`;
        posRuna(CX,CY,size,1);

    // Fase 3: explosión — runa se expande y desaparece
    } else if(ms < 3100){
        const p = (ms-2800)/300;
        posRuna(CX,CY, TAM_MAXIMO*(1+p*0.4), 1-p);
        angulo += velAngular*(1-p);

        if(!explosionHecha){
            explosionHecha = true;
            // Flash rojo
            flash.style.transition = "none"; flash.style.opacity = "0.75";
            requestAnimationFrame(()=>{
                flash.style.transition = "opacity 1.8s ease-out"; flash.style.opacity = "0";
            });
            // Neón en bordes
            neon.style.transition = "none"; neon.style.opacity = "1";
            neon.style.animation  = "neonPulse 0.5s ease-in-out infinite alternate";
            setTimeout(()=>{
                neon.style.animation  = "";
                neon.style.transition = "opacity 2.5s ease-out";
                neon.style.opacity    = "0";
            }, 5000);
            // Partículas
            lanzarParticulas(65);
        }

    // Fase final: runa desaparece completamente, vuelve al preview tras las partículas
    } else {
        terminada = true;
        cancelAnimationFrame(raf);
        runa.style.opacity = "0";
        // Esperar a que las partículas y el neón se vayan, luego volver al preview
        setTimeout(()=>{ window.location.href = "mitica.html"; }, 5500);
        return;
    }

    raf = requestAnimationFrame(animacion);
}

raf = requestAnimationFrame(animacion);
</script>
</body>
</html>
