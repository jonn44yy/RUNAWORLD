<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Background Legendaria Corrupta</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #05030a; overflow: hidden; }

    /* Núcleo dorado-abismal */
    #void-core {
        position: fixed; inset: 0; z-index: 1;
        background: radial-gradient(circle at center, #1a0d00 0%, #0a0005 45%, #000000 100%);
        animation: voidPulse 5s ease-in-out infinite alternate;
    }
    @keyframes voidPulse {
        0%   { transform: scale(1);    filter: brightness(0.7) hue-rotate(0deg); }
        50%  { transform: scale(1.06); filter: brightness(1.1) hue-rotate(8deg); }
        100% { transform: scale(1.12); filter: brightness(1.3) hue-rotate(-6deg); }
    }

    /* Grid dorado contaminado */
    #glitch-grid {
        position: fixed; inset: 0; z-index: 2; opacity: 0.12;
        background:
            repeating-linear-gradient(0deg,  transparent, transparent 29px, #ffd700 30px),
            repeating-linear-gradient(90deg, transparent, transparent 29px, #ffd700 30px);
        mix-blend-mode: screen;
        animation: gridJitter 0.5s steps(3) infinite;
    }
    @keyframes gridJitter {
        0%   { transform: translate(0,0)     scale(1.02); opacity: 0.12; }
        33%  { transform: translate(-3px,2px) scale(1.02); opacity: 0.04; }
        66%  { transform: translate(2px,-3px) scale(1.02); opacity: 0.18; }
        100% { transform: translate(0,0)     scale(1.02); opacity: 0.10; }
    }

    /* Fragmentos dorados corrompidos flotando */
    #shards-container { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
    .shard {
        position: absolute;
        background: #000;
        border: 1px solid #ffd700;
        box-shadow: 0 0 8px #ffd700, 0 0 20px rgba(255,215,0,0.4);
        clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 20% 100%, 0% 30%);
        opacity: 0;
        animation: floatShard var(--dur) linear infinite;
    }
    .shard.corrupt { border-color: #aa00ff; box-shadow: 0 0 8px #aa00ff, 0 0 20px rgba(170,0,255,0.4); }
    .shard.red     { border-color: #ff2244; box-shadow: 0 0 8px #ff2244, 0 0 20px rgba(255,34,68,0.4); }

    @keyframes floatShard {
        0%   { transform: translateY(110vh) rotate(0deg)         scale(var(--s)); opacity: 0; }
        10%  { opacity: 0.5; }
        90%  { opacity: 0.5; }
        100% { transform: translateY(-20vh) rotate(var(--rot))  scale(var(--s)); opacity: 0; }
    }

    /* Barrido de scanline corrupto */
    #scanline {
        position: fixed; inset: 0; z-index: 4; pointer-events: none;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,215,0,0.015) 4px);
        animation: scanMove 8s linear infinite;
    }
    @keyframes scanMove {
        from { background-position: 0 0; }
        to   { background-position: 0 400px; }
    }
</style>
</head>
<body>
    <div id="void-core"></div>
    <div id="glitch-grid"></div>
    <div id="shards-container"></div>
    <div id="scanline"></div>

<script>
    const container = document.getElementById('shards-container');
    for (let i = 0; i < 50; i++) {
        const shard = document.createElement('div');
        const r = Math.random();
        shard.className = 'shard' + (r > 0.78 ? ' corrupt' : r > 0.62 ? ' red' : '');
        const size = 8 + Math.random() * 28;
        shard.style.width  = `${size}px`;
        shard.style.height = `${size}px`;
        shard.style.left   = `${Math.random() * 100}vw`;
        shard.style.setProperty('--dur', `${10 + Math.random() * 18}s`);
        shard.style.setProperty('--s',   `${0.4 + Math.random() * 1.2}`);
        shard.style.setProperty('--rot', `${(Math.random() - 0.5) * 540}deg`);
        shard.style.animationDelay = `${Math.random() * -25}s`;
        container.appendChild(shard);
    }
</script>
</body>
</html>
