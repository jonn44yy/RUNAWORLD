<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    #canvas-container {
        position: absolute; inset: 0; z-index: 10;
        display: flex; justify-content: center; align-items: center;
    }

    canvas {
        display: block;
        filter:
            drop-shadow(0 0 18px rgba(255, 215, 0, 0.7))
            drop-shadow(0 0 40px rgba(255, 150, 0, 0.4))
            drop-shadow(0 0 60px rgba(170, 0, 255, 0.25));
    }
</style>
</head>
<body>

    <iframe src="../BACKGROUND/background_legendaria_corrupta_claude.html"
        style="position:fixed;inset:0;width:100vw;height:100vh;border:none;z-index:-100;pointer-events:none;"></iframe>

    <div id="canvas-container">
        <canvas id="c"></canvas>
    </div>

    <iframe src="../MARCOS/marco_legendaria_corrupta_claude.html"
        style="position:fixed;inset:0;width:100vw;height:100vh;border:none;z-index:9999;pointer-events:none;background:transparent;"></iframe>

<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");
let t = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener("resize", resize);

const TAU = Math.PI * 2;

/* ─── Geometría de la runa legendaria ─────────────────────────── */
function drawLegendariaGeometry(cx, cy, R1, R2, R3, t, color, alpha) {
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;

    // Anillo exterior con flechas en 8 puntos
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(t * 0.25);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, R1, 0, TAU); ctx.stroke();
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * TAU;
        ctx.save(); ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(R1 - 18, -8); ctx.lineTo(R1 + 12, 0); ctx.lineTo(R1 - 18, 8);
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();

    // Anillo medio con marcas
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(-t * 0.15);
    ctx.lineWidth = 1.2;
    ctx.setLineDash([40, 12]);
    ctx.beginPath(); ctx.arc(0, 0, R2, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    for (let i = 0; i < 12; i++) {
        const a = (i / 12) * TAU;
        const len = i % 3 === 0 ? 20 : 10;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (R2 - len), Math.sin(a) * (R2 - len));
        ctx.lineTo(Math.cos(a) * R2, Math.sin(a) * R2);
        ctx.stroke();
    }
    ctx.restore();

    // Estrella de 8 puntas (la forma distintiva de la legendaria)
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(t * 0.5 + Math.PI / 8);
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    for (let i = 0; i < 16; i++) {
        const r = i % 2 === 0 ? R2 * 0.55 : R2 * 0.28;
        const a = (i / 16) * TAU;
        i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke();
    ctx.restore();

    // Anillo interior + cruz + subcruces
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(t * 1.8);
    ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.arc(0, 0, R3, 0, TAU); ctx.stroke();
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * TAU;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a)*R3, Math.sin(a)*R3); ctx.stroke();
    }

    // Núcleo
    ctx.globalAlpha = alpha * 0.85;
    ctx.beginPath(); ctx.arc(0, 0, R3 * 0.38, 0, TAU); ctx.fill();
    ctx.restore();

    // Runas alrededor del anillo exterior
    ctx.save(); ctx.translate(cx, cy);
    ctx.font = `${R1 * 0.09}px serif`;
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha * 0.75;
    const runas = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ'];
    for (let i = 0; i < 16; i++) {
        const a = (i / 16) * TAU - Math.PI / 2 + t * 0.1;
        ctx.save();
        ctx.rotate(a);
        ctx.translate(R1 + R1 * 0.12, 0);
        ctx.rotate(Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText(runas[i], 0, 0);
        ctx.restore();
    }
    ctx.restore();

    ctx.globalAlpha = 1;
}

/* ─── Corrupción: glitch, grietas, partículas ──────────────────── */
function glitchLines(cx, cy, r, amount) {
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < amount; i++) {
        const y  = cy + (Math.random() - 0.5) * r * 1.8;
        const x1 = cx - r * 0.8 + Math.random() * r * 0.5;
        const w  = 10 + Math.random() * r * 0.4;
        ctx.globalAlpha = 0.06 + Math.random() * 0.14;
        ctx.fillStyle = Math.random() > 0.5 ? '#ffd700' : '#aa00ff';
        ctx.fillRect(x1, y, w, 1 + Math.random() * 2);
    }
    ctx.restore();
}

function cracks(cx, cy, r, count) {
    ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.lineCap = 'round';
    for (let i = 0; i < count; i++) {
        let a  = Math.random() * TAU;
        let rr = r * (0.2 + Math.random() * 0.78);
        let x  = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
        ctx.beginPath(); ctx.moveTo(x, y);
        const steps = 2 + Math.floor(Math.random() * 4);
        for (let s = 0; s < steps; s++) {
            const a2 = a + (Math.random() - 0.5) * 1.4;
            x += Math.cos(a2) * r * (0.05 + Math.random() * 0.11);
            y += Math.sin(a2) * r * (0.05 + Math.random() * 0.11);
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = Math.random() > 0.4
            ? `rgba(255,215,0,${0.5 + Math.random() * 0.4})`
            : `rgba(190,0,255,${0.5 + Math.random() * 0.4})`;
        ctx.lineWidth = 0.6 + Math.random() * 2;
        ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 8;
        ctx.stroke();
    }
    ctx.restore();
}

function shards(cx, cy, r, count) {
    ctx.save();
    for (let i = 0; i < count; i++) {
        const a  = i * TAU / count + t * (0.1 + (i % 4) * 0.025);
        const rr = r * (0.92 + ((i * 41) % 33) / 100);
        const x  = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr * 0.94;
        ctx.save(); ctx.translate(x, y); ctx.rotate(a + t * 0.35);
        ctx.globalAlpha = 0.25 + 0.2 * Math.sin(t * 1.8 + i);
        ctx.fillStyle   = 'rgba(20,10,0,.85)';
        ctx.strokeStyle = 'rgba(255,200,0,.5)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.032); ctx.lineTo(r * 0.032, 0);
        ctx.lineTo(0, r * 0.048);  ctx.lineTo(-r * 0.022, 0);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

/* ─── Loop ─────────────────────────────────────────────────────── */
function frame() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const base = Math.min(W, H);
    t += 0.016;

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 5, 0.22)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';

    const R1 = base * 0.38;
    const R2 = R1 * 0.68;
    const R3 = R1 * 0.34;
    const pulse = 0.55 + 0.45 * Math.abs(Math.sin(t * 1.3));

    // Glitch cromático ocasional
    if (Math.random() > 0.91) {
        ctx.fillStyle = 'rgba(255,215,0,0.4)';
        drawLegendariaGeometry(cx - 6, cy + 3, R1, R2, R3, t, 'rgba(255,215,0,0.6)', 0.6);
        ctx.fillStyle = 'rgba(170,0,255,0.4)';
        drawLegendariaGeometry(cx + 7, cy - 4, R1, R2, R3, t, 'rgba(170,0,255,0.6)', 0.6);
    }

    // Base
    const col = `rgba(255,200,0,${pulse})`;
    ctx.fillStyle   = 'rgba(30,15,0,0.85)';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 30;
    drawLegendariaGeometry(cx, cy, R1, R2, R3, t, col, pulse);
    ctx.shadowBlur = 0;

    // Partículas corruptas violetas
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(-t * 1.2);
    for (let i = 0; i < 18; i++) {
        const a = (i / 18) * TAU;
        const rDist = R3 + Math.random() * (R1 - R3);
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = Math.random() > 0.5 ? '#aa00ff' : '#ff2244';
        ctx.fillRect(Math.cos(a) * rDist, Math.sin(a) * rDist, 2 + Math.random() * 3, 2 + Math.random() * 3);
    }
    ctx.restore();

    cracks(cx, cy, R1, 7);
    shards(cx, cy, R1 * 0.95, 8);
    glitchLines(cx, cy, R1, 9);

    requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
