<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#08090d;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#neon{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:1}
.line{position:absolute;background:#ffd700;box-shadow:0 0 18px #ffd700,0 0 44px rgba(150,0,255,.45);animation:pulse .55s ease-in-out infinite alternate}.top{top:0;left:0;right:0;height:4px}.bottom{bottom:0;left:0;right:0;height:4px}.left{left:0;top:0;bottom:0;width:4px}.right{right:0;top:0;bottom:0;width:4px}
@keyframes pulse{from{opacity:.45}to{opacity:1}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div id="neon"><i class="line top"></i><i class="line bottom"></i><i class="line left"></i><i class="line right"></i></div>
<script>
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;
const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ'];
const IS_MOBILE = matchMedia('(max-width: 768px)').matches;
const DPR_LIMIT = IS_MOBILE ? 1 : 1.25;
const PARTICLE_COUNT = IS_MOBILE ? 24 : 42;
const CRACK_COUNT = IS_MOBILE ? 6 : 10;
let dpr = 1;
let w = 0;
let h = 0;
let start = 0;
let particles = [];
let cracks = [];

function resize() {
    dpr = Math.min(devicePixelRatio || 1, DPR_LIMIT);
    w = innerWidth;
    h = innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    createParticles();
    createCracks();
}

function rand(seed) {
    const x = Math.sin(seed * 999.13) * 43758.5453;
    return x - Math.floor(x);
}

function createParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const side = i % 4;
        const s1 = rand(i + 1);
        const s2 = rand(i + 7);
        let x = 0;
        let y = 0;
        let vx = 0;
        let vy = 0;
        if (side === 0) { x = s1 * w; y = 0; vx = (s2 - 0.5) * 70; vy = 55 + s1 * 70; }
        if (side === 1) { x = s1 * w; y = h; vx = (s2 - 0.5) * 70; vy = -55 - s1 * 70; }
        if (side === 2) { x = 0; y = s1 * h; vx = 55 + s2 * 70; vy = (s1 - 0.5) * 70; }
        if (side === 3) { x = w; y = s1 * h; vx = -55 - s2 * 70; vy = (s1 - 0.5) * 70; }
        particles.push({ x, y, vx, vy, size: 2 + s2 * 3, delay: i * 0.07, color: i % 5 === 0 ? '#aa00ff' : '#ffd700' });
    }
}

function createCracks() {
    cracks = [];
    const cx = w / 2;
    const cy = h / 2;
    const r = Math.min(w, h) * 0.33;
    for (let i = 0; i < CRACK_COUNT; i++) {
        const a = i * TAU / CRACK_COUNT + rand(i + 11) * 0.35;
        const len = r * (0.22 + rand(i + 13) * 0.22);
        cracks.push({
            x: cx + Math.cos(a) * r * (0.7 + rand(i + 2) * 0.45),
            y: cy + Math.sin(a) * r * (0.7 + rand(i + 3) * 0.45),
            a,
            len,
            color: i % 2 ? 'rgba(170,0,255,.7)' : 'rgba(255,215,0,.68)'
        });
    }
}

function easeOut(x) { return 1 - Math.pow(1 - x, 3); }
function easeIn(x) { return x * x * x; }
function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }

function drawRing(r, color, width, dash) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, TAU);
    ctx.stroke();
    if (dash) ctx.setLineDash([]);
}

function drawRuneShape(cx, cy, r, rot, corrupt, opacity) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.globalAlpha = opacity;
    ctx.globalCompositeOperation = 'lighter';

    const gold = `rgba(255,215,0,${0.52 * (1 - corrupt) + 0.12})`;
    const purple = `rgba(170,0,255,${0.48 * corrupt})`;

    ctx.save();
    ctx.rotate(rot * 0.35);
    drawRing(r, corrupt > 0.4 ? purple : gold, 1.3, corrupt > 0.35 ? [28, 10, 4, 14] : null);
    ctx.strokeStyle = gold;
    for (let i = 0; i < 16; i++) {
        const a = i * TAU / 16;
        const len = i % 4 === 0 ? 13 : 7;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (r - len), Math.sin(a) * (r - len));
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.rotate(-rot * 0.55);
    drawRing(r * 0.66, gold, 0.9, null);
    ctx.fillStyle = corrupt > 0.55 ? 'rgba(190,0,255,.72)' : 'rgba(255,215,0,.72)';
    ctx.font = `${Math.max(12, r * 0.13)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < RUNES.length; i++) {
        const a = i * TAU / RUNES.length;
        ctx.fillText(RUNES[i], Math.cos(a) * r * 0.66, Math.sin(a) * r * 0.66);
    }
    ctx.restore();

    ctx.save();
    ctx.rotate(rot * 0.85);
    drawRing(r * 0.35, corrupt > 0.25 ? purple : gold, 1.2, corrupt > 0.45 ? [8, 6] : null);
    ctx.strokeStyle = corrupt > 0.55 ? 'rgba(160,0,255,.82)' : 'rgba(255,215,0,.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.25);
    ctx.lineTo(0, r * 0.25);
    ctx.moveTo(-r * 0.25, 0);
    ctx.lineTo(r * 0.25, 0);
    ctx.stroke();
    ctx.restore();

    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.22);
    g.addColorStop(0, corrupt > 0.45 ? 'rgba(10,0,18,.96)' : 'rgba(255,215,0,.95)');
    g.addColorStop(0.45, corrupt > 0.45 ? 'rgba(170,0,255,.72)' : 'rgba(255,215,0,.35)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.12, 0, TAU);
    ctx.fill();

    ctx.restore();
}

function drawParticles(seconds) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
        const age = seconds - p.delay;
        if (age < 0 || age > 3.4) continue;
        const k = age / 3.4;
        const x = p.x + p.vx * age;
        const y = p.y + p.vy * age;
        ctx.globalAlpha = (1 - k) * 0.72;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(x, y, p.size * (1 - k * 0.45), 0, TAU);
        ctx.fill();
    }
    ctx.restore();
}

function drawCracks(alpha) {
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round';
    ctx.globalAlpha = alpha;
    for (const c of cracks) {
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(c.x + Math.cos(c.a) * c.len * 0.45, c.y + Math.sin(c.a) * c.len * 0.45);
        ctx.lineTo(c.x + Math.cos(c.a + 0.55) * c.len, c.y + Math.sin(c.a + 0.55) * c.len);
        ctx.stroke();
    }
    ctx.restore();
}

function drawGlitch(cx, cy, r, amount) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < amount; i++) {
        const y = cy + Math.sin(performance.now() * 0.012 + i * 2.1) * r * 0.7;
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = i % 2 ? '#aa00ff' : '#ffd700';
        ctx.fillRect(cx - r * 0.55 + i * 12, y, r * 0.22, 2);
    }
    ctx.restore();
}

function frame(now) {
    if (!start) start = now;
    const seconds = (now - start) / 1000;
    const cx = w / 2;
    const cy = h / 2;
    const base = Math.min(w, h);

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(5,5,8,0.34)';
    ctx.fillRect(0, 0, w, h);

    let r = base * 0.11;
    let opacity = 1;
    let corrupt = 0;
    let rot = seconds * 1.4;
    let shakeX = 0;
    let shakeY = 0;

    if (seconds < 2.7) {
        const p = easeIn(clamp(seconds / 2.7, 0, 1));
        r = base * (0.10 + 0.25 * p);
        rot = seconds * (1.5 + 4.2 * p);
    } else if (seconds < 3.05) {
        r = base * 0.35;
        rot = 2.7 * 5.7;
        drawGlitch(cx, cy, r, IS_MOBILE ? 4 : 7);
    } else if (seconds < 4.4) {
        const p = clamp((seconds - 3.05) / 1.35, 0, 1);
        corrupt = easeOut(p);
        r = base * (0.35 - 0.05 * p);
        rot = seconds * (8 + 7 * p);
        shakeX = Math.sin(seconds * 77) * 3 * p;
        shakeY = Math.cos(seconds * 69) * 3 * p;
        drawGlitch(cx, cy, r, IS_MOBILE ? 5 : 8);
    } else if (seconds < 5.0) {
        const p = clamp((seconds - 4.4) / 0.6, 0, 1);
        corrupt = 1;
        r = base * (0.30 - 0.18 * easeIn(p));
        opacity = 1;
    } else if (seconds < 5.8) {
        const p = clamp((seconds - 5.0) / 0.8, 0, 1);
        corrupt = 1;
        r = base * (0.12 + 0.42 * easeOut(p));
        opacity = 1 - p;
        drawCracks(p);
    } else {
        drawCracks(clamp(1 - (seconds - 5.8) / 2.2, 0, 1));
        drawParticles(seconds - 4.8);
        if (seconds > 8.3) location.href = '../RUNAS/legendaria_corrupta.html';
        requestAnimationFrame(frame);
        return;
    }

    drawRuneShape(cx + shakeX, cy + shakeY, r, rot, corrupt, opacity);
    drawParticles(seconds - 4.8);
    drawCracks(clamp((seconds - 5.0) / 0.8, 0, 1));

    requestAnimationFrame(frame);
}

resize();
addEventListener('resize', resize, { passive: true });
requestAnimationFrame(frame);
</script>
</body>
</html>
